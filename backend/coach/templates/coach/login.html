<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — NEXA HUB ENGLISH COACH</title>
    <style>
        /* =============================================
           LUXURY / PREMIUM THEME – Light & Dark Mode
           ============================================= */

        /* ─── RESET & VARIABLES ─── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Default: Dark Mode */
            --bg: #0a0c1a;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(212, 175, 55, 0.06);
            --border: rgba(212, 175, 55, 0.15);
            --border-glow: rgba(212, 175, 55, 0.3);

            /* Gold palette (unchanged) */
            --gold: #d4af37;
            --gold-light: #f5d76e;
            --gold-dark: #b8962e;
            --gold-gradient: linear-gradient(135deg, #f5d76e, #d4af37, #b8962e);

            /* Text colors - Dark Mode */
            --text: #f0ece4;
            --text-secondary: #d6cfb5;
            --muted: #8a867a;
            --input-bg: rgba(255, 255, 255, 0.04);
            --card-shadow: 0 28px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(212, 175, 55, 0.05);
            --blob-opacity: 0.10;

            /* Typography */
            --font-heading: 'Playfair Display', 'Georgia', serif;
            --font-body: 'Lora', 'Segoe UI', serif;

            --radius: 20px;
            --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ─── LIGHT MODE ─── */
        [data-theme="light"] {
            --bg: #f5f0e8;
            --surface: rgba(255, 255, 255, 0.7);
            --surface-hover: rgba(212, 175, 55, 0.12);
            --border: rgba(212, 175, 55, 0.25);
            --border-glow: rgba(212, 175, 55, 0.5);

            --text: #1a1a2e;
            --text-secondary: #4a4a5e;
            --muted: #6a6a7e;
            --input-bg: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 28px 60px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(212, 175, 55, 0.1);
            --blob-opacity: 0.06;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            overflow: hidden;
            line-height: 1.7;
            min-height: 100vh;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* ─── TOP LEFT BRANDING ─── */
        .brand-top-left {
            position: fixed;
            top: 28px;
            left: 32px;
            z-index: 10;
            font-family: var(--font-heading);
            font-size: 1.2rem;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.06em;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
            pointer-events: none;
            transition: text-shadow 0.4s ease;
        }
        .brand-top-left span {
            font-weight: 300;
            opacity: 0.6;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.3);
        }
        [data-theme="light"] .brand-top-left span {
            -webkit-text-fill-color: rgba(0, 0, 0, 0.25);
        }

        /* ─── THEME TOGGLE ─── */
        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 32px;
            z-index: 10;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 16px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: var(--font-body);
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-toggle:hover {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }
        .theme-toggle .icon {
            font-size: 1.1rem;
        }

        /* ─── BACKGROUND BLOBS ─── */
        .bg-blobs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(160px);
            opacity: var(--blob-opacity);
            animation: floatBlob 20s ease-in-out infinite alternate;
            transition: opacity 0.6s ease;
        }
        .b1 {
            width: 800px;
            height: 800px;
            background: #d4af37;
            top: -300px;
            left: -250px;
        }
        .b2 {
            width: 600px;
            height: 600px;
            background: #b8962e;
            bottom: -200px;
            right: -200px;
            animation-delay: 7s;
        }
        .b3 {
            width: 450px;
            height: 450px;
            background: #f5d76e;
            top: 45%;
            left: 55%;
            animation-delay: 4s;
        }
        @keyframes floatBlob {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(50px, -50px) scale(1.1);
            }
        }

        /* ─── PARTICLES CANVAS ─── */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── LOGIN CARD ─── */
        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--card-shadow);
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            transition: var(--transition), background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }
        .card:hover {
            border-color: var(--border-glow);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(36px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── LOGO ─── */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 54px;
            display: block;
            margin-bottom: 10px;
            animation: bounceIcon 2.8s ease infinite;
        }
        @keyframes bounceIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .logo h1 {
            font-size: 1.6rem;
            font-weight: 900;
            font-family: var(--font-heading);
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.04em;
        }
        .logo p {
            color: var(--muted);
            font-size: 0.84rem;
            margin-top: 5px;
            font-family: var(--font-body);
            transition: color 0.4s ease;
        }

        /* ─── FORM FIELDS ─── */
        .field {
            margin-bottom: 17px;
        }
        .field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--gold-light);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
            font-family: var(--font-heading);
            transition: color 0.4s ease;
        }
        [data-theme="light"] .field label {
            color: var(--gold-dark);
        }
        .field input {
            width: 100%;
            padding: 13px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition), background 0.4s ease, border-color 0.4s ease, color 0.4s ease;
            font-family: var(--font-body);
        }
        .field input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.08);
        }
        .field input::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        /* ─── BUTTON ─── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 12px;
            color: #0a0c1a;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.04em;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
            font-family: var(--font-body);
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.35);
        }

        /* ─── FOOTER LINK ─── */
        .footer-link {
            text-align: center;
            margin-top: 22px;
            font-size: 0.86rem;
            color: var(--muted);
            font-family: var(--font-body);
            transition: color 0.4s ease;
        }
        .footer-link a {
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
        }
        .footer-link a:hover {
            color: var(--gold);
            text-decoration: underline;
        }
        [data-theme="light"] .footer-link a {
            color: var(--gold-dark);
        }
        [data-theme="light"] .footer-link a:hover {
            color: var(--gold);
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            .brand-top-left {
                top: 16px;
                left: 18px;
                font-size: 0.95rem;
            }
            .theme-toggle {
                top: 14px;
                right: 18px;
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .theme-toggle .icon {
                font-size: 0.9rem;
            }
            .card {
                padding: 32px 20px;
            }
            .logo h1 {
                font-size: 1.3rem;
            }
            .logo-icon {
                font-size: 44px;
            }
            .field input {
                font-size: 0.9rem;
                padding: 11px 14px;
            }
            .btn-submit {
                font-size: 0.9rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── TOP LEFT BRANDING ─── -->
    <div class="brand-top-left">NEXA HUB <span>AI</span></div>

    <!-- ─── THEME TOGGLE ─── -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="icon" id="themeIcon">🌙</span>
        <span id="themeLabel">Dark</span>
    </button>

    <!-- ─── PARTICLES CANVAS ─── -->
    <canvas id="particles-canvas"></canvas>

    <!-- ─── BG BLOBS ─── -->
    <div class="bg-blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <!-- ─── LOGIN CARD ─── -->
    <div class="card">
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <h1>NEXA HUB ENGLISH COACH</h1>
            <p>Your personal English teacher — powered by AI ·</p>
        </div>

        <form method="post">
            <!-- CSRF token placeholder (Django style) -->
            <input type="hidden" name="csrfmiddlewaretoken" value="dummy_token_for_demo" />
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required />
            </div>
            <button type="submit" class="btn-submit">🚀 Start Learning</button>
        </form>

        <div class="footer-link">
            New here? <a href="#">Create a free account →</a>
        </div>
    </div>

    <!-- ─── PARTICLE SCRIPT ──────────────────────────────────────────── -->
    <script>
        (function() {
            const c = document.getElementById('particles-canvas'),
                ctx = c.getContext('2d');
            let W, H, pts = [];

            function resize() {
                W = c.width = window.innerWidth;
                H = c.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            function rand(a, b) { return Math.random() * (b - a) + a; }
            const COLORS = ['212,175,55', '245,215,110', '184,150,46', '212,175,55'];
            for (let i = 0; i < 110; i++) {
                pts.push({
                    x: rand(0, W),
                    y: rand(0, H),
                    r: rand(0.5, 2.2),
                    vx: rand(-0.25, 0.25),
                    vy: rand(-0.25, 0.25),
                    a: rand(0.1, 0.45),
                    c: COLORS[Math.floor(Math.random() * COLORS.length)]
                });
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                pts.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > W) p.vx *= -1;
                    if (p.y < 0 || p.y > H) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.c},${p.a})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ─── THEME TOGGLE SCRIPT ──────────────────────────────────────
        (function() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const html = document.documentElement;

            // Get saved theme or default to dark
            let currentTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(currentTheme);

            toggle.addEventListener('click', function() {
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(newTheme);
                localStorage.setItem('theme', newTheme);
                currentTheme = newTheme;
            });

            function applyTheme(theme) {
                if (theme === 'light') {
                    html.setAttribute('data-theme', 'light');
                    icon.textContent = '☀️';
                    label.textContent = 'Light';
                } else {
                    html.removeAttribute('data-theme');
                    icon.textContent = '🌙';
                    label.textContent = 'Dark';
                }
            }
        })();
    </script>

    <!-- small footer note -->
    <div style="position:fixed; bottom:12px; right:16px; color:rgba(255,255,255,0.08); font-size:12px; z-index:2; pointer-events:none; font-family:var(--font-body);">
        NEXA HUB · PREMIUM
    </div>
</body>
</html>
