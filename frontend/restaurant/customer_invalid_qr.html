<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Link | {{ company_name }}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background:#f5f1ea; font-family:'Segoe UI',Roboto,Arial,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
        .card { border-radius:16px; padding:36px; max-width:420px; text-align:center; box-shadow:0 6px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class="card">
        <i class="fa-solid fa-triangle-exclamation text-warning" style="font-size:2.4rem;"></i>
        <h5 class="mt-3">This QR link isn't valid anymore</h5>
        <p class="text-muted">Please ask restaurant staff to scan or regenerate the table's QR code.</p>
        <a href="{% url 'login_select' %}" class="btn btn-outline-secondary">Go to Login</a>
    </div>
</body>
</html>
