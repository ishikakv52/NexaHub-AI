<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {{ company_name }}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: linear-gradient(135deg,#241812,#8a3f14); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',Roboto,Arial,sans-serif; }
        .login-card { background:#fff; border-radius:16px; padding:40px; max-width:400px; width:100%; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
        .login-card h3 { text-align:center; margin-bottom:6px; color:#2b1d14; }
        .login-card p.subtitle { text-align:center; color:#8a7968a; margin-bottom:24px; }
        .btn-primary { background:#b3541e; border-color:#b3541e; }
        .btn-primary:hover { background:#8a3f14; border-color:#8a3f14; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3><i class="fa-solid fa-fire-burner text-danger"></i> {{ company_name }}</h3>
        <p class="subtitle">Sign in to manage your restaurant</p>
        
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
        <a href="{% url 'login_select' %}" class="d-block text-center mt-3" style="color:#8a7968; font-size:0.85rem; text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Back to login options</a>
    </div>
</body>
</html>
