<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NEXA HUB AI · Compact | Dark & Light</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s;
        }

        /* ========== LIGHT THEME (default) ========== */
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --input-focus: #3b82f6;
            --label-color: #475569;
            --btn-primary-bg: #2563eb;
            --btn-primary-hover: #1d4ed8;
            --btn-secondary-border: #cbd5e1;
            --btn-secondary-text: #1e40af;
            --btn-secondary-hover-bg: #f1f5f9;
            --panel-bg: #f8fafc;
            --panel-border: #e2e8f0;
            --legal-border: #e2e8f0;
            --error-color: #dc2626;
            --success-color: #15803d;
            --warning-color: #e68a2e;
            --badge-bg: #eef2ff;
            --badge-text: #1e3a8a;
            --nexa-white: #0f172a;
            --hub-blue: #2563eb;
            --accent-line: #3b82f6;
        }

        /* ========== DARK THEME ========== */
        body.dark {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --input-border: #334155;
            --input-focus: #3b82f6;
            --label-color: #94a3b8;
            --btn-primary-bg: #3b82f6;
            --btn-primary-hover: #2563eb;
            --btn-secondary-border: #475569;
            --btn-secondary-text: #cbd5e1;
            --btn-secondary-hover-bg: #334155;
            --panel-bg: #0f172a;
            --panel-border: #334155;
            --legal-border: #334155;
            --error-color: #f87171;
            --success-color: #4ade80;
            --warning-color: #fbbf24;
            --badge-bg: #1e293b;
            --badge-text: #a5b4fc;
            --nexa-white: #f1f5f9;
            --hub-blue: #60a5fa;
            --accent-line: #60a5fa;
        }

        body {
            background: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* SMALL SIZE CARD - compact (around 400px) */
        .nexa-card {
            max-width: 400px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 1.6rem;
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s;
        }

        .nexa-card:hover {
            box-shadow: 0 15px 25px -10px rgba(0, 0, 0, 0.1);
        }

        .card-container {
            padding: 1.3rem 1.5rem 1.5rem 1.5rem;
        }

        /* theme toggle button - compact */
        .theme-toggle {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.3rem;
        }

        .toggle-btn {
            background: var(--panel-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 0.25rem 0.9rem;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            background: var(--btn-secondary-hover-bg);
            border-color: var(--input-focus);
        }

        /* header - compact */
        .hub-header {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .badge-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--badge-bg);
            width: 48px;
            height: 48px;
            border-radius: 24px;
            margin-bottom: 0.6rem;
            border: 1px solid var(--card-border);
        }

        .badge-icon svg {
            width: 26px;
            height: 26px;
        }

        .hub-title {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.1rem;
        }

        .nexa-part {
            color: var(--nexa-white);
        }

        .hub-ai-part {
            color: var(--hub-blue);
        }

        .hub-sub {
            font-size: 0.65rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.3px;
            margin-top: 3px;
        }

        .accent-line {
            width: 45px;
            height: 2px;
            background: var(--accent-line);
            margin: 0.5rem auto 0;
            border-radius: 2px;
            opacity: 0.6;
        }

        /* form groups - tighter spacing */
        .form-group {
            margin-bottom: 0.9rem;
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--label-color);
            margin-bottom: 0.35rem;
        }

        .input-field {
            width: 100%;
            padding: 0.65rem 0.85rem;
            font-size: 0.8rem;
            font-family: 'Inter', monospace;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 0.9rem;
            transition: all 0.2s ease;
            outline: none;
            color: var(--text-primary);
            font-weight: 500;
        }

        .input-field:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .input-field::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
            font-size: 0.75rem;
        }

        /* personal info - compact */
        .personal-info-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0.3rem 0 0.15rem 0;
        }

        .personal-info-title span {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--badge-text);
            background: var(--badge-bg);
            padding: 0.15rem 0.9rem;
            border-radius: 30px;
        }

        .date-hint {
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        /* action buttons - compact */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin: 1.2rem 0 0.9rem 0;
            align-items: center;
        }

        .continue-btn {
            flex: 2;
            background: var(--btn-primary-bg);
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 0.65rem 0.5rem;
            border: none;
            border-radius: 1.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .continue-btn:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-1px);
        }

        .login-link-btn {
            flex: 1;
            background: transparent;
            border: 1.5px solid var(--btn-secondary-border);
            color: var(--btn-secondary-text);
            font-weight: 600;
            font-size: 0.75rem;
            padding: 0.65rem 0.3rem;
            border-radius: 1.8rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            text-align: center;
        }

        .login-link-btn:hover {
            background: var(--btn-secondary-hover-bg);
            border-color: var(--input-focus);
            color: var(--text-primary);
        }

        /* next account panel - compact */
        .next-account-panel {
            background: var(--panel-bg);
            border-radius: 1rem;
            margin-top: 0.9rem;
            padding: 0.65rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid var(--panel-border);
            cursor: pointer;
            transition: 0.15s;
        }

        .next-account-panel:hover {
            transform: translateY(-1px);
            border-color: var(--hub-blue);
        }

        .next-text {
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .next-badge {
            background: var(--card-bg);
            padding: 0.25rem 0.7rem;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--hub-blue);
            border: 1px solid var(--input-border);
        }

        .legal-footnote {
            font-size: 0.55rem;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-muted);
            border-top: 1px solid var(--legal-border);
            padding-top: 0.8rem;
        }

        .error-tooltip {
            color: var(--error-color);
            font-size: 0.6rem;
            margin-top: 0.2rem;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        @media (max-width: 440px) {
            .card-container {
                padding: 1.2rem;
            }
            .hub-title {
                font-size: 1.5rem;
            }
            .action-buttons {
                flex-direction: column;
            }
            .continue-btn, .login-link-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="nexa-card">
    <div class="card-container">
        <!-- Dark/Light mode toggle -->
        <div class="theme-toggle">
            <button class="toggle-btn" id="themeToggleBtn" aria-label="Switch theme">
                <span id="themeIcon">🌙</span> 
                <span id="themeText">Dark mode</span>
            </button>
        </div>

        <!-- NEXA HUB AI header -->
        <div class="hub-header">
            <div class="badge-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/>
                </svg>
            </div>
            <div class="hub-title">
                <span class="nexa-part">NEXA</span>
                <span class="hub-ai-part"> HUB AI</span>
            </div>
            <div class="hub-sub">compact · intelligent access</div>
            <div class="accent-line"></div>
        </div>

        <!-- Email field -->
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="input-field" id="nexaEmail" placeholder="ainexahub@gmail.com" value="">
            <div id="emailError" class="error-tooltip" style="display: none;">⚠️ Valid email required</div>
        </div>

        <!-- Password field -->
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="input-field" id="nexaPassword" placeholder="create strong passkey" value="">
            <div id="pwdHint" class="error-tooltip" style="color: var(--text-muted);">🔒 8+ chars, letters & numbers</div>
        </div>

        <!-- Personal info + date input -->
        <div class="personal-info-title">
            <span>📋 Personal info</span>
        </div>
        <div class="form-group">
            <label class="form-label">Birth Date</label>
            <input type="text" class="input-field" id="birthdateField" placeholder="dd/mm/yyyy" value="">
            <div class="date-hint">
                <span>📅</span> Format: dd/mm/yyyy (e.g., 15/08/1995)
            </div>
            <div id="dateError" class="error-tooltip" style="display: none;">Please use valid dd/mm/yyyy format</div>
        </div>

        <!-- Continue + Login buttons -->
        <div class="action-buttons">
            <button class="continue-btn" id="continueBtn">Continue →</button>
            <button class="login-link-btn" id="loginBtn">Login</button>
        </div>

        <!-- "Next a few account" section -->
        <div class="next-account-panel" id="nextAccountPanel">
            <div class="next-text">
                <span>⚡</span>
                <span>Next a few account</span>
            </div>
            <div class="next-badge">launch AI →</div>
        </div>

        <div class="legal-footnote">
            © 2026 NEXA HUB AI
        </div>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const emailInput = document.getElementById('nexaEmail');
        const passwordInput = document.getElementById('nexaPassword');
        const birthdateInput = document.getElementById('birthdateField');
        const continueBtn = document.getElementById('continueBtn');
        const loginBtn = document.getElementById('loginBtn');
        const emailErrorDiv = document.getElementById('emailError');
        const dateErrorDiv = document.getElementById('dateError');
        const pwdHintSpan = document.getElementById('pwdHint');
        const themeToggle = document.getElementById('themeToggleBtn');
        const themeIconSpan = document.getElementById('themeIcon');
        const themeTextSpan = document.getElementById('themeText');
        const nextPanel = document.getElementById('nextAccountPanel');

        // ========== DARK / LIGHT MODE ==========
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark');
                localStorage.setItem('nexaHubTheme', 'dark');
                if(themeIconSpan) themeIconSpan.innerText = '☀️';
                if(themeTextSpan) themeTextSpan.innerText = 'Light mode';
            } else {
                document.body.classList.remove('dark');
                localStorage.setItem('nexaHubTheme', 'light');
                if(themeIconSpan) themeIconSpan.innerText = '🌙';
                if(themeTextSpan) themeTextSpan.innerText = 'Dark mode';
            }
        }

        function toggleTheme() {
            if (document.body.classList.contains('dark')) {
                setTheme('light');
            } else {
                setTheme('dark');
            }
        }

        const savedTheme = localStorage.getItem('nexaHubTheme');
        if (savedTheme === 'dark') {
            setTheme('dark');
        } else {
            setTheme('light');
        }

        themeToggle.addEventListener('click', toggleTheme);

        // ========== FORM VALIDATION HELPERS ==========
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
            return emailRegex.test(email);
        }

        function isValidBirthdate(dateStr) {
            if (!dateStr) return false;
            const regex = /^(\d{2})\/(\d{2})\/(\d{4})$/;
            if (!regex.test(dateStr)) return false;
            const day = parseInt(dateStr.substring(0,2), 10);
            const month = parseInt(dateStr.substring(3,5), 10);
            const year = parseInt(dateStr.substring(6,10), 10);
            if (month < 1 || month > 12) return false;
            if (day < 1 || day > 31) return false;
            const daysInMonth = new Date(year, month, 0).getDate();
            if (day > daysInMonth) return false;
            const currentYear = new Date().getFullYear();
            if (year < 1900 || year > currentYear) return false;
            return true;
        }

        function updatePasswordHint() {
            const pwd = passwordInput.value;
            if (pwd.length === 0) {
                pwdHintSpan.innerHTML = '🔒 8+ characters, letters & numbers';
                pwdHintSpan.style.color = 'var(--text-muted)';
                return;
            }
            if (pwd.length >= 8) {
                const hasLetter = /[A-Za-z]/.test(pwd);
                const hasNumber = /\d/.test(pwd);
                const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pwd);
                if (hasLetter && hasNumber && hasSpecial) {
                    pwdHintSpan.innerHTML = '✅ Strong password!';
                    pwdHintSpan.style.color = 'var(--success-color)';
                } else if (hasLetter && hasNumber) {
                    pwdHintSpan.innerHTML = '⚡ Good — add symbols';
                    pwdHintSpan.style.color = 'var(--warning-color)';
                } else {
                    pwdHintSpan.innerHTML = '⚠️ Use letters & numbers';
                    pwdHintSpan.style.color = 'var(--error-color)';
                }
            } else {
                pwdHintSpan.innerHTML = '❌ 8+ characters required';
                pwdHintSpan.style.color = 'var(--error-color)';
            }
        }

        // Event listeners
        emailInput.addEventListener('input', () => {
            emailErrorDiv.style.display = 'none';
        });

        birthdateInput.addEventListener('input', function() {
            dateErrorDiv.style.display = 'none';
            // auto-format dd/mm/yyyy while typing
            let raw = birthdateInput.value.replace(/\D/g, '');
            if (raw.length >= 2 && raw.length < 5 && !birthdateInput.value.includes('/')) {
                if (raw.length === 2) {
                    birthdateInput.value = raw + '/';
                } else if (raw.length === 4 && birthdateInput.value.length === 4 && !birthdateInput.value.includes('/')) {
                    birthdateInput.value = raw.slice(0,2) + '/' + raw.slice(2);
                }
            } else if (raw.length >= 5 && raw.length <= 8) {
                let dayPart = raw.slice(0,2);
                let monthPart = raw.slice(2,4);
                let yearPart = raw.slice(4,8);
                let formatted = dayPart;
                if (monthPart) formatted += '/' + monthPart;
                if (yearPart) formatted += '/' + yearPart;
                if (formatted !== birthdateInput.value) {
                    birthdateInput.value = formatted;
                }
            }
        });

        passwordInput.addEventListener('input', updatePasswordHint);
        updatePasswordHint();

        // Core continue action
        function performContinue() {
            let isValid = true;
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const birthdate = birthdateInput.value.trim();

            if (!email) {
                emailErrorDiv.textContent = '⚠️ Email is required';
                emailErrorDiv.style.display = 'flex';
                isValid = false;
            } else if (!isValidEmail(email)) {
                emailErrorDiv.textContent = '⚠️ Valid email required';
                emailErrorDiv.style.display = 'flex';
                isValid = false;
            } else {
                emailErrorDiv.style.display = 'none';
            }

            if (!password) {
                pwdHintSpan.innerHTML = '❌ Password required';
                pwdHintSpan.style.color = 'var(--error-color)';
                isValid = false;
            } else if (password.length < 8) {
                pwdHintSpan.innerHTML = '❌ Min 8 characters';
                pwdHintSpan.style.color = 'var(--error-color)';
                isValid = false;
            } else {
                const hasLetter = /[A-Za-z]/.test(password);
                const hasNumber = /\d/.test(password);
                if (!hasLetter || !hasNumber) {
                    pwdHintSpan.innerHTML = '⚠️ Include letters & numbers';
                    pwdHintSpan.style.color = 'var(--warning-color)';
                } else {
                    updatePasswordHint();
                }
            }

            if (!birthdate) {
                dateErrorDiv.textContent = '📅 Birthdate required';
                dateErrorDiv.style.display = 'flex';
                isValid = false;
            } else if (!isValidBirthdate(birthdate)) {
                dateErrorDiv.textContent = '⚠️ Invalid date (dd/mm/yyyy)';
                dateErrorDiv.style.display = 'flex';
                isValid = false;
            } else {
                const parts = birthdate.split('/');
                const day = parseInt(parts[0],10);
                const month = parseInt(parts[1],10);
                const year = parseInt(parts[2],10);
                const today = new Date();
                let age = today.getFullYear() - year;
                const birthDateObj = new Date(year, month-1, day);
                if (today < birthDateObj) age--;
                if (age < 13) {
                    dateErrorDiv.textContent = `⚠️ Must be 13+ (age: ${age})`;
                    dateErrorDiv.style.display = 'flex';
                    isValid = false;
                } else {
                    dateErrorDiv.style.display = 'none';
                }
            }

            if (isValid) {
                alert(`✨ Welcome to NEXA HUB AI!\n\nEmail: ${email}\nBirthdate: ${birthdate}\n\nYour AI journey begins.`);
            } else {
                const firstError = document.querySelector('.error-tooltip[style*="display: flex"]');
                if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function handleLogin() {
            const emailHint = emailInput.value.trim();
            if (emailHint) {
                alert(`🔐 Login: “${emailHint}” — secure AI sign in.`);
            } else {
                alert(`🔐 NEXA HUB AI login portal.`);
            }
        }

        continueBtn.addEventListener('click', (e) => {
            e.preventDefault();
            performContinue();
        });

        loginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleLogin();
        });

        if (nextPanel) {
            nextPanel.addEventListener('click', () => {
                alert('🚀 "Next a few account" — Complete your AI profile.');
            });
        }

        const formFields = [emailInput, passwordInput, birthdateInput];
        formFields.forEach(field => {
            field.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performContinue();
                }
            });
        });
    })();
</script>
</body>
</html>
