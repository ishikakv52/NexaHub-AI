<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NEXA HUB AI | Text to Speak | Dark Blue Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== DARK BLUE BACKGROUND - RICH NAVY THEME ========== */
        :root {
            /* Dark Blue Mode (Default - Deep Ocean Blue) */
            --bg-dark-1: #0a1628;
            --bg-dark-2: #061220;
            --bg-dark-3: #030d18;
            --card-bg-dark: rgba(8, 20, 40, 0.85);
            --card-border-dark: rgba(50, 120, 220, 0.5);
            --text-primary-dark: #f0f6ff;
            --text-secondary-dark: #c5ddff;
            --text-muted-dark: #8aadff;
            --input-bg-dark: rgba(3, 12, 25, 0.95);
            --input-border-dark: rgba(50, 110, 210, 0.7);
            --ctrl-bg-dark: rgba(10, 25, 48, 0.8);
            --ctrl-border-dark: rgba(60, 130, 240, 0.5);
            --select-bg-dark: #071a30;
            --select-border-dark: #2a4a7a;
            --btn-secondary-bg-dark: rgba(15, 35, 60, 0.9);
            --status-bg-dark: rgba(5, 18, 35, 0.8);
            --voice-badge-dark: #0a1a3ecc;
            --footer-color-dark: #6a9ad6;
            --hub-grad-start-dark: #4a9eff;
            --hub-grad-end-dark: #8abcff;
            --shadow-dark: 0 30px 50px rgba(0, 0, 0, 0.5);
            --thumb-color-dark: #5a9eff;
        }

        /* Light Mode - Clean Bright */
        body.light {
            --bg-dark-1: #dce5f5;
            --bg-dark-2: #d0dcef;
            --bg-dark-3: #c5d4e8;
            --card-bg-dark: rgba(245, 250, 255, 0.92);
            --card-border-dark: rgba(60, 120, 210, 0.4);
            --text-primary-dark: #1a2a4a;
            --text-secondary-dark: #2c3e66;
            --text-muted-dark: #4a6a9e;
            --input-bg-dark: rgba(255, 255, 255, 0.96);
            --input-border-dark: rgba(60, 120, 210, 0.5);
            --ctrl-bg-dark: rgba(235, 242, 255, 0.88);
            --ctrl-border-dark: rgba(60, 120, 210, 0.4);
            --select-bg-dark: #ffffff;
            --select-border-dark: #8aaccf;
            --btn-secondary-bg-dark: rgba(220, 232, 250, 0.9);
            --status-bg-dark: rgba(235, 242, 255, 0.88);
            --voice-badge-dark: #d4e2ffcc;
            --footer-color-dark: #5a7bb5;
            --hub-grad-start-dark: #2a6ad0;
            --hub-grad-end-dark: #5a8fdf;
            --shadow-dark: 0 30px 50px rgba(0, 0, 0, 0.12);
            --thumb-color-dark: #4a7ad0;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, var(--bg-dark-1), var(--bg-dark-2), var(--bg-dark-3));
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.2s ease;
        }

        /* floating stars effect - subtle */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
            animation: floatStar 8s infinite ease-in-out;
        }

        body.light .star {
            opacity: 0.1;
            background: #3a6bc0;
        }

        @keyframes floatStar {
            0% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 0.45; }
            100% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
        }

        /* main container */
        .hero-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* glass card - deep blue tint */
        .nexa-container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg-dark);
            backdrop-filter: blur(18px);
            border-radius: 2.5rem;
            border: 1px solid var(--card-border-dark);
            box-shadow: var(--shadow-dark);
            padding: 2rem 2.2rem 2.5rem;
            transition: all 0.3s ease;
        }

        /* header section */
        .brand-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .brand-left {
            flex-shrink: 0;
            text-align: left;
        }

        .nexa-white {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-primary-dark);
            letter-spacing: -0.02em;
            display: inline-block;
            line-height: 1.2;
        }

        .hub-blue {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--hub-grad-start-dark), var(--hub-grad-end-dark));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            display: inline-block;
            margin-left: 8px;
        }

        .brand-right {
            text-align: right;
            flex-shrink: 0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-switch-wrapper {
            display: flex;
            align-items: center;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #1a3a6e;
            transition: 0.3s;
            border-radius: 30px;
        }

        .slider:before {
            position: absolute;
            content: "🌙";
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        input:checked + .slider:before {
            content: "☀️";
            transform: translateX(30px);
        }

        body.light .slider {
            background-color: #5a7bb5;
        }

        .mode-text {
            margin-left: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted-dark);
        }

        /* Page Name Section - TEXT TO SPEAK with NEW VIBRANT COLOR */
        .page-name-section {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00e5ff, #00b4d8, #00f5d4, #48cae4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            letter-spacing: -0.01em;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        .page-sub {
            font-size: 0.7rem;
            color: var(--text-muted-dark);
            margin-top: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* input area - 1500 character limit */
        .input-group {
            margin-bottom: 2rem;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.8rem;
            color: var(--text-secondary-dark);
            font-weight: 600;
        }

        .char-counter {
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            font-family: monospace;
            color: var(--text-muted-dark);
            transition: all 0.2s;
        }

        .char-counter.warning {
            background: rgba(255, 150, 50, 0.3);
            color: #ffcc88;
        }

        .char-counter.danger {
            background: rgba(255, 70, 70, 0.4);
            color: #ffaaaa;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        textarea {
            width: 100%;
            background: var(--input-bg-dark);
            border: 1.5px solid var(--input-border-dark);
            border-radius: 1.8rem;
            padding: 1.1rem 1.5rem;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-primary-dark);
            font-family: 'Inter', monospace;
            resize: vertical;
            transition: all 0.25s;
            outline: none;
        }

        textarea:focus {
            border-color: #5d9eff;
            box-shadow: 0 0 0 3px rgba(70, 140, 255, 0.25);
        }

        /* control cards */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 2rem;
            justify-content: space-between;
        }

        .ctrl-card {
            flex: 1;
            min-width: 140px;
            background: var(--ctrl-bg-dark);
            backdrop-filter: blur(5px);
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            border: 1px solid var(--ctrl-border-dark);
            transition: all 0.2s;
        }

        .ctrl-card:hover {
            transform: translateY(-2px);
            border-color: var(--hub-grad-start-dark);
        }

        .ctrl-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--text-muted-dark);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        select {
            width: 100%;
            background: var(--select-bg-dark);
            border: 1px solid var(--select-border-dark);
            border-radius: 2rem;
            padding: 0.5rem 0.8rem;
            color: var(--text-primary-dark);
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
        }

        select:hover {
            border-color: var(--hub-grad-start-dark);
        }

        .range-value {
            width: 100%;
            background: var(--select-bg-dark);
            border: 1px solid var(--select-border-dark);
            border-radius: 2rem;
            padding: 0.5rem 0.8rem;
            color: var(--text-primary-dark);
            font-weight: 500;
            text-align: center;
            margin-top: 8px;
            font-size: 0.8rem;
        }

        input[type="range"] {
            width: 100%;
            background: var(--select-border-dark);
            height: 4px;
            border-radius: 10px;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--thumb-color-dark);
            cursor: pointer;
            border: 2px solid #ffffff;
        }

        /* action buttons */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.8rem 0 1.2rem;
            justify-content: center;
        }

        .btn {
            border: none;
            background: var(--ctrl-bg-dark);
            backdrop-filter: blur(8px);
            padding: 0.8rem 1.6rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-primary-dark);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--ctrl-border-dark);
        }

        .btn-primary {
            background: linear-gradient(125deg, #1a3a7a, #0a1f4a);
            border-color: #5a9eff;
        }

        body.light .btn-primary {
            background: linear-gradient(125deg, #3a6bc0, #2a5598);
            border-color: #5a8fcf;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
            box-shadow: 0 5px 15px rgba(0, 100, 255, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            background: var(--select-bg-dark);
        }

        /* status area */
        .status-area {
            margin-top: 1.5rem;
            background: var(--status-bg-dark);
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid var(--ctrl-border-dark);
        }

        .voice-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--voice-badge-dark);
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #5effb0;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #3effa0;
            animation: softPulse 1.5s infinite;
        }

        @keyframes softPulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .status-text {
            color: var(--text-secondary-dark);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .voice-preview {
            font-size: 0.7rem;
            background: var(--voice-badge-dark);
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            font-weight: 500;
            color: var(--text-secondary-dark);
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: var(--footer-color-dark);
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* speaking wave animation */
        .speaking-wave {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle, #4c9eff, #0066ff);
            border-radius: 50%;
            animation: wave 0.8s infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes wave {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* responsive */
        @media (max-width: 680px) {
            .nexa-container {
                padding: 1.5rem;
            }
            .control-panel {
                flex-direction: column;
            }
            .btn {
                padding: 0.7rem 1.2rem;
                font-size: 0.85rem;
            }
            .nexa-white, .hub-blue {
                font-size: 1.6rem;
            }
            .page-title {
                font-size: 1.5rem;
            }
            .brand-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .brand-right {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <!-- floating stars -->
    <div class="star" style="width: 2px; height: 2px; top: 15%; left: 10%; animation-duration: 8s;"></div>
    <div class="star" style="width: 3px; height: 3px; top: 70%; left: 85%; animation-duration: 11s;"></div>
    <div class="star" style="width: 1.5px; height: 1.5px; top: 40%; left: 20%; animation-duration: 7s;"></div>
    <div class="star" style="width: 2.5px; height: 2.5px; top: 80%; left: 15%; animation-duration: 9s;"></div>
    <div class="star" style="width: 2px; height: 2px; top: 25%; left: 90%; animation-duration: 12s;"></div>
    <div class="star" style="width: 1.8px; height: 1.8px; top: 60%; left: 45%; animation-duration: 6s;"></div>

    <div class="hero-wrapper">
        <div class="nexa-container">
            <div class="brand-section">
                <div class="brand-left">
                    <span class="nexa-white">NEXA</span>
                    <span class="hub-blue">HUB AI</span>
                </div>
                <div class="brand-right">
                    <div class="theme-switch-wrapper">
                        <label class="theme-switch">
                            <input type="checkbox" id="themeToggleCheckbox">
                            <span class="slider"></span>
                        </label>
                        <span class="mode-text" id="modeText">Dark</span>
                    </div>
                </div>
            </div>

            <!-- TEXT TO SPEAK with new vibrant cyan color -->
            <div class="page-name-section">
                <div class="page-title">📢 TEXT TO SPEAK</div>
                <div class="page-sub">ethereal voice synthesis · intelligent resonance engine</div>
            </div>

            <div class="input-group">
                <div class="input-label">
                    <span>📝 SCRIPT INPUT</span>
                    <span class="char-counter" id="charCount">0 / 1500</span>
                </div>
                <textarea id="textInput" rows="5" placeholder="Type or paste your text here..." maxlength="1500"></textarea>
            </div>

            <div class="control-panel">
                <div class="ctrl-card">
                    <div class="ctrl-label">🎙️ VOICE</div>
                    <select id="voiceSelect"></select>
                </div>
                <div class="ctrl-card">
                    <div class="ctrl-label">⚡ RATE</div>
                    <input type="range" id="rateSlider" min="0.5" max="2" step="0.05" value="1">
                    <div class="range-value" id="rateValue">1.00x</div>
                </div>
                <div class="ctrl-card">
                    <div class="ctrl-label">🎼 PITCH</div>
                    <input type="range" id="pitchSlider" min="0.5" max="2" step="0.05" value="1">
                    <div class="range-value" id="pitchValue">1.00</div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="speakBtn">🔊 SPEAK</button>
                <button class="btn btn-secondary" id="pauseBtn">⏸️ PAUSE</button>
                <button class="btn btn-secondary" id="resumeBtn">▶️ RESUME</button>
                <button class="btn btn-secondary" id="stopBtn">⏹️ STOP</button>
            </div>

            <div class="status-area">
                <div class="voice-badge">
                    <span class="pulse-dot"></span>
                    <span class="status-text" id=""> Deep Blue · Ready</span>
                </div>
                <div id="voiceNamePreview" class="voice-preview">
                    💠 voice: system default
                </div>
            </div>
            <div class="footer-note">
                <span>© 2026 NEXA HUB AI</span>
                <!-- <span>🌊 Deep Blue Theme</span>
                <span>⚡ Adjust rate & pitch</span>
                <span>🌙 Light/Dark Mode</span>
            </div>
        </div> -->
    </div>

    <script>
        (function(){
            // DOM elements
            const textarea = document.getElementById('textInput');
            const charCounter = document.getElementById('charCount');
            const voiceSelect = document.getElementById('voiceSelect');
            const rateSlider = document.getElementById('rateSlider');
            const pitchSlider = document.getElementById('pitchSlider');
            const rateValue = document.getElementById('rateValue');
            const pitchValue = document.getElementById('pitchValue');
            const speakBtn = document.getElementById('speakBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resumeBtn = document.getElementById('resumeBtn');
            const stopBtn = document.getElementById('stopBtn');
            const statusMsgSpan = document.getElementById('statusMsg');
            const voiceNamePreview = document.getElementById('voiceNamePreview');

            // Theme Toggle Elements
            const themeCheckbox = document.getElementById('themeToggleCheckbox');
            const modeTextSpan = document.getElementById('modeText');

            // Character counter with visual feedback (1500 limit)
            function updateCharCount() {
                const len = textarea.value.length;
                const maxLen = 1500;
                charCounter.innerText = `${len} / ${maxLen}`;
                
                if (len >= maxLen) {
                    charCounter.classList.add('danger');
                    charCounter.classList.remove('warning');
                } else if (len >= maxLen * 0.9) {
                    charCounter.classList.add('warning');
                    charCounter.classList.remove('danger');
                } else {
                    charCounter.classList.remove('warning', 'danger');
                }
            }
            textarea.addEventListener('input', updateCharCount);
            updateCharCount();

            // Dark / Light Mode Functionality
            function setTheme(isDark) {
                if (isDark) {
                    document.body.classList.remove('light');
                    themeCheckbox.checked = false;
                    modeTextSpan.textContent = 'Dark';
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.add('light');
                    themeCheckbox.checked = true;
                    modeTextSpan.textContent = 'Light';
                    localStorage.setItem('theme', 'light');
                }
            }

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                setTheme(false);
            } else {
                setTheme(true);
            }

            themeCheckbox.addEventListener('change', (e) => {
                setTheme(!e.target.checked);
            });

            // Text to Speech Functionality
            let synth = window.speechSynthesis;
            let currentUtterance = null;
            let selectedVoiceObj = null;

            function updateRateLabel() {
                rateValue.innerText = parseFloat(rateSlider.value).toFixed(2) + 'x';
            }
            function updatePitchLabel() {
                pitchValue.innerText = parseFloat(pitchSlider.value).toFixed(2);
            }
            rateSlider.addEventListener('input', updateRateLabel);
            pitchSlider.addEventListener('input', updatePitchLabel);
            updateRateLabel();
            updatePitchLabel();

            function populateVoiceList() {
                let voices = synth.getVoices();
                if (!voices || voices.length === 0) {
                    setTimeout(populateVoiceList, 60);
                    return;
                }
                const previousVoiceName = selectedVoiceObj ? selectedVoiceObj.name : null;
                voiceSelect.innerHTML = '';
                voices.forEach((voice, idx) => {
                    const option = document.createElement('option');
                    option.value = idx;
                    option.textContent = `${voice.name} (${voice.lang})`;
                    voiceSelect.appendChild(option);
                });
                
                if (previousVoiceName) {
                    const matchedIdx = voices.findIndex(v => v.name === previousVoiceName);
                    if (matchedIdx !== -1) {
                        selectedVoiceObj = voices[matchedIdx];
                        voiceSelect.selectedIndex = matchedIdx;
                        updateVoicePreview(selectedVoiceObj);
                        return;
                    }
                }
                let defaultVoice = voices.find(v => v.default) || voices[0];
                if (defaultVoice) {
                    selectedVoiceObj = defaultVoice;
                    voiceSelect.selectedIndex = voices.indexOf(defaultVoice);
                    updateVoicePreview(defaultVoice);
                }
            }

            function updateVoicePreview(voice) {
                if(voice) {
                    let shortName = voice.name.length > 28 ? voice.name.substring(0, 25) + '...' : voice.name;
                    voiceNamePreview.innerHTML = `💠 voice: ${shortName}`;
                } else {
                    voiceNamePreview.innerHTML = `💠 voice: system default`;
                }
            }

            voiceSelect.addEventListener('change', (e) => {
                const voices = synth.getVoices();
                const idx = parseInt(e.target.value);
                if(voices && voices[idx]) {
                    selectedVoiceObj = voices[idx];
                    updateVoicePreview(selectedVoiceObj);
                }
            });

            if(synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = populateVoiceList;
            }
            populateVoiceList();

            function removeWaveEffect() {
                const statusText = document.getElementById('statusMsg');
                if (statusText && statusText.innerHTML.includes('speaking-wave')) {
                    statusText.innerHTML = statusText.innerHTML.replace('<span class="speaking-wave"></span>', '');
                }
            }

            function createUtterance() {
                const text = textarea.value.trim();
                if(!text) {
                    statusMsgSpan.innerText = "⚠️ No text to speak";
                    return null;
                }
                const voices = synth.getVoices();
                let activeVoice = selectedVoiceObj;
                if(activeVoice && !voices.some(v => v.name === activeVoice.name) && voices.length) {
                    activeVoice = voices[0];
                    selectedVoiceObj = activeVoice;
                    updateVoicePreview(activeVoice);
                    voiceSelect.selectedIndex = 0;
                } else if (!activeVoice && voices.length) {
                    activeVoice = voices[0];
                    selectedVoiceObj = activeVoice;
                    updateVoicePreview(activeVoice);
                }
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = parseFloat(rateSlider.value);
                utterance.pitch = parseFloat(pitchSlider.value);
                if(activeVoice) utterance.voice = activeVoice;
                
                utterance.onstart = () => {
                    statusMsgSpan.innerHTML = "🔊 Speaking <span class='speaking-wave'></span>";
                };
                utterance.onend = () => {
                    statusMsgSpan.innerText = "✔️ Finished";
                    removeWaveEffect();
                    currentUtterance = null;
                };
                utterance.onerror = () => {
                    statusMsgSpan.innerText = "❌ Error occurred";
                    removeWaveEffect();
                    currentUtterance = null;
                };
                utterance.onpause = () => {
                    statusMsgSpan.innerText = "⏸️ Paused";
                    removeWaveEffect();
                };
                utterance.onresume = () => {
                    statusMsgSpan.innerHTML = "🔊 Resumed <span class='speaking-wave'></span>";
                };
                return utterance;
            }

            function speak() {
                if(synth.speaking || synth.pending) {
                    synth.cancel();
                    if(currentUtterance) {
                        currentUtterance = null;
                    }
                    setTimeout(() => {
                        const newUtterance = createUtterance();
                        if(!newUtterance) return;
                        currentUtterance = newUtterance;
                        try {
                            synth.speak(currentUtterance);
                            statusMsgSpan.innerHTML = "✨ Summoning voice... <span class='speaking-wave'></span>";
                        } catch(err) {
                            statusMsgSpan.innerText = "⚠️ Speech failed";
                            currentUtterance = null;
                        }
                    }, 20);
                    return;
                }
                const newUtterance = createUtterance();
                if(!newUtterance) return;
                currentUtterance = newUtterance;
                try {
                    synth.speak(currentUtterance);
                    statusMsgSpan.innerHTML = "✨ Summoning voice... <span class='speaking-wave'></span>";
                } catch(err) {
                    statusMsgSpan.innerText = "⚠️ Speech error";
                    currentUtterance = null;
                }
            }

            function pauseSpeech() {
                if(synth.speaking && !synth.paused) {
                    synth.pause();
                    statusMsgSpan.innerText = "⏸️ Paused";
                    removeWaveEffect();
                } else if(!synth.speaking) {
                    statusMsgSpan.innerText = "Nothing playing";
                }
            }

            function resumeSpeech() {
                if(synth.paused) {
                    synth.resume();
                } else if(!synth.speaking) {
                    statusMsgSpan.innerText = "No active session";
                }
            }

            function stopSpeech() {
                if(synth.speaking || synth.pending) synth.cancel();
                if(currentUtterance) currentUtterance = null;
                statusMsgSpan.innerText = "⏹️ Stopped";
                removeWaveEffect();
            }

            speakBtn.addEventListener('click', speak);
            pauseBtn.addEventListener('click', pauseSpeech);
            resumeBtn.addEventListener('click', resumeSpeech);
            stopBtn.addEventListener('click', stopSpeech);

            function refreshVoiceList() {
                const prevVoice = selectedVoiceObj;
                populateVoiceList();
                if(prevVoice) {
                    const newVoices = synth.getVoices();
                    const matched = newVoices.find(v => v.name === prevVoice.name);
                    if(matched) {
                        selectedVoiceObj = matched;
                        updateVoicePreview(matched);
                        voiceSelect.selectedIndex = newVoices.indexOf(matched);
                    }
                }
            }
            
            if(synth.addEventListener) synth.addEventListener('voiceschanged', refreshVoiceList);
            
            window.addEventListener('beforeunload', () => { if(synth.speaking) synth.cancel(); });
            
            setTimeout(() => {
                if(synth.getVoices().length && !selectedVoiceObj) {
                    selectedVoiceObj = synth.getVoices()[0];
                    updateVoicePreview(selectedVoiceObj);
                    if(voiceSelect.options.length) voiceSelect.selectedIndex = 0;
                }
            }, 200);
            
            statusMsgSpan.innerText = "🌊 Deep Blue · Ready";
        })();
    </script>
</body>
</html>
