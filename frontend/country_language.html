            --hub-blue: #2563eb;
            --question-color: #334155;
            --label-color: #334155;
            --footer-color: #64748b;
        }

            --label-color: #cbd5e6;
            --footer-color: #94a3b8;
        }

            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
        }

        .nexa-compact {
            max-width: 480px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

            text-align: center;

        }

            right: 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 0.25rem 0.7rem;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.2s;
        }

        .theme-toggle-small:hover {
            background: var(--btn-bg);
            color: white;
            border-color: var(--input-focus);
        }

            margin-bottom: 0.2rem;
        }

            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hub-blue {

            background-clip: text;

        }

        .badge-small {

            font-size: 0.6rem;
            font-weight: 600;
            color: var(--hub-blue);
        }

        .question-small {

            font-weight: 600;
            color: var(--question-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

            color: var(--label-color);

            color: var(--text-primary);

            width: 100%;
            padding: 0.7rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.8rem;
            color: white;

            "Vatican City": "🇻🇦", "Venezuela": "🇻🇪", "Vietnam": "🇻🇳", "Yemen": "🇾🇪", "Zambia": "🇿🇲", "Zimbabwe": "🇿🇼"
        };
        return flagMap[countryName] || "🌍";
    }

    // Populate country dropdown
    const countrySelect = document.getElementById('countrySelect');
    allCountries.forEach(country => {
        const option = document.createElement('option');
        option.value = country;
        const flag = getFlagEmoji(country);
        option.textContent = `${flag} ${country}`;
        countrySelect.appendChild(option);
    });

    // Populate language dropdown with 195 languages (simple text)
    const languageSelect = document.getElementById('languageSelect');
    allLanguages.forEach(lang => {
        const option = document.createElement('option');
        option.value = lang;
        option.textContent = lang;
        languageSelect.appendChild(option);
    });

    // Additional UI elements
    const continueBtn = document.getElementById('continueBtn');
    const resultPreview = document.getElementById('resultPreview');
    const resultText = document.getElementById('resultText');
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');

    // Theme handling
    function setTheme(theme) {
        if (theme === 'dark') {
            document.body.classList.add('dark');
            localStorage.setItem('nexaTheme', 'dark');
            themeLabel.innerText = 'Light mode';
        } else {
            document.body.classList.remove('dark');
            localStorage.setItem('nexaTheme', 'light');
            themeLabel.innerText = 'Dark mode';
        }
    }
    function toggleTheme() { setTheme(document.body.classList.contains('dark') ? 'light' : 'dark'); }
    function loadSavedTheme() { const saved = localStorage.getItem('nexaTheme'); setTheme(saved === 'dark' ? 'dark' : 'light'); }

    // Helper functions
    function generateGeoCode(country, language) {
        const cPrefix = country.substring(0, 2).toUpperCase().replace(/[^A-Z]/g, '');
        const lPrefix = language.substring(0, 2).toUpperCase().replace(/[^A-Z]/g, '');
        return `NEXA·${cPrefix}${lPrefix}`;
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    function handleContinue() {
        const country = countrySelect.value;
        const language = languageSelect.value;

        if (!country) { alert("🌍 Please select your country from 195 nations"); countrySelect.focus(); return; }
        if (!language) { alert("🗣️ Please select your language from 195 languages"); languageSelect.focus(); return; }

        const countryFlag = getFlagEmoji(country);
        const geoCode = generateGeoCode(country, language);
        
        resultText.innerHTML = `
            <div>📍 <strong>Country:</strong> ${escapeHtml(country)} ${countryFlag}</div>
            <div>🗣️ <strong>Language:</strong> ${escapeHtml(language)}</div>
            <div style="font-size:0.7rem; color:var(--hub-blue); margin-top:0.3rem;">🔑 ${escapeHtml(geoCode)} · global access</div>
            <div style="font-size:0.6rem; margin-top:0.2rem; opacity:0.7;">🌐 195 nations · 195 languages · inclusive identity</div>
        `;
        resultPreview.style.display = "block";
        resultPreview.scrollIntoView({ behavior: "smooth", block: "nearest" });
        sessionStorage.setItem('nexaProfile', JSON.stringify({ country, language, timestamp: Date.now() }));
    }

    // Event Listeners
    continueBtn.addEventListener('click', handleContinue);
    themeToggle.addEventListener('click', toggleTheme);
    countrySelect.addEventListener('change', () => { if (resultPreview.style.display === 'block') resultPreview.style.display = 'none'; });
    languageSelect.addEventListener('change', () => { if (resultPreview.style.display === 'block') resultPreview.style.display = 'none'; });
    
    loadSavedTheme();
</script>
</body>
</html>
