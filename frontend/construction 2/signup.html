<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NEXA HUB AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1a5e3a;
            --primary-dark: #0f4027;
            --secondary: #f59e0b;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 20px 60px rgba(0,0,0,0.1);
            --radius: 16px;
            --transition: all 0.3s ease;
            --particle-color: rgba(15, 23, 42, 0.10);
            --gradient-1: #e8f0fe;
            --gradient-2: #d4e4f7;
            --gradient-3: #f0f4ff;
            --btn-shadow: rgba(26, 94, 58, 0.3);
        }
        
        [data-theme="dark"] {
            --bg: #0a0f1e;
            --card-bg: #151e2f;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --shadow: 0 20px 60px rgba(0,0,0,0.5);
            --particle-color: rgba(255,255,255,0.08);
            --gradient-1: #0a0f1e;
            --gradient-2: #151e2f;
            --gradient-3: #1a2744;
            --btn-shadow: rgba(0,0,0,0.5);
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        /* ============================================
           एनिमेशन 1: ग्रेडिएंट मूव
        ============================================ */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2), var(--gradient-3), var(--gradient-1));
            background-size: 300% 300%;
            animation: gradientShift 12s ease-in-out infinite;
            transition: var(--transition);
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 0%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 100%; }
            100% { background-position: 0% 50%; }
        }
        
        /* ============================================
           एनिमेशन 2: फ्लोटिंग पार्टिकल्स
        ============================================ */
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--particle-color);
            animation: floatParticle 20s ease-in-out infinite;
        }
        
        .particle:nth-child(1) { width: 12px; height: 12px; left: 5%; top: 80%; animation-delay: 0s; animation-duration: 22s; }
        .particle:nth-child(2) { width: 20px; height: 20px; left: 15%; top: 70%; animation-delay: 2s; animation-duration: 28s; }
        .particle:nth-child(3) { width: 8px; height: 8px; left: 25%; top: 85%; animation-delay: 4s; animation-duration: 18s; }
        .particle:nth-child(4) { width: 16px; height: 16px; left: 35%; top: 60%; animation-delay: 1s; animation-duration: 24s; }
        .particle:nth-child(5) { width: 10px; height: 10px; left: 45%; top: 90%; animation-delay: 3s; animation-duration: 30s; }
        .particle:nth-child(6) { width: 24px; height: 24px; left: 55%; top: 75%; animation-delay: 5s; animation-duration: 26s; }
        .particle:nth-child(7) { width: 14px; height: 14px; left: 65%; top: 85%; animation-delay: 2.5s; animation-duration: 20s; }
        .particle:nth-child(8) { width: 18px; height: 18px; left: 75%; top: 65%; animation-delay: 4.5s; animation-duration: 32s; }
        .particle:nth-child(9) { width: 8px; height: 8px; left: 85%; top: 80%; animation-delay: 1.5s; animation-duration: 16s; }
        .particle:nth-child(10) { width: 22px; height: 22px; left: 95%; top: 70%; animation-delay: 3.5s; animation-duration: 25s; }
        .particle:nth-child(11) { width: 15px; height: 15px; left: 10%; top: 50%; animation-delay: 6s; animation-duration: 27s; }
        .particle:nth-child(12) { width: 9px; height: 9px; left: 50%; top: 45%; animation-delay: 7s; animation-duration: 19s; }
        
        @keyframes floatParticle {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.5; }
            20% { opacity: 0.8; }
            50% { transform: translateY(-200px) translateX(80px) scale(1.6); opacity: 0.2; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-400px) translateX(-50px) scale(0.7); opacity: 0; }
        }
        
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: slideUp 0.6s ease;
            transition: var(--transition);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            color: white;
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo p {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        
        .form-group .input-wrapper {
            position: relative;
        }
        
        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            outline: none;
        }
        
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(26, 94, 58, 0.1);
        }
        
        .btn-signup {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--btn-shadow);
        }
        
        .btn-signup:active {
            transform: scale(0.96);
        }
        
        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover { text-decoration: underline; }
        
        /* ============================================
           THEME TOGGLE - आइकन उल्टे (SWAPPED)
        ============================================ */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow);
        }
        
        .theme-toggle:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }
        
        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; }
            .form-row { grid-template-columns: 1fr; }
            .logo h1 { font-size: 20px; }
            .theme-toggle { top: 12px; right: 12px; padding: 8px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- THEME TOGGLE - आइकन उल्टे -->
    <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun" id="themeIcon"></i>
        <span id="themeLabel">Light Mode</span>
    </button>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-hard-hat"></i></div>
                <h1>NEXA HUB AI</h1>
                <p>Create Your Account</p>
            </div>
            
            <form onsubmit="event.preventDefault(); alert('✅ Account created successfully!'); window.location.href='login.html';">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" placeholder="John" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" placeholder="Doe" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="your@email.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" placeholder="+1 234 567 890">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Create password" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Confirm password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-signup">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // THEME TOGGLE - आइकन उल्टे (SWAPPED)
        // ============================================
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('nexa-signup-theme', theme);
            
            // ✅ आइकन उल्टे (SWAPPED):
            // Light Mode = ☀️ (Sun)
            // Dark Mode = 🌙 (Moon)
            if (theme === 'dark') {
                themeIcon.className = 'fas fa-moon';
                themeLabel.textContent = 'Dark Mode';
            } else {
                themeIcon.className = 'fas fa-sun';
                themeLabel.textContent = 'Light Mode';
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = current === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        }

        // पेज लोड पर थीम लोड करें
        document.addEventListener('DOMContentLoaded', function() {
            const saved = localStorage.getItem('nexa-signup-theme') || 'light';
            setTheme(saved);
        });

        // क्लिक इवेंट
        themeToggle.addEventListener('click', toggleTheme);

        console.log('✅ Theme toggle with SWAPPED icons working perfectly!');
        console.log('Current theme:', document.documentElement.getAttribute('data-theme'));
    </script>
</body>
</html>
