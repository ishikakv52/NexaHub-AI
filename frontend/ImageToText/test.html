<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>OCR Translator</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#111;
            color:white;
            padding:40px;
        }

        h1{
            color:#00ffd5;
        }

        input,
        select,
        button{
            padding:10px;
            margin-top:10px;
            border:none;
            border-radius:8px;
        }

        button{
            background:#00ffd5;
            color:black;
            cursor:pointer;
            font-weight:bold;
        }

        .box{
            margin-top:25px;
            padding:15px;
            background:#1e1e1e;
            border-radius:10px;
        }

        pre{
            white-space: pre-wrap;
            word-wrap: break-word;
        }

    </style>

</head>

<body>

    <h1>OCR + Translation</h1>

    <!-- IMAGE -->

    <input type="file"
           id="imageInput">

    <br><br>

    <!-- LANGUAGE -->

    <select id="targetLanguage">

        <option value="en">
            English
        </option>

        <option value="hi">
            Hindi
        </option>

        <option value="ta">
            Tamil
        </option>

        <option value="bn">
            Bengali
        </option>

    </select>

    <br><br>

    <!-- BUTTON -->

    <button onclick="uploadImage()">

        Extract Text

    </button>

    <!-- RESULT -->

    <div class="box">

        <h3>Detected Language</h3>

        <p id="language">
            Waiting...
        </p>

    </div>

    <div class="box">

        <h3>Extracted Text</h3>

        <pre id="text">
Waiting...
        </pre>

    </div>

    <div class="box">

        <h3>Translated Text</h3>

        <pre id="translated">
Waiting...
        </pre>

    </div>


<script>

async function uploadImage(){

    const file =
        document.getElementById(
            'imageInput'
        ).files[0]

    const targetLanguage =
        document.getElementById(
            'targetLanguage'
        ).value

    if(!file){

        alert("Select image first")

        return
    }

    const formData = new FormData()

    formData.append(
        'image',
        file
    )

    formData.append(
        'translate_to',
        targetLanguage
    )

    try{

        const response = await fetch(

            'http://127.0.0.1:8000/api/image-to-text/extract-text/',

            {
                method:'POST',
                body:formData
            }
        )

        const data =
            await response.json()

        console.log(data)

        // ---------- ERROR ----------

        if(!data.success){

            alert(data.error || "Something went wrong")

            return
        }

        // ---------- LANGUAGE ----------

        document.getElementById(
            'language'
        ).innerText =

            data.language
            ? data.language.language_name
            : "Unknown"

        // ---------- OCR TEXT ----------

        document.getElementById(
            'text'
        ).innerText =

            data.extracted_text
            || "No text detected"

        // ---------- TRANSLATION ----------

        document.getElementById(
            'translated'
        ).innerText =

            data.translation &&
            data.translation.translated_text

            ? data.translation.translated_text

            : "No translation"

    }

    catch(error){

        console.log(error)

        alert("Server Error")
    }
}

</script>

</body>

</html>
