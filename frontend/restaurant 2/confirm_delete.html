<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXA HUB AI | Confirm Delete</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

:root{

    --sidebar:#241812;
    --sidebar-dark:#180f0a;
    --orange:#b3541e;
    --orange-dark:#8a3f14;

    --page:#f5f1ea;
    --text:#2b1d14;
    --card:#ffffff;
    --border:#eeeeee;
    --muted:#777777;

}

body{

    background:var(--page);
    color:var(--text);

    min-height:100vh;

    transition:.35s ease;

    animation:pageFade .6s ease;

}

body.dark-mode{

    --page:#111827;
    --text:#f1f5f9;
    --card:#1f2937;
    --border:#374151;
    --muted:#aab4c2;

}

/* ANIMATIONS */

@keyframes pageFade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

@keyframes slideLeft{

    from{
        opacity:0;
        transform:translateX(-30px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }

}

@keyframes popUp{

    from{
        opacity:0;
        transform:scale(.85) translateY(25px);
    }

    to{
        opacity:1;
        transform:scale(1) translateY(0);
    }

}

/* SIDEBAR */

.sidebar{

    position:fixed;

    top:0;
    left:0;

    width:290px;
    height:100vh;

    background:linear-gradient(
        180deg,
        var(--sidebar),
        var(--sidebar-dark)
    );

    color:#fff;

    overflow-y:auto;

    z-index:1000;

    animation:slideLeft .6s ease;

}

.sidebar::-webkit-scrollbar{

    width:5px;

}

.sidebar::-webkit-scrollbar-thumb{

    background:var(--orange);

    border-radius:20px;

}

/* LOGO */

.logo{

    min-height:115px;

    padding:22px 20px;

    display:flex;

    align-items:center;

    gap:12px;

    border-bottom:

        1px solid

        rgba(255,255,255,.08);

}

.logo-icon{

    width:42px;

    height:42px;

    border-radius:12px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:var(--orange);

    color:#fff;

    font-size:20px;

}

.logo-text h2{

    font-size:20px;

    color:#fff;

}

.logo-text span{

    font-size:12px;

    color:#c9b8a8;

    letter-spacing:1px;

}

/* NAVIGATION */

.nav-section{

    padding:16px 18px 7px;

    color:#a89684;

    font-size:11px;

    text-transform:uppercase;

    letter-spacing:1px;

}

.nav-link{

    display:flex;

    align-items:center;

    gap:13px;

    padding:12px 20px;

    color:#d8c9b8;

    text-decoration:none;

    border-left:3px solid transparent;

    transition:.3s ease;

}

.nav-link i{

    width:20px;

    text-align:center;

}

.nav-link:hover{

    color:#fff;

    background:rgba(179,84,30,.18);

    padding-left:28px;

}

.nav-link.active{

    color:#fff;

    background:rgba(179,84,30,.25);

    border-left-color:var(--orange);

}

/* MAIN */

.main{

    margin-left:290px;

    min-height:100vh;

    padding:32px 38px;

}

/* TOP HEADER */

.top-header{

    display:flex;

    justify-content:flex-end;

    margin-bottom:30px;

}

.theme-icon{

    width:46px;

    height:46px;

    border:1px solid var(--border);

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    background:var(--card);

    color:var(--text);

    font-size:19px;

    cursor:pointer;

    transition:.35s ease;

}

.theme-icon:hover{

    transform:

        rotate(25deg)

        scale(1.08);

    background:var(--orange);

    color:#fff;

}

/* DELETE BOX */

.delete-wrapper{

    min-height:

        calc(100vh - 110px);

    display:flex;

    align-items:center;

    justify-content:center;

}

.delete-card{

    width:100%;

    max-width:520px;

    padding:38px 32px;

    text-align:center;

    background:var(--card);

    border:1px solid var(--border);

    border-radius:20px;

    box-shadow:

        0 12px 35px

        rgba(0,0,0,.08);

    animation:popUp .7s ease;

}

.delete-icon{

    width:82px;

    height:82px;

    margin:0 auto 22px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    background:#f8d7da;

    color:#b02a37;

    font-size:35px;

    animation:

        pulse 1.8s infinite;

}

@keyframes pulse{

    0%{

        box-shadow:

            0 0 0 0

            rgba(176,42,55,.25);

    }

    70%{

        box-shadow:

            0 0 0 15px

            rgba(176,42,55,0);

    }

    100%{

        box-shadow:

            0 0 0 0

            rgba(176,42,55,0);

    }

}

.delete-card h1{

    font-size:28px;

    margin-bottom:12px;

}

.delete-card p{

    color:var(--muted);

    line-height:1.6;

    margin-bottom:10px;

}

.customer-name{

    font-weight:700;

    color:var(--text);

    font-size:18px;

    margin:15px 0 25px;

}

/* BUTTONS */

.delete-actions{

    display:flex;

    justify-content:center;

    gap:12px;

}

.btn{

    border:0;

    padding:13px 24px;

    border-radius:8px;

    font-size:15px;

    cursor:pointer;

    transition:.3s ease;

}

.btn:hover{

    transform:translateY(-3px);

}

.cancel-btn{

    background:var(--border);

    color:var(--text);

}

.delete-btn{

    background:#b02a37;

    color:#fff;

}

.delete-btn:hover{

    background:#8f1f2b;

    box-shadow:

        0 7px 18px

        rgba(176,42,55,.3);

}

/* RESPONSIVE */

@media(max-width:850px){

    .sidebar{

        transform:translateX(-100%);

    }

    .sidebar.open{

        transform:translateX(0);

    }

    .main{

        margin-left:0;

        padding:22px 16px;

    }

}

@media(max-width:600px){

    .delete-card{

        padding:30px 20px;

    }

    .delete-actions{

        flex-direction:column;

    }

    .btn{

        width:100%;

    }

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

    <div class="logo">

        <div class="logo-icon">

            <i class="fa-solid fa-fire-burner"></i>

        </div>

        <div class="logo-text">

            <h2>NEXA HUB AI</h2>

            <span>Restaurant</span>

        </div>

    </div>

    <a href="dashboard.html" class="nav-link">

        <i class="fa-solid fa-house"></i>

        Dashboard

    </a>

    <div class="nav-section">

        Management

    </div>

    <a href="employee_list.html" class="nav-link">

        <i class="fa-solid fa-users"></i>

        Employees

    </a>

    <a href="attendance_daily.html" class="nav-link">

        <i class="fa-solid fa-clock"></i>

        Attendance

    </a>

    <a href="department_list.html" class="nav-link">

        <i class="fa-solid fa-building"></i>

        Departments

    </a>

    <div class="nav-section">

        Restaurant

    </div>

    <a href="customer_list.html"

       class="nav-link active">

        <i class="fa-solid fa-address-book"></i>

        Customers

    </a>

    <a href="customer_menu.html"

       class="nav-link">

        <i class="fa-solid fa-book-open"></i>

        Menu

    </a>

    <a href="inventory_list.html"

       class="nav-link">

        <i class="fa-solid fa-boxes-stacked"></i>

        Inventory

    </a>

    <a href="kitchen_display.html"

       class="nav-link">

        <i class="fa-solid fa-kitchen-set"></i>

        Kitchen

    </a>

    <a href="delivery_dashboard.html"

       class="nav-link">

        <i class="fa-solid fa-truck"></i>

        Delivery

    </a>

    <div class="nav-section">

        Finance

    </div>

    <a href="finance_overview.html"

       class="nav-link">

        <i class="fa-solid fa-chart-line"></i>

        Finance Overview

    </a>

    <a href="finance_income_list.html"

       class="nav-link">

        <i class="fa-solid fa-arrow-trend-up"></i>

        Income

    </a>

    <a href="finance_expense_list.html"

       class="nav-link">

        <i class="fa-solid fa-arrow-trend-down"></i>

        Expenses

    </a>

    <a href="finance_asset_list.html"

       class="nav-link">

        <i class="fa-solid fa-building-columns"></i>

        Assets

    </a>

    <a href="login_select.html"

       class="nav-link">

        <i class="fa-solid fa-right-from-bracket"></i>

        Logout

    </a>

</aside>

<!-- MAIN -->

<main class="main">

    <div class="top-header">

        <button

            class="theme-icon"

            id="themeToggle"

            onclick="toggleTheme()">

            <i class="fa-solid fa-sun"></i>

        </button>

    </div>

    <div class="delete-wrapper">

        <section class="delete-card">

            <div class="delete-icon">

                <i class="fa-solid fa-trash"></i>

            </div>

            <h1>

                Confirm Delete

            </h1>

            <p>

                Are you sure you want to delete this customer?

            </p>

            <div class="customer-name">

                Ankit Raj

            </div>

            <p>

                This action cannot be undone.

            </p>

            <div class="delete-actions">

                <button

                    class="btn cancel-btn"

                    onclick="goBack()">

                    <i class="fa-solid fa-xmark"></i>

                    Cancel

                </button>

                <button

                    class="btn delete-btn"

                    onclick="confirmDelete()">

                    <i class="fa-solid fa-trash"></i>

                    Delete Customer

                </button>

            </div>

        </section>

    </div>

</main>

<script>

/* THEME */

const themeToggle =

document.getElementById(

    "themeToggle"

);

const savedTheme =

localStorage.getItem(

    "nexaTheme"

);

if(savedTheme === "dark"){

    document.body

    .classList

    .add("dark-mode");

    themeToggle.innerHTML =

        '<i class="fa-solid fa-moon"></i>';

}

else{

    themeToggle.innerHTML =

        '<i class="fa-solid fa-sun"></i>';

}

function toggleTheme(){

    document.body

    .classList

    .toggle("dark-mode");

    const isDark =

        document.body

        .classList

        .contains("dark-mode");

    if(isDark){

        themeToggle.innerHTML =

            '<i class="fa-solid fa-moon"></i>';

        localStorage.setItem(

            "nexaTheme",

            "dark"

        );

    }

    else{

        themeToggle.innerHTML =

            '<i class="fa-solid fa-sun"></i>';

        localStorage.setItem(

            "nexaTheme",

            "light"

        );

    }

}


/* CANCEL */

function goBack(){

    window.location.href =

        "customer_list.html";

}


/* DELETE */

function confirmDelete(){

    alert(

        "Customer deleted successfully!"

    );

    window.location.href =

        "customer_list.html";

}

</script>

</body>

</html>
