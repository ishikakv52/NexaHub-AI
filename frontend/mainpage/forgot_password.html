<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password - Nexa Hub AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* BODY */

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    transition:0.4s ease;

    background:
    linear-gradient(
    135deg,
    #020617,
    #0f172a,
    #1e3a8a);
}

/* LIGHT MODE */

body.light-mode{
    background:
    linear-gradient(
    135deg,
    #dbeafe,
    #bfdbfe,
    #93c5fd);
}

/* BACKGROUND GLOW */

body::before{
    content:"";
    position:absolute;
    width:320px;
    height:320px;
    border-radius:50%;
    top:-100px;
    left:-100px;

    background:
    rgba(59,130,246,0.22);

    filter:blur(80px);
}

body::after{
    content:"";
    position:absolute;
    width:280px;
    height:280px;
    border-radius:50%;
    bottom:-90px;
    right:-90px;

    background:
    rgba(37,99,235,0.20);

    filter:blur(80px);
}

/* THEME TOGGLE */

.theme-toggle{
    position:absolute;
    top:25px;
    right:25px;

    width:52px;
    height:52px;

    border:none;
    border-radius:50%;

    background:
    rgba(255,255,255,0.12);

    color:white;
    font-size:20px;

    cursor:pointer;

    backdrop-filter:blur(10px);

    transition:0.3s;

    z-index:100;
}

.theme-toggle:hover{
    transform:scale(1.08);
}

body.light-mode .theme-toggle{
    background:
    rgba(255,255,255,0.9);

    color:#1d4ed8;
}

/* CARD */

.box{
    width:420px;
    padding:45px 35px;
    border-radius:28px;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(16px);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.35);

    position:relative;
    z-index:10;

    transition:0.4s ease;
}

/* LIGHT CARD */

body.light-mode .box{
    background:
    rgba(255,255,255,0.72);

    border:
    1px solid rgba(255,255,255,0.5);

    box-shadow:
    0 10px 35px rgba(15,23,42,0.12);
}

/* APP NAME */

.app-name{
    text-align:center;
    font-size:34px;
    font-weight:800;
    margin-bottom:18px;

    background:
    linear-gradient(
    90deg,
    #3b82f6,
    #2563eb,
    #60a5fa);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* LOGO */

.logo{
    width:95px;
    height:95px;
    margin:0 auto 24px;
    border-radius:24px;

    background:
    linear-gradient(
    135deg,
    #3b82f6,
    #2563eb,
    #60a5fa);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:36px;

    box-shadow:
    0 10px 25px rgba(59,130,246,0.30);
}

/* HEADING */

h2{
    text-align:center;
    color:white;
    font-size:28px;
    margin-bottom:10px;
}

/* LIGHT MODE HEADING */

body.light-mode h2{
    color:#1e3a8a;
}

/* SUBTITLE */

.subtitle{
    text-align:center;
    color:#cbd5e1;
    font-size:14px;
    line-height:1.7;
    margin-bottom:28px;
}

/* LIGHT MODE SUBTITLE */

body.light-mode .subtitle{
    color:#1d4ed8;
}

/* DIVIDER */

.line{
    width:100%;
    height:1px;

    background:
    rgba(255,255,255,0.1);

    margin:24px 0;
}

/* INPUT */

.input-box{
    margin-bottom:22px;
}

.input-box input{
    width:100%;
    padding:16px 18px;

    border:none;
    outline:none;

    border-radius:16px;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.1);

    color:white;
    font-size:15px;

    transition:0.3s;
}

body.light-mode .input-box input{
    background:
    rgba(255,255,255,0.92);

    border:
    1px solid rgba(96,165,250,0.3);

    color:#1e3a8a;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

body.light-mode .input-box input::placeholder{
    color:#3b82f6;
}

.input-box input:focus{
    border-color:#3b82f6;

    box-shadow:
    0 0 0 4px rgba(59,130,246,0.18);
}

/* BUTTON */

.submit-btn{
    width:100%;
    padding:16px;

    border:none;
    border-radius:16px;

    background:
    linear-gradient(
    135deg,
    #3b82f6,
    #2563eb,
    #60a5fa);

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 10px 25px rgba(59,130,246,0.25);
}

.submit-btn:hover{
    transform:translateY(-2px);
}

/* FOOTER */

.footer{
    margin-top:24px;
    text-align:center;

    color:#cbd5e1;
    font-size:13px;
}

body.light-mode .footer{
    color:#1d4ed8;
}

.footer a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:600;
}

.footer a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */

@media(max-width:480px){

    .box{
        width:92%;
        padding:35px 24px;
    }

    .app-name{
        font-size:28px;
    }

    h2{
        font-size:24px;
    }

    .logo{
        width:82px;
        height:82px;
        font-size:30px;
    }
}

</style>

</head>

<body>

<!-- THEME TOGGLE -->

<button class="theme-toggle" id="themeBtn">

    <i class="fa-solid fa-moon"></i>

</button>

<!-- CARD -->

<div class="box">

    <div class="app-name">
        Nexa Hub AI
    </div>

    <div class="logo">
        <i class="fa-solid fa-lock"></i>
    </div>

    <h2>Forgot Password</h2>

    <p class="subtitle">

        Enter your registered email address
        to receive OTP verification securely.

    </p>

    <div class="line"></div>

    <form id="forgotForm">

        <div class="input-box">

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required
            >

        </div>

        <button
            type="submit"
            class="submit-btn"
        >

            <i class="fa-solid fa-paper-plane"></i>
            Send OTP

        </button>

    </form>

    <div class="footer">

        Back to
        <a href="login.html">
            Login
        </a>

    </div>

</div>

<script>

/* THEME TOGGLE */

const themeBtn =
document.getElementById("themeBtn");

themeBtn.addEventListener("click", ()=>{

    document.body.classList.toggle(
        "light-mode"
    );

    if(
        document.body.classList.contains(
            "light-mode"
        )
    ){
        themeBtn.innerHTML =
        '<i class="fa-solid fa-sun"></i>';
    }
    else{
        themeBtn.innerHTML =
        '<i class="fa-solid fa-moon"></i>';
    }

});

/* FORM SUBMIT */

document.getElementById("forgotForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    try{

        const response = await fetch(
            "http://127.0.0.1:8000/api/forgot-password/",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    email:email
                })
            }
        );

        const data = await response.json();

        if(response.ok){

            alert("OTP Sent Successfully ✅");

            localStorage.setItem(
                "reset_email",
                email
            );

            window.location.href =
            "verify_otp.html";

        }
        else{

            alert(
                data.error ||
                "Something went wrong ❌"
            );

        }

    }
    catch(error){

        console.log(error);

        alert("Server Error ❌");

    }

});

</script>

</body>
</html>
