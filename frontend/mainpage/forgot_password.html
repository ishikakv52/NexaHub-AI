<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password - Nexa Hub AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;

    background:
    radial-gradient(circle at top left,
    rgba(0,255,213,0.15),
    transparent 25%), 

    radial-gradient(circle at bottom right,
    rgba(139,92,246,0.18),
    transparent 25%),

    linear-gradient(
    135deg,
    #020617,
    #0f172a,
    #111827,
    #020617);

    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
}

/* BACKGROUND ANIMATION */

@keyframes bgMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* FLOATING CIRCLES */

.bg-animation span{
    position:absolute;
    bottom:-150px;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    animation:float 18s linear infinite;
    backdrop-filter:blur(8px);
}

.bg-animation span:nth-child(1){
    left:8%;
    width:90px;
    height:90px;
    animation-duration:18s;
}

.bg-animation span:nth-child(2){
    left:30%;
    width:140px;
    height:140px;
    animation-duration:24s;
}

.bg-animation span:nth-child(3){
    left:50%;
    width:70px;
    height:70px;
    animation-duration:16s;
}

.bg-animation span:nth-child(4){
    left:72%;
    width:110px;
    height:110px;
    animation-duration:22s;
}

.bg-animation span:nth-child(5){
    left:88%;
    width:85px;
    height:85px;
    animation-duration:20s;
}

@keyframes float{

    0%{
        transform:translateY(0)
        rotate(0deg);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh)
        rotate(360deg);
        opacity:0;
    }
}

/* GLASS CARD */

.box{
    width:430px;
    padding:45px 35px;
    border-radius:32px;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(22px);

    box-shadow:
    0 15px 50px rgba(0,0,0,0.45);

    position:relative;
    z-index:10;

    overflow:hidden;
}

/* GLOW EFFECT */

.box::before{
    content:"";
    position:absolute;
    width:250px;
    height:250px;
    background:
    linear-gradient(
    135deg,
    rgba(0,255,213,0.25),
    rgba(139,92,246,0.2));

    border-radius:50%;
    top:-120px;
    right:-100px;
    filter:blur(20px);
}

/* APP NAME */

.app-name{
    text-align:center;
    font-size:34px;
    font-weight:800;
    margin-bottom:15px;

    background:
    linear-gradient(
    90deg,
    #00ffd5,
    #38bdf8,
    #8b5cf6);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    position:relative;
    z-index:2;
}

/* AI LOGO */

.logo{
    width:95px;
    height:95px;
    margin:0 auto 24px;
    border-radius:28px;

    background:
    linear-gradient(
    135deg,
    #00ffd5,
    #8b5cf6);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:36px;
    font-weight:700;

    box-shadow:
    0 12px 35px rgba(0,255,213,0.3);

    position:relative;
    z-index:2;

    animation:pulse 3s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}

/* HEADING */

h2{
    text-align:center;
    color:white;
    font-size:30px;
    margin-bottom:12px;
    position:relative;
    z-index:2;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    font-size:14px;
    line-height:1.7;
    margin-bottom:30px;
    position:relative;
    z-index:2;
}

/* INPUT */

.input-box{
    margin-bottom:24px;
    position:relative;
    z-index:2;
}

.input-box input{
    width:100%;
    padding:18px 18px;
    border:none;
    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.1);

    color:white;
    font-size:15px;

    transition:0.3s ease;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

.input-box input:focus{
    border-color:#00ffd5;

    box-shadow:
    0 0 20px rgba(0,255,213,0.25);
}

/* BUTTON */

button{
    width:100%;
    padding:17px;
    border:none;
    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    #00ffd5,
    #8b5cf6);

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s ease;

    box-shadow:
    0 12px 30px rgba(139,92,246,0.35);

    position:relative;
    z-index:2;
}

button:hover{
    transform:translateY(-3px);

    box-shadow:
    0 16px 35px rgba(0,255,213,0.28);
}

/* FOOTER */

.footer{
    margin-top:25px;
    text-align:center;
    color:#cbd5e1;
    font-size:13px;
    position:relative;
    z-index:2;
}

.footer a{
    color:#00ffd5;
    text-decoration:none;
    font-weight:500;
}

.footer a:hover{
    text-decoration:underline;
}

/* EXTRA DECORATION */

.line{
    width:100%;
    height:1px;
    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.2),
    transparent);

    margin:25px 0;
}

/* RESPONSIVE */

@media(max-width:480px){

    .box{
        width:92%;
        padding:35px 25px;
    }

    .app-name{
        font-size:28px;
    }

    h2{
        font-size:24px;
    }

    .logo{
        width:85px;
        height:85px;
        font-size:30px;
    }
}

</style>

</head>

<body>

<!-- BACKGROUND FLOATING OBJECTS -->

<div class="bg-animation">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!-- MAIN CARD -->

<div class="box">

    <div class="app-name">
        Nexa Hub AI
    </div>

    <div class="logo">
        <i class="fa-solid fa-lock"></i>
    </div>

    <h2>Forgot Password</h2>

    <p class="subtitle">

        Enter your registered email address
        to receive OTP verification securely.

    </p>

    <div class="line"></div>

    <form id="forgotForm">

        <div class="input-box">

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required
            >

        </div>

        <button type="submit">

            <i class="fa-solid fa-paper-plane"></i>
            Send OTP

        </button>

    </form>

    <div class="footer">

        Back to
        <a href="login.html">
            Login
        </a>

    </div>

</div>

<script>

document.getElementById("forgotForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    try{

        const response = await fetch(
            "http://127.0.0.1:8000/api/forgot-password/",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    email:email
                })
            }
        );

        const data = await response.json();

        if(response.ok){

            alert("OTP Sent Successfully ✅");

            localStorage.setItem(
                "reset_email",
                email
            );

            window.location.href =
            "verify_otp.html";

        }
        else{

            alert(
                data.error ||
                "Something went wrong ❌"
            );

        }

    }
    catch(error){

        console.log(error);

        alert("Server Error ❌");

    }

});

</script>

</body>
</html>
