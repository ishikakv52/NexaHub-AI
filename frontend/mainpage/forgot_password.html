<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password - Nexa Hub AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at top left,#00ffd544,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed55,transparent 25%),
    linear-gradient(135deg,#020617,#0f172a,#111827);
    position:relative;
}

/* Animated Background */

.bg-animation span{
    position:absolute;
    display:block;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    bottom:-150px;
    animation:float 18s linear infinite;
}

.bg-animation span:nth-child(1){
    left:8%;
    width:90px;
    height:90px;
    animation-duration:20s;
}

.bg-animation span:nth-child(2){
    left:30%;
    width:140px;
    height:140px;
    animation-duration:25s;
}

.bg-animation span:nth-child(3){
    left:50%;
    width:70px;
    height:70px;
    animation-duration:17s;
}

.bg-animation span:nth-child(4){
    left:72%;
    width:110px;
    height:110px;
    animation-duration:23s;
}

.bg-animation span:nth-child(5){
    left:88%;
    width:80px;
    height:80px;
    animation-duration:19s;
}

@keyframes float{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

/* Main Box */

.box{
    position:relative;
    width:420px;
    padding:45px 35px;
    border-radius:28px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 15px 45px rgba(0,0,0,0.45);
    z-index:10;
}

/* App Name */

.app-name{
    text-align:center;
    font-size:32px;
    font-weight:700;
    margin-bottom:12px;
    background:linear-gradient(90deg,#00ffd5,#38bdf8,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* AI Logo */

.logo{
    width:90px;
    height:90px;
    margin:0 auto 22px;
    border-radius:24px;
    background:linear-gradient(135deg,#00ffd5,#8b5cf6);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:34px;
    font-weight:700;
    box-shadow:0 10px 30px rgba(0,255,213,0.3);
}

/* Heading */

h2{
    text-align:center;
    color:white;
    font-size:28px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:30px;
    line-height:1.6;
}

/* Input */

.input-box{
    margin-bottom:22px;
}

.input-box input{
    width:100%;
    padding:16px 18px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
    transition:0.3s ease;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

.input-box input:focus{
    border-color:#00ffd5;
    box-shadow:0 0 20px rgba(0,255,213,0.25);
}

/* Button */

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#00ffd5,#8b5cf6);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s ease;
    box-shadow:0 10px 25px rgba(139,92,246,0.35);
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 30px rgba(0,255,213,0.3);
}

/* Footer */

.footer{
    margin-top:22px;
    text-align:center;
    color:#cbd5e1;
    font-size:13px;
}

.footer a{
    color:#00ffd5;
    text-decoration:none;
    font-weight:500;
}

.footer a:hover{
    text-decoration:underline;
}

/* Mobile Responsive */

@media(max-width:480px){

    .box{
        width:92%;
        padding:35px 25px;
    }

    .app-name{
        font-size:26px;
    }

}

</style>

</head>
<body>

<!-- Background Animation -->

<div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- Main Card -->

<div class="box">

    <div class="app-name">
        Nexa Hub AI
    </div>

    <div class="logo">
        AI
    </div>

    <h2>Forgot Password</h2>

    <p class="subtitle">
        Enter your registered email address to receive OTP verification
    </p>

    <form id="forgotForm">

        <div class="input-box">

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required
            >

        </div>

        <button type="submit">
            Send OTP
        </button>

    </form>

    <div class="footer">
        Back to <a href="login.html">Login</a>
    </div>

</div>

<script>

document.getElementById("forgotForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;

    try{

        const response = await fetch(
            "http://127.0.0.1:8000/api/forgot-password/",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    email:email
                })
            }
        );

        const data = await response.json();

        if(response.ok){

            alert("OTP Sent Successfully ✅");

            // email save
            localStorage.setItem("reset_email", email);

            // redirect
            window.location.href = "verify_otp.html";

        }
        else{

            alert(data.error);

        }

    }
    catch(error){

        console.log(error);
        alert("Server Error ❌");

    }

});

</script>

</body>
</html>
