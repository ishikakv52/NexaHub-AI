<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexa Hub AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#0b4ea2 0%,transparent 35%),
    radial-gradient(circle at bottom right,#4c1d95 0%,transparent 30%),
    linear-gradient(135deg,#04142d,#0b1638,#16062f);
}

/* MAIN */

.container{
    position:relative;
    width:650px;
    height:650px;

    display:flex;
    justify-content:center;
    align-items:center;

    animation:screenReveal 1.8s cubic-bezier(.19,1,.22,1);
}
/* RING */

.ring{
    position:absolute;

    width:500px;
    height:500px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,0.05);
    pointer-events:none;
    z-index:1;
}

.icon{
    z-index:5;
}

.logo{
    z-index:5;
}
.icon,
.logo{
    z-index:5;
}
/* DOTS */

.dot{
    position:absolute;

    width:10px;
    height:10px;

    border-radius:50%;

    background:#a855f7;

    box-shadow:0 0 15px #a855f7;
}

.dot1{
    top:70px;
    left:50%;
}

.dot2{
    right:70px;
    top:50%;
}

.dot3{
    bottom:70px;
    left:50%;
}

.dot4{
    left:70px;
    top:50%;
}


/* CENTER LOGO */

.logo{
    width:360px;

    transform:translateX(-8px);

    filter:
    drop-shadow(0 15px 35px rgba(0,0,0,0.9));

    animation:logoGlow 3s ease-in-out infinite;
}

/* ICONS */

.icon{
    position:absolute;

    width:120px;
    height:120px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(255,255,255,0.03);

    border:1px solid rgba(255,255,255,0.06);

    backdrop-filter:blur(8px);

    box-shadow:
    0 8px 25px rgba(0,0,0,0.35);

    animation:iconPulse 3s ease-in-out infinite;
}
.icon img{
    width:100px;
}

/* EXACT SAME POSITION */

.top{
    top:35px;
}

.left{
    left:35px;
    top:42%;
}

.right{
    right:35px;
    top:42%;
}

.bottom-left{
    bottom:50px;
    left:140px;
}

.bottom-right{
    bottom:50px;
    right:140px;
}

/* TEXT */

.brand{
    position:absolute;

    bottom:215px;
    left:50%;

    transform:translateX(-46%);

    color:white;

    letter-spacing:5px;

    font-size:18px;

    font-family:sans-serif;

    opacity:.9;
}
 .footer{
    position:fixed;

    bottom:18px;
    left:50%;

    transform:translateX(-50%);

    color:rgba(255,255,255,0.45);

    font-size:13px;

    letter-spacing:2px;

    font-family:sans-serif;
}



/* ANIMATION */

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes screenReveal{

    0%{
        opacity:0;

        transform:
        scale(1.08)
        translateY(30px);

        filter:blur(18px);
    }

    100%{
        opacity:1;

        transform:
        scale(1)
        translateY(0);

        filter:blur(0px);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-3px);
    }
}


</style>
</head>

<body>

<div class="container">

    <div class="ring"></div>

    <div class="dot dot1"></div>
    <div class="dot dot2"></div>
    <div class="dot dot3"></div>
    <div class="dot dot4"></div>

    <!-- TOP -->
    <div class="icon top">
        <img src="icons/image.png">
    </div>

    <!-- LEFT -->
    <div class="icon left">
        <img src="icons/mic.png">
    </div>

    <!-- RIGHT -->
    <div class="icon right">
        <img src="icons/robot.png">
    </div>

    <!-- BOTTOM LEFT -->
    <div class="icon bottom-left">
        <img src="icons/text.png">
    </div>

    <!-- BOTTOM RIGHT -->
    <div class="icon bottom-right">
        <img src="icons/code.png">
    </div>

    <!-- MAIN LOGO -->
    <img src="N-logo.png" class="logo">

    <!-- TEXT -->
    <div class="brand">
        NEXA HUB AI
    </div>

    

</div>
<div class="footer">
        © 2026 NEXA HUB AI
      </div>
<script>

setTimeout(()=>{

window.location.href="../login.html";

},3000);

</script>

</body>
</html>
