<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text to Speech · 10 Voices</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* ----- LIGHT MODE (default) ----- */
    :root {
      --bg: #eef0ff;
      --white: #fff;
      --card: #f5f6ff;
      --border: #dde0f5;
      --pri: #4338ca;
      --pri2: #6d59f8;
      --glow: rgba(67,56,202,.12);
      --txt: #18182f;
      --muted: #5b6080;
      --lite: #9599b8;
      --green: #059669;
      --red: #dc2626;
      --orange: #ea580c;
      --nav-bg: #ffffff;
      --right-bg: #fafbff;
      --vc-bg: #ffffff;
      --shadow: 0 6px 32px rgba(67,56,202,.1);
      --tab-bg: #f5f6ff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      color: var(--txt);
      transition: background 0.25s, color 0.2s;
      display: flex;
      flex-direction: column;
    }

    /* ----- DARK MODE ----- */
    body.dark {
      --bg: #12121f;
      --white: #1e1e2f;
      --card: #28283b;
      --border: #3a3a52;
      --pri: #818cf8;
      --pri2: #6366f1;
      --glow: rgba(99,102,241,.15);
      --txt: #e2e8f0;
      --muted: #a0aec0;
      --lite: #7a7a9a;
      --green: #34d399;
      --red: #f87171;
      --orange: #fb923c;
      --nav-bg: #1a1a2e;
      --right-bg: #1c1c30;
      --vc-bg: #25253b;
      --shadow: 0 6px 32px rgba(0,0,0,.4);
      --tab-bg: #2d2d44;
    }

    /* --- NAV --- */
    nav {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 1px 8px rgba(0,0,0,.04);
      transition: background 0.2s, border 0.2s;
      z-index: 10;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
    .logo b { color: var(--pri); }
    .logo i { color: var(--txt); font-style: normal; }

    .theme-toggle {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--txt);
      font-weight: 500;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .theme-toggle:hover {
      border-color: var(--pri);
      background: var(--glow);
    }

    /* --- HERO --- */
    .hero {
      text-align: center;
      padding: 20px 20px 16px;
      flex-shrink: 0;
    }
    .hero h1 {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -1px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(130deg, var(--pri), var(--pri2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* --- MAIN SHELL — takes remaining height, no overflow --- */
    .shell {
      flex: 1;
      max-width: 1060px;
      margin: 0 auto;
      padding: 0 16px 16px;
      width: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .card {
      background: var(--white);
      border-radius: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: background 0.25s, border 0.25s, box-shadow 0.25s;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      flex: 1;
      min-height: 0;
    }

    /* --- LEFT COLUMN --- */
    .left {
      padding: 18px 20px 12px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      transition: border 0.2s;
      min-height: 0;
    }
    .plabel {
      font-size: 10px;
      font-weight: 700;
      color: var(--lite);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    #tin {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 15px;
      line-height: 1.85;
      color: var(--txt);
      background: transparent;
      font-family: 'Inter', sans-serif;
      min-height: 120px;
    }
    #tin::placeholder { color: var(--lite); }

    .abar {
      margin-top: 8px;
      background: var(--card);
      border-radius: 10px;
      padding: 8px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .abar.on { display: flex; }
    .wave { flex: 1; height: 26px; display: flex; align-items: center; gap: 2px; }
    .wave span { flex: 1; border-radius: 2px; background: var(--pri); animation: wv .9s ease-in-out infinite; }
    .wave span:nth-child(2) { animation-delay: .1s; }
    .wave span:nth-child(3) { animation-delay: .2s; }
    .wave span:nth-child(4) { animation-delay: .3s; }
    .wave span:nth-child(5) { animation-delay: .12s; }
    .wave span:nth-child(6) { animation-delay: .22s; }
    .wave span:nth-child(7) { animation-delay: .08s; }
    .wave span:nth-child(8) { animation-delay: .32s; }
    @keyframes wv { 0%, 100% { height: 4px; } 50% { height: 22px; } }
    .atm { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .lfoot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }
    .cnt { font-size: 11px; color: var(--lite); }
    .spd-row { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    #spd { width: 60px; accent-color: var(--pri); }
    .controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .lsw { position: relative; }
    #lsel {
      appearance: none;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      padding: 5px 24px 5px 10px;
      font-size: 12px;
      font-weight: 600;
      background: var(--card);
      color: var(--txt);
      cursor: pointer;
      outline: 0;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s, border 0.2s, color 0.2s;
    }
    #lsel:hover { border-color: var(--pri); }
    .lsw::after {
      content: '▾';
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 10px;
      color: var(--muted);
    }
    #playBtn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--pri);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 14px var(--glow);
      transition: .2s;
      flex-shrink: 0;
    }
    #playBtn:hover { background: var(--pri2); transform: scale(1.06); }
    #playBtn.stop { background: var(--red); }
    #playBtn svg { fill: #fff; }

    /* --- RIGHT COLUMN — fixed header/tabs, only list scrolls --- */
    .right {
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--right-bg);
      transition: background 0.25s;
      min-height: 0;
    }
    .vhead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .vtit {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .vcnt {
      font-size: 11px;
      color: var(--lite);
      font-weight: 600;
      background: var(--white);
      padding: 4px 12px;
      border-radius: 30px;
      border: 1.5px solid var(--border);
      transition: background 0.2s, border 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 7px 0;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      background: var(--tab-bg);
      color: var(--muted);
      transition: .2s;
      text-align: center;
      font-family: 'Inter', sans-serif;
    }
    .tab.ta { background: var(--glow); color: var(--pri); border-color: var(--pri); }
    .tab.tb { background: #dbeafe; color: #2563eb; border-color: #93c5fd; }
    .tab.tg { background: #fce7f3; color: #db2777; border-color: #f9a8d4; }
    body.dark .tab.tb { background: #1e3a5f; color: #93c5fd; border-color: #3b6b9e; }
    body.dark .tab.tg { background: #4a1a2e; color: #f9a8d4; border-color: #7c3a5a; }

    /* ONLY THIS SCROLLS */
    .vlist {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      flex: 1;
      padding-right: 4px;
      min-height: 0;
    }
    .vlist::-webkit-scrollbar { width: 5px; }
    .vlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

    .vc {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: .2s;
      background: var(--vc-bg);
      box-shadow: 0 2px 6px rgba(0,0,0,.02);
      flex-shrink: 0;
    }
    .vc:hover, .vc.on {
      border-color: var(--pri);
      background: var(--glow);
      box-shadow: 0 4px 12px rgba(67,56,202,.1);
    }

    .vpb {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: .18s;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .vpb:hover { opacity: .85; transform: scale(1.08); }
    .vpb svg { fill: #fff; width: 13px; height: 13px; }

    .vi { flex: 1; min-width: 0; }
    .vr {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
      flex-wrap: wrap;
    }
    .vn {
      font-size: 15px;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: -0.2px;
    }
    .gb {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
    }
    .gm { background: #dbeafe; color: #2563eb; }
    .gf { background: #fce7f3; color: #db2777; }
    body.dark .gm { background: #1e3a5f; color: #93c5fd; }
    body.dark .gf { background: #4a1a2e; color: #f9a8d4; }

    .vt {
      font-size: 10px;
      color: var(--lite);
      font-weight: 500;
      letter-spacing: 0.2px;
    }
    .vemo {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 30px;
      margin-left: auto;
      white-space: nowrap;
      background: rgba(0,0,0,.02);
      border: 1px solid var(--border);
      transition: background 0.2s, border 0.2s, color 0.2s;
    }

    /* --- STAT & CTA --- */
    .stat {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 8px 14px;
      min-height: 30px;
      font-weight: 500;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }
    .stat.err { color: var(--red); }
    .stat.ok { color: var(--green); }
    .stat.go { color: var(--pri); }

    .cta {
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
      transition: background 0.2s, border 0.2s;
    }
    .cta p { font-size: 11px; color: var(--muted); }
    .cta .nbp {
      padding: 6px 16px;
      border: none;
      border-radius: 8px;
      background: var(--pri);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      font-family: 'Inter', sans-serif;
    }
    .cta .nbp:hover { background: var(--pri2); }

    @media (max-width: 750px) {
      .grid { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid var(--border); }
      .right { max-height: 320px; }
      nav { padding: 0 12px; }
      body { overflow: hidden; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo"><b>NEXA</b><i> HUB </i> AI</div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌓 <span id="themeLabel">Dark</span></button>
</nav>

<div class="hero">
  <h1>TEXT <em>TO SPEECH</em></h1>
</div>

<div class="shell">
  <div class="card">
    <div class="grid">

      <!-- LEFT: text input -->
      <div class="left">
        <div class="plabel">📝 Text Likho</div>
        <textarea id="tin" placeholder="Type or paste your text here...&#10;&#10;Example: Hello, welcome to NEXA HUB Text to Speech!">Hello! Welcome to NEXA HUB Text to Speech. This tool converts your text into natural sounding speech with 10 different voices.</textarea>

        <div class="abar" id="abar">
          <div class="wave" id="waveEl"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <span class="atm" id="atm">0:00</span>
        </div>

        <div class="lfoot">
          <span class="cnt" id="cnt">0 words</span>
          <div class="spd-row">🐢<input type="range" id="spd" min="0.5" max="2" step="0.1" value="1">🐇 <span id="spdv">1.0x</span></div>
          <div class="controls">
            <div class="lsw">
              <select id="lsel" onchange="updateSystemVoices()">
                <option value="en-US">English (US)</option>
                <option value="en-GB">English (UK)</option>
                <option value="hi-IN">हिंदी</option>
                <option value="bn-IN">বাংলা</option>
                <option value="ta-IN">தமிழ்</option>
                <option value="te-IN">తెలుగు</option>
                <option value="kn-IN">ಕನ್ನಡ</option>
                <option value="ml-IN">മലയാളം</option>
                <option value="mr-IN">मराठी</option>
                <option value="gu-IN">ગુજરાતી</option>
                <option value="es-ES">Español</option>
                <option value="fr-FR">Français</option>
                <option value="de-DE">Deutsch</option>
                <option value="ja-JP">日本語</option>
                <option value="zh-CN">中文</option>
              </select>
            </div>
            <button id="playBtn" onclick="togglePlay()">
              <svg width="17" height="17" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- RIGHT: voice section — only vlist scrolls -->
      <div class="right">
        <div class="vhead">
          <span class="vtit">🎙️ Voices</span>
          <span class="vcnt" id="selLbl">Arjun selected</span>
        </div>
        <div class="tabs">
          <button class="tab ta" onclick="doFilt('all',this)">All (10)</button>
          <button class="tab" onclick="doFilt('M',this)">👨 Male</button>
          <button class="tab" onclick="doFilt('F',this)">👩 Female</button>
        </div>
        <!-- ONLY THIS SCROLLS -->
        <div class="vlist" id="vlist"></div>
      </div>
    </div>

    <div class="stat" id="stat">📌 Select a voice, enter text, and click play</div>

    <div class="cta">
      <p>© 2026 NEXA HUB AI</p>
      <button class="nbp">Get API Access</button>
    </div>
  </div>
</div>

<script>
  // ──────────────────────────────────────────────────────────────
  // 10 CUSTOM VOICES
  // ──────────────────────────────────────────────────────────────
  const VOICES = [
    { id: 'arjun', name: 'Arjun', g: 'M', color: '#4338ca', tag: 'Deep · Powerful', emo: '😎 Cool', pitch: 0.9, rate: 0.85 },
    { id: 'vikram', name: 'Vikram', g: 'M', color: '#0369a1', tag: 'News · Authoritative', emo: '📰 Serious', pitch: 1.0, rate: 0.9 },
    { id: 'rohan', name: 'Rohan', g: 'M', color: '#047857', tag: 'Friendly · Casual', emo: '😊 Chill', pitch: 1.1, rate: 1.0 },
    { id: 'karan', name: 'Karan', g: 'M', color: '#b45309', tag: 'Energetic · Upbeat', emo: '⚡ Hyper', pitch: 1.2, rate: 1.1 },
    { id: 'dev', name: 'Dev', g: 'M', color: '#7c3aed', tag: 'Calm · Storyteller', emo: '🌙 Calm', pitch: 0.8, rate: 0.8 },
    { id: 'shreya', name: 'Shreya', g: 'F', color: '#be185d', tag: 'News · Bold', emo: '💼 Pro', pitch: 1.5, rate: 0.9 },
    { id: 'ananya', name: 'Ananya', g: 'F', color: '#8b5cf6', tag: 'Warm · Soft', emo: '💕 Warm', pitch: 1.3, rate: 0.95 },
    { id: 'priya', name: 'Priya', g: 'F', color: '#dc2626', tag: 'Cheerful · Bright', emo: '🌸 Bubbly', pitch: 1.6, rate: 1.05 },
    { id: 'ishita', name: 'Ishita', g: 'F', color: '#ea580c', tag: 'Expressive · Story', emo: '🎭 Drama', pitch: 1.4, rate: 0.92 },
    { id: 'neha', name: 'Neha', g: 'F', color: '#0d9488', tag: 'Gentle · Soothing', emo: '🕊️ Gentle', pitch: 1.2, rate: 0.88 },
  ];

  let selId = 'arjun';
  let filtG = 'all';
  let synth = window.speechSynthesis;
  let playing = false;
  let tmr = null;
  let secs = 0;
  let sysVoices = [];
  let currentUtterance = null;

  // ─── THEME TOGGLE ─────────────────────────────
  function toggleTheme() {
    document.body.classList.toggle('dark');
    const label = document.getElementById('themeLabel');
    if (document.body.classList.contains('dark')) {
      label.textContent = 'Light';
    } else {
      label.textContent = 'Dark';
    }
  }

  // ─── Load System Voices ──────────────────────
  function loadSysVoices() {
    sysVoices = synth.getVoices();
  }
  loadSysVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadSysVoices;
  }

  // ─── Find Best System Voice ──────────────────
  function findBestVoice(lang, isFemale) {
    if (!sysVoices.length) sysVoices = synth.getVoices();
    const base = lang.split('-')[0];
    let pool = sysVoices.filter(v => v.lang.toLowerCase().startsWith(base.toLowerCase()));
    if (!pool.length) pool = sysVoices;

    const femKw = ['female', 'woman', 'girl', 'zira', 'samantha', 'victoria', 'karen', 'moira', 'tessa', 'veena', 'heera', 'lekha'];
    const malKw = ['male', 'man', 'david', 'mark', 'daniel', 'alex', 'tom', 'fred', 'ravi'];

    let pick = null;
    if (isFemale) {
      pick = pool.find(v => femKw.some(k => v.name.toLowerCase().includes(k)));
    } else {
      pick = pool.find(v => malKw.some(k => v.name.toLowerCase().includes(k)));
    }
    if (!pick) pick = pool[0] || sysVoices[0];
    return pick;
  }

  // ─── Speak with Selected Voice ──────────────
  function speak() {
    const text = document.getElementById('tin').value.trim();
    if (!text) {
      setStat('⚠️ Please enter some text!', 'err');
      return;
    }

    const lang = document.getElementById('lsel').value;
    const spdMult = parseFloat(document.getElementById('spd').value);

    const voiceData = VOICES.find(v => v.id === selId);
    if (!voiceData) {
      setStat('⚠️ Please select a voice!', 'err');
      return;
    }

    const isFemale = voiceData.g === 'F';
    const sysVoice = findBestVoice(lang, isFemale);

    const utterance = new SpeechSynthesisUtterance(text);
    if (sysVoice) utterance.voice = sysVoice;
    utterance.lang = lang;
    utterance.rate = voiceData.rate * spdMult;
    utterance.pitch = voiceData.pitch;
    utterance.volume = 1.0;

    currentUtterance = utterance;

    utterance.onstart = () => {
      playing = true;
      setIcon(true);
      setStat(`🔊 ${voiceData.name} speaking...`, 'ok');
      document.getElementById('abar').classList.add('on');
      startTmr();
    };

    utterance.onend = () => {
      playing = false;
      setIcon(false);
      setStat('✅ Done!', 'ok');
      stopTmr();
      document.getElementById('abar').classList.remove('on');
      setTimeout(() => setStat('📌 Select a voice, enter text, and click play', ''), 3000);
    };

    utterance.onerror = (e) => {
      playing = false;
      setIcon(false);
      setStat('❌ Error speaking!', 'err');
      stopTmr();
      document.getElementById('abar').classList.remove('on');
      console.error('TTS Error:', e);
    };

    synth.cancel();
    synth.speak(utterance);
  }

  // ─── Toggle Play ─────────────────────────────
  function togglePlay() {
    if (playing) {
      synth.cancel();
      playing = false;
      setIcon(false);
      stopTmr();
      document.getElementById('abar').classList.remove('on');
      setStat('⏸ Paused', '');
      return;
    }
    speak();
  }

  // ─── Preview Voice ───────────────────────────
  function previewVoice(id) {
    selId = id;
    renderList();
    const voiceData = VOICES.find(v => v.id === id);
    const lang = document.getElementById('lsel').value;
    const isFemale = voiceData.g === 'F';
    const sysVoice = findBestVoice(lang, isFemale);

    const text = `Hello! I am ${voiceData.name}. This is my voice.`;
    const utterance = new SpeechSynthesisUtterance(text);
    if (sysVoice) utterance.voice = sysVoice;
    utterance.lang = lang;
    utterance.rate = voiceData.rate;
    utterance.pitch = voiceData.pitch;
    utterance.volume = 1.0;

    synth.cancel();
    synth.speak(utterance);
    setStat(`🎤 Preview: ${voiceData.name}`, 'go');
    setTimeout(() => setStat('📌 Select a voice, enter text, and click play', ''), 2000);
  }

  // ─── UI: Voice List ──────────────────────────
  function renderList() {
    const show = filtG === 'all' ? VOICES : VOICES.filter(v => v.g === filtG);
    document.getElementById('vlist').innerHTML = show.map(v => `
        <div class="vc ${v.id === selId ? 'on' : ''}" onclick="selVoice('${v.id}')">
          <button class="vpb" style="background:${v.color}" onclick="event.stopPropagation();previewVoice('${v.id}')">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <div class="vi">
            <div class="vr">
              <span class="vn">${v.name}</span>
              <span class="gb ${v.g === 'M' ? 'gm' : 'gf'}">${v.g === 'M' ? 'Male' : 'Female'}</span>
              <span class="vemo" style="background:${v.color}22;color:${v.color}">${v.emo}</span>
            </div>
            <div class="vt">${v.tag}</div>
          </div>
        </div>
      `).join('');
    const p = VOICES.find(v => v.id === selId);
    document.getElementById('selLbl').textContent = (p ? p.name : '?') + ' selected';
  }

  function selVoice(id) {
    selId = id;
    renderList();
    const voice = VOICES.find(v => v.id === id);
    setStat(`🎤 ${voice.name} selected`, 'go');
    setTimeout(() => setStat('📌 Select a voice, enter text, and click play', ''), 1500);
  }

  function doFilt(f, btn) {
    filtG = f;
    document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
    if (f === 'all') btn.classList.add('ta');
    if (f === 'M') btn.classList.add('tb');
    if (f === 'F') btn.classList.add('tg');
    renderList();
  }

  function updateSystemVoices() {
    loadSysVoices();
    setStat('🌐 Language updated', 'ok');
    setTimeout(() => setStat('📌 Select a voice, enter text, and click play', ''), 1500);
  }

  // ─── Helpers ─────────────────────────────────
  function setIcon(p) {
    const b = document.getElementById('playBtn');
    b.className = p ? 'stop' : '';
    b.innerHTML = p
      ? '<svg width="17" height="17" viewBox="0 0 24 24" fill="white"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>'
      : '<svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>';
  }

  function setStat(m, c = '') {
    const e = document.getElementById('stat');
    e.textContent = m;
    e.className = 'stat ' + c;
  }

  function startTmr() {
    secs = 0;
    clearInterval(tmr);
    tmr = setInterval(() => {
      secs++;
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      document.getElementById('atm').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    }, 1000);
  }

  function stopTmr() {
    clearInterval(tmr);
  }

  // ─── Word Counter ───────────────────────────
  const tin = document.getElementById('tin');
  function updCnt() {
    const t = tin.value.trim();
    document.getElementById('cnt').textContent = `${t ? t.split(/\s+/).length : 0} words · ${tin.value.length}/2000`;
    if (tin.value.length > 2000) tin.value = tin.value.slice(0, 2000);
  }
  tin.addEventListener('input', updCnt);
  updCnt();

  // ─── Speed Display ──────────────────────────
  document.getElementById('spd').addEventListener('input', function () {
    document.getElementById('spdv').textContent = parseFloat(this.value).toFixed(1) + 'x';
  });

  // ─── Init ────────────────────────────────────
  renderList();
</script>
</body>
</html>
