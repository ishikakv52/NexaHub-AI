<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NEXA HUB AI · 195 | Dark Blue Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }

        /* DARK BLUE BACKGROUND - MAIN COLOR SCHEME */
        :root {
            --bg-body: #0a0e2a;
            --bg-card: #0f1535;
            --text-primary: #f1f5f9;
            --text-secondary: #e2e8f0;
            --text-muted: #a0aec0;
            --border-color: #1e2a5e;
            --input-bg: #1a2352;
            --input-border: #2a3568;
            --input-focus: #3b82f6;
            --btn-bg: #2563eb;
            --btn-hover: #3b82f6;
            --result-bg: #0f1a4a;
            --badge-bg: #1e3a8a;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            --nexa-white: #ffffff;
            --hub-blue: #60a5fa;
            --question-color: #cbd5e6;
            --label-color: #94a3b8;
            --footer-color: #7c8ba0;
        }

        body {
            background: var(--bg-body);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem;
        }

        /* SMALL SIZE CARD - compact */
        .nexa-compact {
            max-width: 380px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 1.2rem;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .compact-header {
            padding: 0.7rem 1rem 0.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .nexa-title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 0.15rem;
        }

        .nexa-white {
            color: #ffffff;
        }

        .hub-blue {
            color: #60a5fa;
        }

        .badge-small {
            display: inline-block;
            background: var(--badge-bg);
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            font-size: 0.5rem;
            font-weight: 600;
            color: #93c5fd;
        }

        .question-small {
            margin-top: 0.4rem;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--question-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .pulse-dot {
            width: 5px;
            height: 5px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .compact-body {
            padding: 0.9rem 1rem 1rem 1rem;
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        .form-group label {
            display: block;
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--label-color);
            margin-bottom: 0.2rem;
        }

        select {
            width: 100%;
            padding: 0.5rem 0.7rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 0.7rem;
            font-size: 0.7rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 0.7rem center;
        }

        .info-note {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-top: -0.2rem;
            margin-bottom: 0.5rem;
            padding-left: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .btn-continue {
            background: linear-gradient(105deg, #2563eb, #3b82f6);
            border: none;
            width: 100%;
            padding: 0.55rem;
            border-radius: 1.5rem;
            font-weight: 700;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.3rem;
            font-family: inherit;
        }

        .btn-continue:hover {
            background: linear-gradient(105deg, #3b82f6, #60a5fa);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .result-preview {
            background: var(--result-bg);
            border-radius: 0.8rem;
            padding: 0.6rem 0.8rem;
            margin-top: 0.8rem;
            border-left: 2.5px solid #f59e0b;
        }

        .result-title {
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #f59e0b;
            margin-bottom: 0.3rem;
        }

        .result-content {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .footer-note {
            font-size: 0.45rem;
            font-weight: 500;
            text-align: center;
            color: var(--footer-color);
            margin-top: 0.7rem;
        }

        select optgroup {
            font-weight: 700;
            background: var(--bg-card);
            color: var(--text-primary);
        }
    </style>
</head>

        const cPrefix = country.substring(0, 2).toUpperCase().replace(/[^A-Z]/g, '');
        const lPrefix = language.substring(0, 2).toUpperCase().replace(/[^A-Z]/g, '');
        return `NEXA·${cPrefix}${lPrefix}`;
    }

    function escapeHtml(str) { 
        if (!str) return ''; 
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
    }

    function handleContinue() {
    const country = countrySelect.value;
    const language = languageSelect.value;

    if (!country) { 
        alert("🌍 Please select your country"); 
        countrySelect.focus(); 
        return; 
    }

        alert("🗣️ Please select your language");

    const geoCode = generateGeoCode(country, language);

    }, 1000);

    // Event Listeners
    continueBtn.addEventListener('click', handleContinue);
    countrySelect.addEventListener('change', () => { 
        if (resultPreview.style.display === 'block') resultPreview.style.display = 'none'; 
    });
    languageSelect.addEventListener('change', () => { 
        if (resultPreview.style.display === 'block') resultPreview.style.display = 'none'; 
    });
</script>
