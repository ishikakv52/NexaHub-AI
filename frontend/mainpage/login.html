<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXA HUB AI - Luxury Animated Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#050816;
      overflow:hidden;
      position:relative;
    }

    /* =========================================
       MAIN ROTATING BACKGROUND
    ========================================= */

    .rotating-background{
      position:absolute;
      width:1200px;
      height:1200px;
      border-radius:50%;

      background:
      conic-gradient(
        from 0deg,
        #00c6ff,
        #007bff,
        #6a00ff,
        #00c6ff,
        #007bff
      );

      animation:
      rotateBg 18s linear infinite;

      filter:blur(120px);
      opacity:0.28;
      z-index:0;
    }

    @keyframes rotateBg{

      0%{
        transform:rotate(0deg) scale(1);
      }

      50%{
        transform:rotate(180deg) scale(1.08);
      }

      100%{
        transform:rotate(360deg) scale(1);
      }
    }

    /* =========================================
       SECOND ROTATING RING
    ========================================= */

    .rotating-ring{
      position:absolute;
      width:850px;
      height:850px;
      border-radius:50%;

      border:2px solid rgba(0,198,255,0.12);
      border-top:2px solid #00c6ff;

      /* animation:spinRing 12s linear infinite; */

      z-index:0;
    }

    @keyframes spinRing{

      from{
        transform:rotate(0deg);
      }

      to{
        transform:rotate(360deg);
      }
    }

    /* =========================================
       EXTRA GLOW EFFECTS
    ========================================= */

    body::before{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:#007bff;
      border-radius:50%;
      top:-180px;
      left:-120px;
      filter:blur(150px);
      opacity:0.35;
      animation:float 8s ease-in-out infinite;
    }

    body::after{
      content:'';
      position:absolute;
      width:450px;
      height:450px;
      background:#00c6ff;
      border-radius:50%;
      bottom:-180px;
      right:-120px;
      filter:blur(150px);
      opacity:0.25;
      animation:float2 10s ease-in-out infinite;
    }

    @keyframes float{

      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(30px);
      }
    }

    @keyframes float2{

      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-30px);
      }
    }

    /* =========================================
       NAVBAR
    ========================================= */

    .navbar{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      padding:22px 60px;

      display:flex;
      justify-content:space-between;
      align-items:center;

      z-index:100;

      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(12px);

      border-bottom:
      1px solid rgba(255,255,255,0.06);
    }

    .brand{
      color:#fff;
      font-size:28px;
      font-weight:700;
      letter-spacing:2px;
    }

    .brand span{
      color:#00c6ff;
    }

    .nav-links{
      display:flex;
      gap:35px;
      list-style:none;
    }

    .nav-links a{
      color:#d6d6d6;
      text-decoration:none;
      font-size:15px;
      font-weight:500;
      transition:0.4s;
      position:relative;
    }

    .nav-links a:hover{
      color:#00c6ff;
    }

    .nav-links a::after{
      content:'';
      position:absolute;
      width:0%;
      height:2px;
      left:0;
      bottom:-6px;
      background:#00c6ff;
      transition:0.4s;
    }

    .nav-links a:hover::after{
      width:100%;
    }

    /* =========================================
       GLASS LOGIN CARD
    ========================================= */

    .container{
      position:relative;
      width:420px;
      padding:45px;

      border-radius:28px;

      background:rgba(255,255,255,0.06);

      backdrop-filter:blur(20px);

      border:1px solid rgba(255,255,255,0.08);

      box-shadow:
      0 8px 32px rgba(0,0,0,0.45);

      z-index:10;

      animation:fadeUp 1.2s ease;
    }

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* =========================================
       LOGO
    ========================================= */

    .logo{
      text-align:center;
      margin-bottom:35px;
    }

    .logo h1{
      color:#fff;
      font-size:36px;
      font-weight:700;
      letter-spacing:2px;
    }

    .logo span{
      color:#00c6ff;
    }

    .logo p{
      color:#b5b5b5;
      margin-top:6px;
      font-size:13px;
      letter-spacing:1px;
    }

    /* =========================================
       INPUTS
    ========================================= */

    .input-box{
      margin-bottom:22px;
    }

    .input-box input{
      width:100%;
      padding:16px 18px;

      border:none;
      outline:none;

      border-radius:15px;

      background:rgba(255,255,255,0.08);

      color:#fff;
      font-size:15px;

      transition:0.4s;

      border:1px solid transparent;
    }

    .input-box input:focus{
      border:1px solid #00c6ff;

      background:rgba(255,255,255,0.12);

      box-shadow:
      0 0 18px rgba(0,198,255,0.35);
    }

    .input-box input::placeholder{
      color:#aaa;
    }

    /* =========================================
       BUTTON
    ========================================= */

    .btn{
      width:100%;
      padding:16px;

      border:none;
      border-radius:15px;

      background:
      linear-gradient(
        135deg,
        #007bff,
        #00c6ff
      );

      color:#fff;
      font-size:16px;
      font-weight:600;

      cursor:pointer;

      transition:0.4s;
    }

    .btn:hover{
      transform:
      translateY(-3px)
      scale(1.02);

      box-shadow:
      0 12px 30px rgba(0,198,255,0.35);
    }

    /* =========================================
       EXTRA TEXT
    ========================================= */

    .extra{
      margin-top:20px;
      text-align:center;
      color:#bbb;
      font-size:14px;
    }

    .extra a{
      color:#00c6ff;
      text-decoration:none;
    }

    .extra a:hover{
      text-decoration:underline;
    }

    .footer{
      margin-top:25px;
      text-align:center;
      color:#666;
      font-size:12px;
      letter-spacing:1px;
    }

    /* =========================================
       MOBILE RESPONSIVE
    ========================================= */

    @media(max-width:768px){

      .navbar{
        padding:18px 25px;
        flex-direction:column;
        gap:15px;
      }

      .nav-links{
        gap:18px;
      }

      .container{
        width:90%;
        padding:35px;
      }

      .logo h1{
        font-size:30px;
      }

    }

  </style>
</head>

<body>

  <!-- Rotating Background -->
  <div class="rotating-background"></div>

  <!-- Rotating Ring -->
  <div class="rotating-ring"></div>

  <!-- Navbar -->
  <nav class="navbar">

    <div class="brand">
      NEXA <span>HUB AI</span>
    </div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">About</a></li>
    </ul>

  </nav>

  <!-- Login Container -->
  <div class="container">

    <div class="logo">
      <h1>NEXA <span>HUB AI</span></h1>
      <p>Modern Luxury Intelligence Platform</p>
    </div>

<form id="loginForm">

      <div class="input-box">

          <input
          type="text"
          id="loginInput"
          placeholder="Email or Username"
          required>
       </div>


          <div class="input-box">

  <input
  type="password"
  id="password"
  placeholder="Password"
  required>

</div>

<button type="submit" class="btn">
        LOGIN
      </button>
      
      <div class="extra">
        <a href="forgot_password.html">Forgot Password?</a>
        <br>
        <br>
        
        Don't have an account?
        <a href="signup2.html">Create Account</a>

      </div>

      <div class="footer">
        © 2026 NEXA HUB AI
      </div>

    </form>

  </div>
<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const loginInput = document.getElementById("loginInput").value;
    const password = document.getElementById("password").value;

    try {

        const response = await fetch(
            "http://127.0.0.1:8000/api/token/",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: loginInput,
                    password: password
                })
            }
        );

        const data = await response.json();

        if (response.ok) {

            localStorage.setItem("token", data.access);

            alert("Login Successful ✅");
            window.location.href = "homepage.html";
        } else {

            alert("Login Failed ❌");
            console.log(data);

        }

    } catch (error) {

        console.log(error);
        alert("Server Error ❌");

    }

});

</script>
</body>
</html>
