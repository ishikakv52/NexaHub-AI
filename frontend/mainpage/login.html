<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXA HUB AI - Luxury Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(145deg, #0a0e1a 0%, #0f1422 100%);
      overflow:hidden;
      position:relative;
    }

    /* =========================================
       SIMPLE ELEGANT BACKGROUND - subtle mesh gradient
    ========================================= */

    /* Clean animated mesh gradient */
    .bg-mesh {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(0, 198, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 123, 255, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(106, 0, 255, 0.05) 0%, transparent 50%);
      animation: subtleShift 12s ease-in-out infinite;
    }

    @keyframes subtleShift {
      0%, 100% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
      }
    }

    /* Simple floating particles - minimal */
    .particle {
      position: absolute;
      background: rgba(0, 198, 255, 0.15);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* =========================================
       NAVBAR - Clean glass
    ========================================= */

    .navbar{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      padding:22px 60px;

      display:flex;
      justify-content:space-between;
      align-items:center;

      z-index:100;

      background:rgba(10, 14, 26, 0.65);
      backdrop-filter:blur(12px);

      border-bottom: 1px solid rgba(0, 198, 255, 0.12);
    }

    .brand{
      color:#fff;
      font-size:28px;
      font-weight:800;
      letter-spacing:2px;
      background: linear-gradient(135deg, #ffffff, #94a3f8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand span{
      background: linear-gradient(135deg, #00c6ff, #007bff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links{
      display:flex;
      gap:38px;
      list-style:none;
    }

    .nav-links a{
      color:#cbd5e1;
      text-decoration:none;
      font-size:15px;
      font-weight:500;
      transition:0.3s;
      position:relative;
    }

    .nav-links a:hover{
      color:#00c6ff;
    }

    .nav-links a::after{
      content:'';
      position:absolute;
      width:0%;
      height:2px;
      left:0;
      bottom:-6px;
      background: linear-gradient(95deg, #00c6ff, #007bff);
      transition:0.3s;
      border-radius:4px;
    }

    .nav-links a:hover::after{
      width:100%;
    }

    /* =========================================
       GLASS LOGIN CARD - Premium minimal
    ========================================= */

    .container{
      position:relative;
      width:440px;
      padding:48px 42px;

      border-radius:32px;

      background:rgba(15, 20, 35, 0.6);
      backdrop-filter:blur(20px);

      border:1px solid rgba(0, 198, 255, 0.18);
      box-shadow:0 25px 50px rgba(0,0,0,0.4);

      z-index:10;

      animation:fadeUp 0.8s ease-out;
    }

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* =========================================
       LOGO SECTION
    ========================================= */

    .logo{
      text-align:center;
      margin-bottom:38px;
    }

    .logo h1{
      color:#fff;
      font-size:38px;
      font-weight:800;
      letter-spacing:1px;
      background: linear-gradient(135deg, #ffffff, #a5f3fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo span{
      background: linear-gradient(135deg, #00c6ff, #007bff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p{
      color:#8a99b9;
      margin-top:8px;
      font-size:13px;
      letter-spacing:1.5px;
      font-weight:500;
    }

    /* =========================================
       INPUTS - Clean modern
    ========================================= */

    .input-box{
      margin-bottom:24px;
    }

    .input-box input{
      width:100%;
      padding:16px 20px;

      border:none;
      outline:none;

      border-radius:20px;

      background:rgba(255,255,255,0.05);

      color:#fff;
      font-size:15px;
      font-weight:500;

      transition:0.3s;

      border:1.5px solid transparent;
    }

    .input-box input:focus{
      border:1.5px solid #00c6ff;
      background:rgba(0, 198, 255, 0.08);
      box-shadow:0 0 18px rgba(0,198,255,0.2);
    }

    .input-box input::placeholder{
      color:#6e7ba3;
      font-weight:400;
    }

    /* =========================================
       BUTTON - Gradient
    ========================================= */

    .btn{
      width:100%;
      padding:16px;

      border:none;
      border-radius:28px;

      background:linear-gradient(115deg, #00c6ff, #007bff, #6a00ff);
      background-size: 140%;
      color:#fff;
      font-size:16px;
      font-weight:700;

      cursor:pointer;

      transition:0.35s;
      letter-spacing:1px;
    }

    .btn:hover{
      transform:translateY(-3px) scale(1.01);
      box-shadow:0 12px 28px rgba(0,198,255,0.35);
      background:linear-gradient(115deg, #007bff, #6a00ff, #00c6ff);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* =========================================
       EXTRA TEXT
    ========================================= */

    .extra{
      margin-top:24px;
      text-align:center;
      color:#8a99b9;
      font-size:13px;
      font-weight:500;
    }

    .extra a{
      color:#00c6ff;
      text-decoration:none;
      font-weight:600;
      transition:0.2s;
      border-bottom:1px dotted transparent;
    }

    .extra a:hover{
      color:#6a00ff;
      border-bottom-color:#6a00ff;
    }

    .footer{
      margin-top:28px;
      text-align:center;
      color:#556580;
      font-size:11px;
      letter-spacing:1px;
      font-weight:500;
    }

    /* =========================================
       MOBILE RESPONSIVE
    ========================================= */

    @media(max-width:768px){

      .navbar{
        padding:18px 25px;
        flex-direction:column;
        gap:15px;
      }

      .nav-links{
        gap:22px;
      }

      .container{
        width:92%;
        padding:38px 28px;
      }

      .logo h1{
        font-size:32px;
      }

    }

    @media(max-width:480px){
      .container{
        padding:32px 22px;
      }
      
      .logo h1{
        font-size:28px;
      }
      
      .btn{
        padding:14px;
      }
    }

  </style>
</head>

<body>

  <!-- Simple elegant background mesh -->
  <div class="bg-mesh"></div>
  
  <!-- Minimal floating particles -->
  <div class="particle" style="width: 300px; height: 300px; top: -100px; left: -100px; background: rgba(0,198,255,0.08); filter: blur(60px);"></div>
  <div class="particle" style="width: 250px; height: 250px; bottom: -80px; right: -80px; background: rgba(0,123,255,0.08); filter: blur(60px);"></div>
  <div class="particle" style="width: 200px; height: 200px; top: 40%; right: 10%; background: rgba(106,0,255,0.06); filter: blur(50px);"></div>

  <!-- Navbar -->
  <nav class="navbar">

    <div class="brand">
      NEXA <span>HUB AI</span>
    </div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">About</a></li>
    </ul>

  </nav>

  <!-- Login Container -->
  <div class="container">

    <div class="logo">
      <h1>NEXA <span>HUB AI</span></h1>
      <p>Modern Luxury Intelligence Platform</p>
    </div>

    <form id="loginForm">

      <div class="input-box">
        <input
          type="text"
          id="loginInput"
          placeholder="Email or Username"
          required>
      </div>

      <div class="input-box">
        <input
          type="password"
          id="password"
          placeholder="Password"
          required>
      </div>

      <button type="submit" class="btn">
        LOGIN
      </button>
      
      <div class="extra">
        <a href="forgot_password.html">Forgot Password?</a>
        <br>
        <br>
        Don't have an account?
        <a href="signup2.html">Create Account</a>
      </div>

      <div class="footer">
        © 2026 NEXA HUB AI
      </div>

    </form>

  </div>

  <script>

    /* ========== ORIGINAL JAVASCRIPT - COMPLETELY UNCHANGED ========== */

    document.getElementById("loginForm").addEventListener("submit", async function(e){

        e.preventDefault();

        const loginInput = document.getElementById("loginInput").value;
        const password = document.getElementById("password").value;

        try {

            const response = await fetch(
                "http://127.0.0.1:8000/api/token/",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: loginInput,
                        password: password
                    })
                }
            );

            const data = await response.json();

            if (response.ok) {

                localStorage.setItem("token", data.access);

                alert("Login Successful ✅");
                window.location.href = "homepage.html";
            } else {

                alert("Login Failed ❌");
                console.log(data);

            }

        } catch (error) {

            console.log(error);
            alert("Server Error ❌");

        }

    });

  </script>

</body>
</html>
