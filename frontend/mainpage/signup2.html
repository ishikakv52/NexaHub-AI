<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA HUB AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #050816;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            transition: 0.4s;
        }

        body.light-mode {
            background: #edf2ff;
            color: #111;
        }

        .bg {
            position: absolute;
            width: 900px;
            height: 900px;
            background: conic-gradient(#00c6ff, #0072ff, #7b2cff, #00c6ff);
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .theme-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
        }

        .theme-btn:hover { transform: scale(1.1); }

        .container {
            width: 420px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 35px;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: 0.4s;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .title {
            text-align: center;
            margin-bottom: 25px;
        }

        .title h1 { font-size: 32px; }
        .title span { color: #00c6ff; }

        .title p {
            color: #bbb;
            margin-top: 8px;
            font-size: 14px;
        }

        body.light-mode .title p { color: #444; }

        .input-box { margin-bottom: 18px; }

        .input-box label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }

        body.light-mode .input-box label { color: #222; }

        .input-box input {
            width: 100%;
            padding: 14px;
            border: 1px solid transparent;
            outline: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        body.light-mode .input-box input {
            background: rgba(0, 0, 0, 0.05);
            color: #111;
        }

        .input-box input:focus {
            border: 1px solid #00c6ff;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.3);
        }

        .input-box input::placeholder { color: #aaa; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .social {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .social button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        body.light-mode .social button {
            background: rgba(0, 0, 0, 0.05);
            color: #111;
        }

        .social button:hover { background: rgba(255, 255, 255, 0.15); }

        .social img {
            width: 20px;
            height: 20px;
        }

        .or {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 13px;
        }

        body.light-mode .or { color: #444; }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #1a1a2e;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-color: #00ff99; color: #00ff99; }
        .toast.error   { border-color: #ff4d4d; color: #ff4d4d; }
        .toast.info    { border-color: #00c6ff; color: #00c6ff; }

        /* Step indicator */
        .steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .step-dot.active {
            background: #00c6ff;
            width: 24px;
            border-radius: 4px;
        }

        .step-dot.done { background: #00ff99; }

        .success-box {
            text-align: center;
            padding: 20px 0;
        }

        .success-box .checkmark {
            font-size: 56px;
            display: block;
            margin-bottom: 16px;
            animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop {
            from { transform: scale(0); }
            to   { transform: scale(1); }
        }

        .success-box h2 { color: #00ff99; margin-bottom: 8px; }
        .success-box p  { color: #bbb; font-size: 14px; }

        /* Section transition */
        .section { animation: fadeIn 0.35s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media(max-width: 500px) {
            .container { width: 90%; }
            .social { flex-direction: column; }
        }
    </style>
</head>

<body>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- THEME BUTTON -->
    <button class="theme-btn" onclick="toggleMode()">🌙</button>

    <!-- BACKGROUND -->
    <div class="bg"></div>

    <!-- CONTAINER -->
    <div class="container">

        <!-- STEP DOTS -->
        <div class="steps">
            <div class="step-dot active" id="dot1"></div>
            <div class="step-dot"        id="dot2"></div>
            <div class="step-dot"        id="dot3"></div>
        </div>

        <!-- ── STEP 1: REGISTER ── -->
        <div id="registerSection" class="section">

            <div class="title">
                <h1>NEXA <span>HUB AI</span></h1>
                <p>Modern Luxury Intelligence Platform</p>
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="input-box">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div id="usernameStatus" style="margin-top:5px;font-size:13px;"></div>
<div id="usernameSuggestions" style="margin-top:8px;color:#00c6ff;font-size:13px;"></div>
            <button type="button" class="btn" id="sendOtpBtn" onclick="sendOTP()">
                Send OTP
            </button>

            <div class="or">OR CONNECT WITH</div>

            <div class="social">
                <button type="button" onclick="googleLogin()">
    <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png">
    Continue with Google
</button>
                <button type="button" onclick="appleLogin()">
                    <img src="https://cdn-icons-png.flaticon.com/512/0/747.png"> Continue with Apple
                </button>
            </div>

        </div>

        <!-- ── STEP 2: OTP ── -->
        <div id="otpSection" class="section" style="display:none;">

            <div class="title">
                <h1>Verify <span>OTP</span></h1>
                <p id="otpSubtitle">We sent a code to your email</p>
            </div>

            <div class="input-box">
                <label>Enter OTP</label>
                <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
            </div>

            <button type="button" class="btn" id="verifyOtpBtn" onclick="verifyOTP()">
                Verify OTP
            </button>
        <button type="button" class="btn" onclick="resendOTP()">
    Resend OTP
</button>
        </div>

        <!-- ── STEP 3: PASSWORD ── -->
        <div id="passwordSection" class="section" style="display:none;">

            <div class="title">
                <h1>Create <span>Password</span></h1>
                <p>Secure your account</p>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create password">
            </div>

            <div class="input-box">
                <label>Re-enter Password</label>
                <input type="password" id="repassword" placeholder="Re-enter password">
            </div>

            <button type="button" class="btn" id="savePassBtn" onclick="savePassword()">
                Save Password
            </button>

        </div>

        <!-- ── STEP 4: SUCCESS ── -->
        <div id="successSection" class="section" style="display:none;">
            <div class="success-box">
                <span class="checkmark">🎉</span>
                <h2>Registration Successful!</h2>
                <p id="successMsg">Redirecting to login...</p>
            </div>
        </div>

    </div>

    <script>

        /* ─── CONFIG ─────────────────────────────────────── */
        const API_BASE  = "http://127.0.0.1:8000/api";

        /*
         * MOCK MODE — set to true while your backend is not running.
         * The OTP will be shown in a toast so you can test the full flow.
         * Set to false once your Django server is live.
         */
        const MOCK_MODE = false;

        let currentEmail    = "";
        let currentUsername = "";
        let mockOTP         = "";   // only used in MOCK_MODE

        /* ─── TOAST ──────────────────────────────────────── */
        let toastTimer;

        function showToast(msg, type = "info", duration = 3500) {
            const t = document.getElementById("toast");
            t.textContent  = msg;
            t.className    = `toast ${type} show`;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.classList.remove("show"); }, duration);
        }

        /* ─── STEPS ──────────────────────────────────────── */
        function showSection(showId, activeDot) {

    const sections = [
        "registerSection",
        "otpSection",
        "passwordSection",
        "successSection"
    ];

    sections.forEach(id => {

        const el = document.getElementById(id);

        if (el) {
            el.style.display = "none";
        }
    });

    const active = document.getElementById(showId);

    if (active) {
        active.style.display = "block";
    }

    // dots update
    [1, 2, 3].forEach(n => {

        const d = document.getElementById("dot" + n);

        if (!d) return;

        d.className = "step-dot";

        if (n < activeDot) {
            d.classList.add("done");
        }

        if (n === activeDot) {
            d.classList.add("active");
        }
    });
}

        /* ─── THEME ──────────────────────────────────────── */
        function toggleMode() {
            document.body.classList.toggle("light-mode");
            document.querySelector(".theme-btn").innerHTML =
                document.body.classList.contains("light-mode") ? "☀️" : "🌙";
        }

        /* ─── STEP 1: SEND OTP ───────────────────────────── */
        
        async function sendOTP() {

            const email    = document.getElementById("email").value.trim();
            const username = document.getElementById("username").value.trim();

            if (!email || !username) {
                showToast("Please fill all fields ⚠️", "error"); return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast("Please enter a valid email ⚠️", "error"); return;
            }

            currentEmail    = email;
            currentUsername = username;

            /* ── MOCK MODE ── */
            if (MOCK_MODE) {
                mockOTP = String(Math.floor(100000 + Math.random() * 900000));
                showToast(`MOCK OTP: ${mockOTP}  (mock mode)`, "info", 8000);
                document.getElementById("otpSubtitle").textContent =
                    `(Mock) OTP shown in notification above`;
                showSection("otpSection", 2);
                return;
            }

            /* ── REAL API ── */
            const btn = document.getElementById("sendOtpBtn");
            btn.disabled    = true;
            btn.textContent = "Sending...";

            try {
                const res  = await fetch(`${API_BASE}/send-signup-otp/`, {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ email, username })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast("OTP Sent Successfully ✅", "success");
                    document.getElementById("otpSubtitle").textContent =
                        `We sent a code to ${email}`;
                    showSection("otpSection", 2);
                } else {
                    showToast(data.error || "Failed to send OTP ❌", "error");
                }
            } catch (err) {
                console.error(err);
                showToast("Cannot reach server. Is Django running? ❌", "error");
            } finally {
                btn.disabled    = false;
                btn.textContent = "Send OTP";
            }
        }

        /* ─── STEP 2: VERIFY OTP ─────────────────────────── */
        async function verifyOTP() {

            const otp = document.getElementById("otp").value.trim();

            if (!otp) {
                showToast("Please enter the OTP ⚠️", "error"); return;
            }

            /* ── MOCK MODE ── */
            if (MOCK_MODE) {
                if (otp === mockOTP) {
                    showToast("OTP Verified ✅", "success");
                    showSection("passwordSection", 3);
                } else {
                    showToast("Wrong OTP. Check the notification. ❌", "error");
                }
                return;
            }

            /* ── REAL API ── */
            const btn = document.getElementById("verifyOtpBtn");
            btn.disabled    = true;
            btn.textContent = "Verifying...";

            try {
                const res  = await fetch(`${API_BASE}/verify-signup-otp/`, {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ email: currentEmail, otp })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast("OTP Verified ✅", "success");
                    showSection("passwordSection", 3);
                } else {
                    showToast(data.error || "Invalid OTP ❌", "error");
                }
            } catch (err) {
                console.error(err);
                showToast("Cannot reach server ❌", "error");
            } finally {
                btn.disabled    = false;
                btn.textContent = "Verify OTP";
            }
        }

        /* ─── STEP 3: SAVE PASSWORD ──────────────────────── */
        async function savePassword() {

            const password   = document.getElementById("password").value;
            const repassword = document.getElementById("repassword").value;

            if (!password || !repassword) {
                showToast("Please fill both password fields ⚠️", "error"); return;
            }

            if (password.length < 6) {
                showToast("Password must be at least 6 characters ⚠️", "error"); return;
            }

            if (password !== repassword) {
                showToast("Passwords do not match ❌", "error"); return;
            }

            /* ── MOCK MODE ── */
            if (MOCK_MODE) {
                showToast("Account created! (mock mode) ✅", "success");
                showSection("successSection", 3);
                document.getElementById("successMsg").textContent =
                    "Mock registration complete. Redirecting...";
                setTimeout(() => { window.location.href = "login.html"; }, 2500);
                return;
            }

            /* ── REAL API ── */
            const btn = document.getElementById("savePassBtn");
            btn.disabled    = true;
            btn.textContent = "Creating account...";

            try {
                const res  = await fetch(`${API_BASE}/signup/`, {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({
                        username: currentUsername,
                        email:    currentEmail,
                        password
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    showSection("successSection", 3);
                    document.getElementById("successMsg").textContent =
                        `Welcome, ${currentUsername}! Redirecting...`;
                    setTimeout(() => { window.location.href = "homepage.html"; }, 5000);
                } else {
                    showToast(data.error || "Signup failed ❌", "error");
                }
            } catch (err) {
                console.error(err);
                showToast("Cannot reach server ❌", "error");
            } finally {
                btn.disabled    = false;
                btn.textContent = "Save Password";
            }
        }
        /*Resend OTP*/
        async function resendOTP() {

    try {
        const res = await fetch(`${API_BASE}/resend-signup-otp/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: currentEmail })
        });

        const data = await res.json();

        if (res.ok) {
            showToast("OTP resent successfully ✅", "success");
        } else {
            showToast(data.error || "Failed to resend OTP ❌", "error");
        }

    } catch (err) {
        showToast("Server error ❌", "error");
    }
}

document.getElementById("username").addEventListener("input", async function () {

    const username = this.value.trim();

    if (username.length < 3) {
        document.getElementById("usernameStatus").innerHTML = "";
        document.getElementById("usernameSuggestions").innerHTML = "";
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/check-username/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username })
        });

        const data = await res.json();

        const statusBox = document.getElementById("usernameStatus");
        const suggestionBox = document.getElementById("usernameSuggestions");

        if (data.exists) {

            statusBox.innerHTML = "❌ Username already taken";

            suggestionBox.innerHTML =
                "Suggestions: " + data.suggestions.map(s =>
                    `<span style="cursor:pointer" onclick="useSuggestion('${s}')">${s}</span>`
                ).join(", ");

        } else {
            statusBox.innerHTML = "✅ Username available";
            suggestionBox.innerHTML = "";
        }

    } catch (err) {
        console.log(err);
    }
});
      
    function useSuggestion(name) {
    document.getElementById("username").value = name;
    document.getElementById("usernameStatus").innerHTML = "✅ Username available";
    document.getElementById("usernameSuggestions").innerHTML = "";
}
    </script>

</body>
</html>
