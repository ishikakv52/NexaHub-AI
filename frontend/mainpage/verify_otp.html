<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Verify OTP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    overflow:hidden;
}

/* Background Glow */

body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#3b82f6;
    border-radius:50%;
    top:-100px;
    left:-100px;
    filter:blur(120px);
    opacity:0.5;
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#06b6d4;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    filter:blur(120px);
    opacity:0.5;
}

/* OTP Card */

.container{
    position:relative;
    width:400px;
    padding:40px 35px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    border-radius:25px;
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
    text-align:center;
    z-index:10;
}

.logo{
    width:75px;
    height:75px;
    margin:auto;
    margin-bottom:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#3b82f6,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    color:#fff;
    font-weight:700;
    box-shadow:0 5px 20px rgba(59,130,246,0.4);
}

h2{
    color:#fff;
    font-size:30px;
    margin-bottom:8px;
}

p{
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:30px;
}

/* Input Box */

.input-box{
    position:relative;
    width:100%;
    margin-bottom:25px;
}

.input-box input{
    width:100%;
    height:55px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;
    outline:none;
    color:#fff;
    font-size:17px;
    text-align:center;
    letter-spacing:8px;
    font-weight:600;
    transition:0.3s;
}

.input-box input::placeholder{
    color:#cbd5e1;
    letter-spacing:2px;
}

.input-box input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 15px rgba(59,130,246,0.4);
}

/* Button */

button{
    width:100%;
    height:55px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:#fff;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 20px rgba(37,99,235,0.35);
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 25px rgba(37,99,235,0.5);
}

/* Resend */

.resend{
    margin-top:18px;
    color:#cbd5e1;
    font-size:14px;
}

.resend a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:500;
}

.resend a:hover{
    text-decoration:underline;
}

/* Mobile Responsive */

@media(max-width:450px){

    .container{
        width:90%;
        padding:35px 25px;
    }

    h2{
        font-size:26px;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="logo">
        AI
    </div>

    <h2>Verify OTP</h2>

    <p>
        Enter the OTP sent to your email address
    </p>

    <form id="otpForm">

        <div class="input-box">
            <input 
                type="text" 
                id="otp" 
                placeholder="Enter OTP"
                maxlength="6"
                required
            >
        </div>

        <button type="submit">
            Verify OTP
        </button>

    </form>

    <div class="resend">
        Didn’t receive OTP?
        <a href="#">Resend</a>
    </div>

</div>

<script>

document.getElementById("otpForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const otp =
    document.getElementById("otp").value;

    const email =
    localStorage.getItem("reset_email");

    const res = await fetch(
      "http://127.0.0.1:8000/api/verify-otp/",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
            email: email,
            otp: otp
        })
      }
    );

    const data = await res.json();

    console.log(data);

    if(res.ok){

        alert("OTP Verified");

        window.location.href =
        "reset_password.html";

    }else{

        alert(data.error);

    }

});
</script>

</body>
</html>
