<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXA HUB AI - Modern Luxury Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#050816;
      overflow:hidden;
      position:relative;
    }

    /* Animated Background Glow */
    body::before{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:#007bff;
      border-radius:50%;
      top:-180px;
      left:-120px;
      filter:blur(150px);
      opacity:0.5;
      animation:float 8s ease-in-out infinite;
    }

    body::after{
      content:'';
      position:absolute;
      width:450px;
      height:450px;
      background:#00c6ff;
      border-radius:50%;
      bottom:-180px;
      right:-120px;
      filter:blur(150px);
      opacity:0.4;
      animation:float2 10s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(30px);}
    }

    @keyframes float2{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-30px);}
    }

    .container{
      position:relative;
      width:400px;
      padding:45px;
      border-radius:25px;
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:
      0 8px 32px rgba(0,0,0,0.45),
      inset 0 0 0 rgba(255,255,255,0.05);
      z-index:10;
    }

    .logo{
      text-align:center;
      margin-bottom:30px;
    }

    .logo h1{
      color:#fff;
      font-size:34px;
      font-weight:700;
      letter-spacing:2px;
    }

    .logo span{
      color:#00c6ff;
    }

    .logo p{
      color:#b5b5b5;
      font-size:13px;
      margin-top:5px;
      letter-spacing:1px;
    }

    .input-box{
      position:relative;
      margin-bottom:22px;
    }

    .input-box input{
      width:100%;
      padding:15px 18px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,0.08);
      color:#fff;
      font-size:15px;
      transition:0.3s;
      border:1px solid transparent;
    }

    .input-box input:focus{
      border:1px solid #00c6ff;
      background:rgba(255,255,255,0.12);
      box-shadow:0 0 15px rgba(0,198,255,0.3);
    }

    .input-box input::placeholder{
      color:#aaa;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#007bff,#00c6ff);
      color:#fff;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.4s;
      letter-spacing:1px;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(0,198,255,0.35);
    }

    .extra{
      margin-top:20px;
      text-align:center;
      color:#bbb;
      font-size:14px;
    }

    .extra a{
      color:#00c6ff;
      text-decoration:none;
      font-weight:500;
    }

    .extra a:hover{
      text-decoration:underline;
    }

    .footer{
      margin-top:25px;
      text-align:center;
      color:#666;
      font-size:12px;
      letter-spacing:1px;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      <h1>NEXA <span>HUB AI</span></h1>
      <p>Modern Luxury Intelligence Platform</p>
    </div>

    <form>
      <div class="input-box">
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" required>
      </div>

      <button class="btn">LOGIN</button>

      <div class="extra">
        Don't have an account?
        <a href="#">Create Account</a>
      </div>

      <div class="footer">
        © 2026 NEXA HUB AI
      </div>
    </form>

  </div>

</body>
</html>
