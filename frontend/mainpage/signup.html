<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXA HUB AI - Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* BODY */

body{
    background:#050816;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    transition:0.4s;
}

/* BACKGROUND */

.bg{
    position:absolute;
    width:900px;
    height:900px;

    background:conic-gradient(
    #00c6ff,
    #0072ff,
    #7b2cff,
    #00c6ff);

    border-radius:50%;

    filter:blur(120px);

    opacity:0.25;

    animation:rotate 15s linear infinite;
}

@keyframes rotate{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* THEME BUTTON */

.theme-btn{
    position:absolute;
    top:20px;
    right:20px;

    width:45px;
    height:45px;

    border:none;
    border-radius:50%;

    background:rgba(255,255,255,0.12);

    color:white;

    font-size:20px;

    cursor:pointer;

    z-index:100;

    transition:0.3s;
}

.theme-btn:hover{
    transform:scale(1.1);
}

/* CARD */

.container{
    width:420px;

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border-radius:25px;

    padding:35px;

    position:relative;

    z-index:10;

    box-shadow:0 10px 40px rgba(0,0,0,0.4);

    transition:0.4s;
}

/* TITLE */

.title{
    text-align:center;
    margin-bottom:25px;
}

.title h1{
    font-size:32px;
}

.title span{
    color:#00c6ff;
}

.title p{
    color:#bbb;
    margin-top:8px;
    font-size:14px;
}

/* INPUTS */

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#ddd;
}

.input-box input{
    width:100%;
    padding:14px;

    border:none;
    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:15px;

    border:1px solid transparent;

    transition:0.3s;
}

.input-box input:focus{
    border:1px solid #00c6ff;

    box-shadow:0 0 15px rgba(0,198,255,0.3);
}

.input-box input::placeholder{
    color:#aaa;
}

/* BUTTON */

.btn{
    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
    135deg,
    #0072ff,
    #00c6ff);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);

    box-shadow:0 8px 20px rgba(0,198,255,0.4);
}

/* OR */

.or{
    text-align:center;
    margin:18px 0;
    color:#aaa;
}

/* SOCIAL BUTTONS */

.social{
    display:flex;
    gap:12px;
}

.social button{
    flex:1;

    padding:12px;

    border:none;

    border-radius:12px;

    background:rgba(255,255,255,0.08);

    color:white;

    cursor:pointer;

    font-size:14px;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:10px;

    transition:0.3s;
}

.social button img{
    width:20px;
    height:20px;
}

.social button:hover{
    background:rgba(255,255,255,0.15);

    transform:translateY(-2px);
}

/* OTP SECTION */

#otpSection{
    display:none;
    margin-top:25px;
}

/* PASSWORD SECTION */

#passwordSection{
    display:none;
    margin-top:25px;
}

/* FOOTER */

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:#777;
}

/* LIGHT MODE */

.light-mode{
    background:#eef3ff;
    color:#111;
}

.light-mode .container{
    background:rgba(255,255,255,0.75);
}

.light-mode .input-box label{
    color:#222;
}

.light-mode .input-box input{
    background:rgba(0,0,0,0.05);
    color:#111;
}

.light-mode .input-box input::placeholder{
    color:#555;
}

.light-mode .title p,
.light-mode .footer,
.light-mode .or{
    color:#444;
}

.light-mode .social button{
    background:rgba(0,0,0,0.05);
    color:#111;
}

.light-mode .theme-btn{
    background:#111;
    color:white;
}

/* MOBILE */

@media(max-width:500px){

    .container{
        width:90%;
        padding:25px;
    }

}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="bg"></div>

<!-- THEME BUTTON -->

<button class="theme-btn" onclick="toggleMode()">
    🌙
</button>

<!-- MAIN CONTAINER -->

<div class="container">

    <!-- TITLE -->

    <div class="title">

        <h1>NEXA <span>HUB AI</span></h1>

        <p>Modern Registration System</p>

    </div>

    <!-- REGISTER SECTION -->

    <div id="registerSection">

        <div class="input-box">

            <label>Email</label>

            <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required>

        </div>

        <div class="input-box">

            <label>Create Unique Username</label>

            <input
            type="text"
            id="username"
            placeholder="Enter username"
            required>

        </div>

        <button class="btn" onclick="sendOTP()">
            Send OTP
        </button>

        <div class="or">
            OR
        </div>

        <!-- GOOGLE + APPLE -->

        <div class="social">

            <button>

                <img
                src="https://cdn-icons-png.flaticon.com/512/281/281764.png"
                alt="Google">

                Google

            </button>

            <button>

                <img
                src="https://cdn-icons-png.flaticon.com/512/0/747.png"
                alt="Apple">

                Apple

            </button>

        </div>

    </div>

    <!-- OTP SECTION -->

    <div id="otpSection">

        <div class="input-box">

            <label>Verify OTP</label>

            <input
            type="text"
            id="otp"
            placeholder="Enter OTP">

        </div>

        <button class="btn" onclick="verifyOTP()">
            Submit OTP
        </button>

    </div>

    <!-- PASSWORD SECTION -->

    <div id="passwordSection">

        <div class="input-box">

            <label>Create Password</label>

            <input
            type="password"
            id="password"
            placeholder="Create password">

        </div>

        <div class="input-box">

            <label>Re-enter Password</label>

            <input
            type="password"
            id="repassword"
            placeholder="Re-enter password">

        </div>

        <button class="btn" onclick="savePassword()">
            Save Password
        </button>

    </div>

    <!-- FOOTER -->

    <div class="footer">
        © 2026 NEXA HUB AI
    </div>

</div>

<script>

/* SEND OTP */

function sendOTP(){

    let email = document.getElementById("email").value;

    let username = document.getElementById("username").value;

    if(email === "" || username === ""){

        alert("Please fill all fields");
        return;
    }

    alert("OTP Sent Successfully ✅");

    document.getElementById("otpSection").style.display = "block";
}

/* VERIFY OTP */

function verifyOTP(){

    let otp = document.getElementById("otp").value;

    if(otp === ""){

        alert("Enter OTP");
        return;
    }

    alert("OTP Verified Successfully ✅");

    document.getElementById("passwordSection").style.display = "block";
}

/* SAVE PASSWORD */

function savePassword(){

    let password = document.getElementById("password").value;

    let repassword = document.getElementById("repassword").value;

    if(password === "" || repassword === ""){

        alert("Please enter password");
        return;
    }

    if(password !== repassword){

        alert("Passwords do not match ❌");
        return;
    }

    alert("Registration Successful ✅");

    window.location.href = "dashboard.html";
}

/* DARK / LIGHT MODE */

function toggleMode(){

    document.body.classList.toggle("light-mode");

    let btn = document.querySelector(".theme-btn");

    if(document.body.classList.contains("light-mode")){

        btn.innerHTML = "☀️";

    }else{

        btn.innerHTML = "🌙";
    }
}

</script>

</body>
</html>
