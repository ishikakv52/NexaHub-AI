<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexa Hub AI - Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* BACKGROUND */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top left,#00ffcc33,transparent 40%),
                radial-gradient(circle at bottom right,#7c3aed33,transparent 40%),
                #0b1220;
}

/* CARD */
.container{
    width:400px;
    padding:45px 35px;
    border-radius:22px;

    background:rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);

    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);

    text-align:center;
}

/* BRAND */
.app-name{
    font-size:28px;
    font-weight:700;
    margin-bottom:10px;
    background:linear-gradient(90deg,#00ffcc,#38bdf8,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* LOGO */
.ai-logo{
    width:80px;
    height:80px;
    margin:0 auto 18px;
    border-radius:18px;

    background:linear-gradient(135deg,#00ffcc,#8b5cf6);
    display:flex;
    justify-content:center;
    align-items:center;

    font-size:26px;
    font-weight:bold;
    color:white;

    box-shadow:0 10px 30px rgba(0,255,204,0.25);
}

/* HEADING */
h2{
    color:white;
    margin-bottom:8px;
}

.subtitle{
    color:#cbd5e1;
    font-size:13px;
    margin-bottom:25px;
}

/* INPUT */
.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:15px;
    border-radius:12px;

    border:1px solid rgba(255,255,255,0.15);
    background:rgba(0,0,0,0.25);

    color:white;
    outline:none;
    transition:0.3s;
}

.input-box input:focus{
    border-color:#00ffcc;
    box-shadow:0 0 15px rgba(0,255,204,0.2);
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;

    background:linear-gradient(90deg,#00ffcc,#8b5cf6);
    color:#0b1220;

    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* FOOTER */
.footer-text{
    margin-top:18px;
    font-size:13px;
    color:#cbd5e1;
}

.footer-text a{
    color:#00ffcc;
    text-decoration:none;
}

.footer-text a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

    <div class="app-name">Nexa Hub AI</div>

    <div class="ai-logo">AI</div>

    <h2>Reset Password</h2>

    <p class="subtitle">
        Create a new strong password for your account
    </p>

    <form id="resetForm">

        <div class="input-box">
            <input 
                type="password" 
                id="password" 
                placeholder="Enter New Password"
                required
            >
        </div>

        <button type="submit">
            Reset Password
        </button>

    </form>

    <div class="footer-text">
        Back to <a href="login.html">Login</a>
    </div>

</div>

<script>
document.getElementById("resetForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const password = document.getElementById("password").value;
    const email = localStorage.getItem("reset_email");

    const res = await fetch("http://127.0.0.1:8000/api/reset-password/", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email, password})
    });

    const data = await res.json();

    if(res.ok){
        alert("Password Changed");
        window.location.href = "login.html";
    } else {
        alert(data.error);
    }
});
</script>

</body>
</html>
