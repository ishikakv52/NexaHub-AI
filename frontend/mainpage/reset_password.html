<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>

<title>Nexa Hub AI - Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* BODY - Enhanced depth */

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    transition:0.4s ease;

    background:
    linear-gradient(
    135deg,
    #020617,
    #0f172a,
    #1e3a8a);
}

/* LIGHT MODE - fresh & clean */

body.light-mode{
    background:
    linear-gradient(
    135deg,
    #eef2ff,
    #dbeafe,
    #bfdbfe);
}

/* GLOW EFFECT - refined orbs */

body::before{
    content:"";
    position:absolute;
    width:360px;
    height:360px;
    border-radius:50%;
    top:-110px;
    left:-110px;

    background:
    rgba(59,130,246,0.28);

    filter:blur(95px);
    z-index:0;
}

body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    bottom:-100px;
    right:-100px;

    background:
    rgba(96,165,250,0.22);

    filter:blur(95px);
    z-index:0;
}

body.light-mode::before {
    background: rgba(37,99,235,0.1);
}
body.light-mode::after {
    background: rgba(59,130,246,0.08);
}

/* THEME TOGGLE - premium glass */

.theme-toggle{
    position:absolute;
    top:25px;
    right:25px;

    width:52px;
    height:52px;

    border:none;
    border-radius:50%;

    background:
    rgba(255,255,255,0.12);

    color:white;
    font-size:20px;

    cursor:pointer;

    backdrop-filter:blur(10px);

    transition:0.3s;

    z-index:100;
    display: flex;
    align-items: center;
    justify-content: center;
}

.theme-toggle:hover{
    transform:scale(1.08);
    background: rgba(255,255,255,0.22);
}

body.light-mode .theme-toggle{
    background:
    rgba(255,255,255,0.9);

    color:#1d4ed8;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* CARD - superior glassmorphism */

.container{
    width:420px;
    padding:45px 35px;
    border-radius:32px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border:
    1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 25px 55px rgba(0,0,0,0.45);

    text-align:center;

    position:relative;
    z-index:15;

    transition:0.4s ease;
}

/* LIGHT CARD - soft & airy */

body.light-mode .container{
    background:
    rgba(255,255,255,0.78);

    border:
    1px solid rgba(255,255,255,0.65);

    box-shadow:
    0 15px 40px rgba(15,23,42,0.1);
}

/* ========== APP NAME - NEW COLOR SCHEME ========== */
/* Nexa = White color, Hub AI = Blue color */
.app-name {
    font-size:34px;
    font-weight:800;
    margin-bottom:16px;
    text-align:center;
    letter-spacing:-0.3px;
}

.nexa-white {
    color: #ffffff;
    text-shadow: 0 0 14px rgba(255,255,255,0.45);
}

.hub-blue {
    color: #3b82f6;
    text-shadow: 0 0 10px rgba(59,130,246,0.5);
}

/* Light mode adjustments */
body.light-mode .nexa-white {
    color: #1e293b;
    text-shadow: none;
}

body.light-mode .hub-blue {
    color: #1d4ed8;
    text-shadow: 0 1px 3px rgba(29,78,216,0.2);
}

/* LOGO - vibrant gradient */

.ai-logo{
    width:90px;
    height:90px;
    margin:0 auto 22px;
    border-radius:28px;

    background:
    linear-gradient(
    145deg,
    #3b82f6,
    #2563eb,
    #60a5fa);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:36px;
    font-weight:bold;
    color:white;

    box-shadow:
    0 15px 32px rgba(59,130,246,0.38);
    transition: transform 0.2s ease;
}

.ai-logo:hover {
    transform: scale(1.02);
}

/* HEADING */

h2{
    color:white;
    margin-bottom:10px;
    font-size:28px;
    font-weight:700;
    letter-spacing:-0.2px;
}

body.light-mode h2{
    color:#0f2e5c;
}

/* SUBTITLE */

.subtitle{
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:32px;
    line-height:1.6;
    font-weight:500;
    opacity:0.92;
}

body.light-mode .subtitle{
    color:#1e40af;
}

/* INPUT FIELD - modern rounded */

.input-box{
    margin-bottom:24px;
}

.input-box input{
    width:100%;
    padding:16px 20px;

    border-radius:20px;

    border:
    1px solid rgba(255,255,255,0.2);

    background:
    rgba(255,255,255,0.08);

    color:white;

    outline:none;

    font-size:15px;
    font-weight:500;

    transition:0.3s;
}

body.light-mode .input-box input{
    background:
    rgba(255,255,255,0.94);

    border:
    1px solid rgba(96,165,250,0.4);

    color:#1e3a8a;
}

.input-box input::placeholder{
    color:#94a3b8;
    font-weight:400;
}

body.light-mode .input-box input::placeholder{
    color:#6b93c9;
}

.input-box input:focus{
    border-color:#3b82f6;

    box-shadow:
    0 0 18px rgba(59,130,246,0.4);
    background: rgba(255,255,255,0.12);
}

body.light-mode .input-box input:focus{
    border-color:#2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    background: white;
}

/* BUTTON - sleek gradient */

button.submit-btn{
    width:100%;
    padding:16px;

    border:none;
    border-radius:32px;

    background:
    linear-gradient(
    105deg,
    #3b82f6,
    #2563eb,
    #60a5fa);

    background-size: 140%;
    color:white;

    font-size:16px;
    font-weight:700;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 8px 24px rgba(37,99,235,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

button.submit-btn i {
    font-size: 1.1rem;
}

button.submit-btn:hover{
    transform:translateY(-2px);
    box-shadow: 0 14px 30px rgba(37,99,235,0.55);
    background: linear-gradient(105deg, #2563eb, #3b82f6, #38bdf8);
}

button.submit-btn:active {
    transform: translateY(1px);
}

/* FOOTER LINK */

.footer-text{
    margin-top:26px;
    font-size:13px;
    color:#cbd5e1;
    font-weight:500;
}

body.light-mode .footer-text{
    color:#2563eb;
}

.footer-text a{
    color:#7abff7;
    text-decoration:none;
    font-weight:700;
    margin-left:5px;
    border-bottom: 1px dotted rgba(122,191,247,0.5);
    transition:0.2s;
}

.footer-text a:hover{
    color:#ffffff;
    border-bottom-color:#ffffff;
}

body.light-mode .footer-text a{
    color:#1d4ed8;
    border-bottom-color:#3b82f6;
}
body.light-mode .footer-text a:hover{
    color:#0c4e9e;
}

/* RESPONSIVE */

@media(max-width:480px){

    .container{
        width:92%;
        padding:35px 24px;
    }

    .app-name{
        font-size:28px;
    }

    h2{
        font-size:24px;
    }

    .ai-logo{
        width:80px;
        height:80px;
        font-size:30px;
    }
    
    .input-box input {
        padding: 14px 18px;
    }
}

/* Password field polish */
.input-box input[type="password"] {
    letter-spacing: normal;
    font-family: 'Poppins', monospace;
}

</style>
</head>

<body>

<!-- THEME TOGGLE -->

<button class="theme-toggle" id="themeBtn">
    <i class="fa-solid fa-moon"></i>
</button>

<!-- RESET PASSWORD CARD -->

<div class="container">

    <!-- Updated username colors: Nexa = White, Hub AI = Blue -->
    <div class="app-name">
        <span class="nexa-white">Nexa</span>
        <span class="hub-blue"> Hub AI</span>
    </div>

    <div class="ai-logo">
        <i class="fa-solid fa-key"></i>
    </div>

    <h2>Reset Password</h2>

    <p class="subtitle">
        Create a new strong password for your account
    </p>

    <form id="resetForm">

        <div class="input-box">

            <input 
                type="password" 
                id="password" 
                placeholder="Enter New Password"
                required
                autocomplete="new-password"
            >

        </div>

        <button
            type="submit"
            class="submit-btn"
        >
            <i class="fa-solid fa-rotate-right"></i>
            Reset Password
        </button>

    </form>

    <div class="footer-text">
        Back to
        <a href="login.html">Login</a>
    </div>

</div>

<script>

/* THEME TOGGLE - ORIGINAL (UNCHANGED) */

const themeBtn =
document.getElementById("themeBtn");

themeBtn.addEventListener("click", ()=>{

    document.body.classList.toggle(
        "light-mode"
    );

    if(
        document.body.classList.contains(
            "light-mode"
        )
    ){
        themeBtn.innerHTML =
        '<i class="fa-solid fa-sun"></i>';
    }
    else{
        themeBtn.innerHTML =
        '<i class="fa-solid fa-moon"></i>';
    }

});

/* RESET PASSWORD - ORIGINAL LOGIC (COMPLETELY UNCHANGED) */

document.getElementById("resetForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const password =
    document.getElementById("password").value;

    const email =
    localStorage.getItem("reset_email");

    try{

        const res = await fetch(
            "http://127.0.0.1:8000/api/reset-password/",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data = await res.json();

        if(res.ok){

            alert("Password Changed Successfully ✅");

            window.location.href =
            "login.html";

        }
        else{

            alert(
                data.error ||
                "Something went wrong ❌"
            );

        }

    }
    catch(error){

        console.log(error);

        alert("Server Error ❌");

    }

});

</script>

</body>
</html>
