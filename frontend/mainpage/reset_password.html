<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nexa Hub AI - Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* BODY */

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    transition:0.4s ease;

    background:
    linear-gradient(
    135deg,
    #020617,
    #0f172a,
    #1e3a8a);
}

/* LIGHT MODE */

body.light-mode{
    background:
    linear-gradient(
    135deg,
    #dbeafe,
    #bfdbfe,
    #93c5fd);
}

/* GLOW EFFECT */

body::before{
    content:"";
    position:absolute;
    width:320px;
    height:320px;
    border-radius:50%;
    top:-100px;
    left:-100px;

    background:
    rgba(59,130,246,0.22);

    filter:blur(80px);
}

body::after{
    content:"";
    position:absolute;
    width:280px;
    height:280px;
    border-radius:50%;
    bottom:-90px;
    right:-90px;

    background:
    rgba(37,99,235,0.20);

    filter:blur(80px);
}

/* THEME TOGGLE */

.theme-toggle{
    position:absolute;
    top:25px;
    right:25px;

    width:52px;
    height:52px;

    border:none;
    border-radius:50%;

    background:
    rgba(255,255,255,0.12);

    color:white;
    font-size:20px;

    cursor:pointer;

    backdrop-filter:blur(10px);

    transition:0.3s;

    z-index:100;
}

.theme-toggle:hover{
    transform:scale(1.08);
}

body.light-mode .theme-toggle{
    background:
    rgba(255,255,255,0.9);

    color:#1d4ed8;
}

/* CARD */

.container{
    width:400px;
    padding:45px 35px;
    border-radius:24px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 20px 60px rgba(0,0,0,0.5);

    text-align:center;

    position:relative;
    z-index:10;

    transition:0.4s ease;
}

/* LIGHT CARD */

body.light-mode .container{
    background:
    rgba(255,255,255,0.72);

    border:
    1px solid rgba(255,255,255,0.5);

    box-shadow:
    0 10px 35px rgba(15,23,42,0.12);
}

/* BRAND */

.app-name{
    font-size:32px;
    font-weight:800;
    margin-bottom:16px;

    background:
    linear-gradient(
    90deg,
    #3b82f6,
    #2563eb,
    #60a5fa);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* LOGO */

.ai-logo{
    width:90px;
    height:90px;
    margin:0 auto 22px;
    border-radius:22px;

    background:
    linear-gradient(
    135deg,
    #3b82f6,
    #2563eb,
    #60a5fa);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:32px;
    font-weight:bold;
    color:white;

    box-shadow:
    0 10px 30px rgba(59,130,246,0.25);
}

/* HEADING */

h2{
    color:white;
    margin-bottom:10px;
    font-size:28px;
}

body.light-mode h2{
    color:#1e3a8a;
}

/* SUBTITLE */

.subtitle{
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:28px;
    line-height:1.6;
}

body.light-mode .subtitle{
    color:#1d4ed8;
}

/* INPUT */

.input-box{
    margin-bottom:22px;
}

.input-box input{
    width:100%;
    padding:16px;

    border-radius:14px;

    border:
    1px solid rgba(255,255,255,0.15);

    background:
    rgba(255,255,255,0.08);

    color:white;

    outline:none;

    transition:0.3s;
}

body.light-mode .input-box input{
    background:
    rgba(255,255,255,0.92);

    border:
    1px solid rgba(96,165,250,0.3);

    color:#1e3a8a;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

body.light-mode .input-box input::placeholder{
    color:#3b82f6;
}

.input-box input:focus{
    border-color:#3b82f6;

    box-shadow:
    0 0 15px rgba(59,130,246,0.25);
}

/* BUTTON */

button.submit-btn{
    width:100%;
    padding:15px;

    border:none;
    border-radius:14px;

    background:
    linear-gradient(
    135deg,
    #3b82f6,
    #2563eb,
    #60a5fa);

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 10px 25px rgba(59,130,246,0.25);
}

button.submit-btn:hover{
    transform:translateY(-2px);
}

/* FOOTER */

.footer-text{
    margin-top:22px;
    font-size:13px;
    color:#cbd5e1;
}

body.light-mode .footer-text{
    color:#1d4ed8;
}

.footer-text a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:600;
}

.footer-text a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */

@media(max-width:480px){

    .container{
        width:92%;
        padding:35px 24px;
    }

    .app-name{
        font-size:28px;
    }

    h2{
        font-size:24px;
    }

    .ai-logo{
        width:80px;
        height:80px;
        font-size:28px;
    }
}

</style>
</head>

<body>

<!-- THEME TOGGLE -->

<button class="theme-toggle" id="themeBtn">
    <i class="fa-solid fa-moon"></i>
</button>

<!-- CARD -->

<div class="container">

    <div class="app-name">
        Nexa Hub AI
    </div>

    <div class="ai-logo">
        <i class="fa-solid fa-key"></i>
    </div>

    <h2>Reset Password</h2>

    <p class="subtitle">
        Create a new strong password for your account
    </p>

    <form id="resetForm">

        <div class="input-box">

            <input 
                type="password" 
                id="password" 
                placeholder="Enter New Password"
                required
            >

        </div>

        <button
            type="submit"
            class="submit-btn"
        >
            <i class="fa-solid fa-rotate-right"></i>
            Reset Password
        </button>

    </form>

    <div class="footer-text">
        Back to
        <a href="login.html">Login</a>
    </div>

</div>

<script>

/* THEME TOGGLE */

const themeBtn =
document.getElementById("themeBtn");

themeBtn.addEventListener("click", ()=>{

    document.body.classList.toggle(
        "light-mode"
    );

    if(
        document.body.classList.contains(
            "light-mode"
        )
    ){
        themeBtn.innerHTML =
        '<i class="fa-solid fa-sun"></i>';
    }
    else{
        themeBtn.innerHTML =
        '<i class="fa-solid fa-moon"></i>';
    }

});

/* RESET PASSWORD */

document.getElementById("resetForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const password =
    document.getElementById("password").value;

    const email =
    localStorage.getItem("reset_email");

    try{

        const res = await fetch(
            "http://127.0.0.1:8000/api/reset-password/",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data = await res.json();

        if(res.ok){

            alert("Password Changed Successfully ✅");

            window.location.href =
            "login.html";

        }
        else{

            alert(
                data.error ||
                "Something went wrong ❌"
            );

        }

    }
    catch(error){

        console.log(error);

        alert("Server Error ❌");

    }

});

</script>

</body>
</html>
