<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexa Hub AI - Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top left,#00ffcc33,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed44,transparent 25%),
    linear-gradient(135deg,#020617,#0f172a,#111827);
    overflow:hidden;
    position:relative;
}

/* Animated Background */

.bg-animation span{
    position:absolute;
    display:block;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    animation:float 15s linear infinite;
    bottom:-150px;
}

.bg-animation span:nth-child(1){
    left:10%;
    width:80px;
    height:80px;
    animation-duration:18s;
}

.bg-animation span:nth-child(2){
    left:25%;
    width:120px;
    height:120px;
    animation-duration:22s;
}

.bg-animation span:nth-child(3){
    left:45%;
    width:60px;
    height:60px;
    animation-duration:16s;
}

.bg-animation span:nth-child(4){
    left:70%;
    width:140px;
    height:140px;
    animation-duration:25s;
}

.bg-animation span:nth-child(5){
    left:85%;
    width:90px;
    height:90px;
    animation-duration:20s;
}

@keyframes float{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

.container{
    position:relative;
    width:420px;
    padding:45px 35px;
    border-radius:28px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 15px 45px rgba(0,0,0,0.45);
    z-index:10;
}

.app-name{
    text-align:center;
    font-size:32px;
    font-weight:700;
    margin-bottom:10px;
    background:linear-gradient(90deg,#00ffcc,#38bdf8,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.ai-logo{
    width:90px;
    height:90px;
    margin:0 auto 20px;
    border-radius:24px;
    background:linear-gradient(135deg,#00ffcc,#8b5cf6);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:34px;
    font-weight:700;
    box-shadow:0 10px 30px rgba(0,255,204,0.3);
}

h2{
    text-align:center;
    color:#fff;
    font-size:26px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:30px;
    line-height:1.6;
}

.input-box{
    margin-bottom:25px;
}

.input-box input{
    width:100%;
    padding:16px 18px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    color:#fff;
    font-size:15px;
    transition:0.3s;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

.input-box input:focus{
    border-color:#00ffcc;
    box-shadow:0 0 20px rgba(0,255,204,0.25);
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#00ffcc,#8b5cf6);
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s ease;
    box-shadow:0 10px 25px rgba(139,92,246,0.35);
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 30px rgba(0,255,204,0.3);
}

.footer-text{
    margin-top:22px;
    text-align:center;
    color:#cbd5e1;
    font-size:13px;
}

.footer-text a{
    color:#00ffcc;
    text-decoration:none;
    font-weight:500;
}

.footer-text a:hover{
    text-decoration:underline;
}

@media(max-width:480px){

    .container{
        width:92%;
        padding:35px 25px;
    }

    .app-name{
        font-size:26px;
    }

}

</style>
</head>

<body>

<div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container">

    <div class="app-name">Nexa Hub AI</div>

    <div class="ai-logo">AI</div>

    <h2>Reset Password</h2>

    <p class="subtitle">
        Create a strong new password to secure your Nexa Hub AI account
    </p>

    <form id="resetForm">

        <div class="input-box">
            <input 
                type="password" 
                id="password" 
                placeholder="Enter New Password"
                required
            >
        </div>

        <button type="submit">
            Reset Password
        </button>

    </form>

    <div class="footer-text">
        Back to <a href="login.html">Login</a>
    </div>

</div>

<script>
document.getElementById("resetForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const password = document.getElementById("password").value;
    const email = localStorage.getItem("reset_email");

    const res = await fetch("http://127.0.0.1:8000/api/reset-password/", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email, password})
    });

    const data = await res.json();

    if(res.ok){
        alert("Password Changed");
        window.location.href = "login.html";
    } else {
        alert(data.error);
    }
});
</script>

</body>
</html>
