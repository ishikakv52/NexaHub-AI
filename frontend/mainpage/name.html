<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NEXA HUB AI · Meet Your AI Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #0f1535 50%, #0a0e27 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background 0.3s ease;
            position: relative;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: #3b82f6;
            top: -100px;
            left: -100px;
            animation: float1 18s infinite ease-in-out;
        }
        .orb-2 {
            width: 400px;
            height: 400px;
            background: #8b5cf6;
            bottom: -150px;
            right: -100px;
            animation: float2 22s infinite ease-in-out;
        }
        .orb-3 {
            width: 250px;
            height: 250px;
            background: #06b6d4;
            top: 40%;
            right: 20%;
            animation: float3 15s infinite ease-in-out;
            opacity: 0.25;
        }
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 40px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, -50px); }
        }
        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        body.light-mode {
            background: linear-gradient(135deg, #eef2f8 0%, #e0e8f2 100%);
        }
        body.light-mode .orb {
            opacity: 0.2;
        }

        .nexa-card {
            position: relative;
            z-index: 10;
            max-width: 460px;
            width: 100%;
            background: rgba(15, 21, 53, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            border: 1px solid rgba(59, 130, 246, 0.35);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(59, 130, 246, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        body.light-mode .nexa-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(37, 99, 235, 0.25);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            padding: 1.3rem 1.8rem 0.8rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        body.light-mode .card-header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        /* Theme toggle button - kept only right side, removed left profile */
        .theme-touch {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 0.3rem 0.9rem;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 600;
            color: #cbd5e6;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        body.light-mode .theme-touch {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
            color: #1e293b;
        }

        .theme-touch:hover {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .logo-area {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 0;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .nexa-glow {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }
        .hub-glow {
            color: #3b82f6;
            text-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
        }
        body.light-mode .nexa-glow {
            color: #0f172a;
            text-shadow: none;
        }
        body.light-mode .hub-glow {
            color: #2563eb;
            text-shadow: none;
        }

        .chip {
            display: inline-block;
            background: linear-gradient(95deg, rgba(59,130,246,0.2), rgba(6,182,212,0.2));
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 600;
            color: #60a5fa;
            margin-top: 0.6rem;
            border: 1px solid rgba(59,130,246,0.3);
        }

        .card-content {
            padding: 2rem 1.8rem 2rem;
        }

        /* MAIN PROFILE PHOTO - Center, clickable upload */
        .avatar-ring {
            display: flex;
            justify-content: center;
            margin-bottom: 1.2rem;
        }
        .main-profile-container {
            cursor: pointer;
            position: relative;
            text-align: center;
        }
        .main-avatar-photo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
            overflow: hidden;
            position: relative;
            margin: 0 auto;
        }
        body.light-mode .main-avatar-photo {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            border-color: rgba(37, 99, 235, 0.5);
        }
        .main-avatar-photo i {
            font-size: 3rem;
            color: #3b82f6;
        }
        body.light-mode .main-avatar-photo i {
            color: #2563eb;
        }
        .main-avatar-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .main-avatar-photo:hover {
            transform: scale(1.02);
            border-color: #3b82f6;
            box-shadow: 0 0 30px rgba(59,130,246,0.6);
        }
        .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 0 0 50px 50px;
            padding: 4px;
            font-size: 0.6rem;
            text-align: center;
            color: white;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .main-profile-container:hover .upload-overlay {
            opacity: 1;
        }
        .avatar-label {
            text-align: center;
            margin-top: 8px;
            font-size: 0.65rem;
            color: #60a5fa;
            letter-spacing: 0.5px;
        }
        body.light-mode .avatar-label {
            color: #2563eb;
        }

        .greeting-text {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .greeting-text h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #94a3f8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }
        body.light-mode .greeting-text h2 {
            background: linear-gradient(135deg, #0f172a, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .floating-group {
            margin-bottom: 1.8rem;
        }
        .input-container {
            position: relative;
        }
        .input-container i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #60a5fa;
            font-size: 1rem;
            pointer-events: none;
        }
        .floating-input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 1.5rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            outline: none;
            transition: all 0.2s;
        }
        body.light-mode .floating-input {
            background: rgba(0, 0, 0, 0.02);
            border: 1.5px solid #e2e8f0;
            color: #0f172a;
        }
        .floating-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }
        .hint-text {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.6rem;
            color: #64748b;
            padding: 0 0.3rem;
        }

        .nexa-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(105deg, #2563eb, #06b6d4);
            border: none;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .nexa-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .nexa-button:hover::before {
            left: 100%;
        }
        .nexa-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -8px #2563eb;
        }

        .result-card {
            margin-top: 1.8rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border-left: 3px solid #3b82f6;
            animation: slideUp 0.35s ease;
        }
        body.light-mode .result-card {
            background: rgba(0, 0, 0, 0.03);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-header {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #3b82f6;
            margin-bottom: 0.6rem;
        }
        .result-message {
            font-size: 0.85rem;
            color: #e2e8f0;
            line-height: 1.5;
        }
        body.light-mode .result-message {
            color: #1e293b;
        }
        .result-message i {
            color: #3b82f6;
            width: 22px;
        }

        .card-footer {
            padding: 0.8rem 1.8rem 1.3rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.6rem;
            color: #6b7280;
        }

        #mainProfileInput {
            display: none;
        }
        .photo-toast {
            animation: fadeInUp 0.2s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes rippleAnim {
            0% { width: 0px; height: 0px; opacity: 0.6; }
            100% { width: 100px; height: 100px; opacity: 0; }
        }

        @media (max-width: 480px) {
            .card-content { padding: 1.5rem; }
            .greeting-text h2 { font-size: 1.5rem; }
            .main-avatar-photo { width: 80px; height: 80px; }
            .main-avatar-photo i { font-size: 2.3rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="nexa-card">
        <div class="card-header">
            <!-- Removed upper profile photo - only theme toggle remains -->
            <div class="theme-touch" id="themeToggle">
                <i class="fa-solid fa-moon" id="themeIcon"></i>
                <span id="themeLabel">Dark</span>
            </div>
            <div class="logo-area">
                <span class="nexa-glow">NEXA</span>
                <span class="hub-glow"> HUB AI</span>
            </div>
            <!-- <div class="chip">✦ profile avatar ✦</div> -->
        </div>

        <div class="card-content">
            <!-- MAIN PROFILE PHOTO - Click to upload, no upper profile -->
            <div class="avatar-ring">
                <div class="main-profile-container" id="mainProfileContainer">
                    <div class="main-avatar-photo" id="mainAvatarPhoto">
                        <i class="fa-regular fa-circle-user"></i>
                    </div>
                    <div class="upload-overlay">
                        <i class="fa-solid fa-camera"></i> tap to upload
                    </div>
                    <div class="avatar-label">
                        <i class="fa-regular fa-id-card"></i> your profile photo
                    </div>
                </div>
                <input type="file" id="mainProfileInput" accept="image/jpeg,image/png,image/jpg,image/webp">
            </div>
            
            <div class="greeting-text">
                <h2>Nice to meet you!</h2>
            </div>

            <div class="floating-group">
                <div class="input-container">
                    <i class="fa-regular fa-user-astronaut"></i>
                    <input type="text" id="nameInput" class="floating-input" placeholder="What's your name?" autocomplete="off" maxlength="50">
                </div>
                <div class="hint-text">
                    <span><i class="fa-regular fa-star"></i> Your identity stays private</span>
                    <span id="charCounter">0/50</span>
                </div>
            </div>

            <button class="nexa-button" id="continueBtn">
                <span>Continue</span>
                <i class="fa-regular fa-message"></i>
            </button>

            <div id="resultArea" style="display: none;">
                <div class="result-card">
                    <div class="result-header">
                        <i class="fa-regular fa-circle-check"></i> WELCOME TO NEXA
                    </div>
                    <div class="result-message" id="resultMessage"></div>
                </div>
            </div>
        </div>

        <div class="card-footer">
            <i class="fa-regular"></i> © 2026 NEXA HUB AI 
        </div>
    </div>

    <script>
        // === THEME TOGGLE ===
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');

        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                localStorage.setItem('nexaTheme', 'light');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                themeLabel.textContent = 'Light';
            } else {
                document.body.classList.remove('light-mode');
                localStorage.setItem('nexaTheme', 'dark');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                themeLabel.textContent = 'Dark';
            }
        }
        const savedTheme = localStorage.getItem('nexaTheme');
        setTheme(savedTheme === 'light' ? 'light' : 'dark');
        themeToggle.addEventListener('click', () => {
            const isLight = document.body.classList.contains('light-mode');
            setTheme(isLight ? 'dark' : 'light');
        });

        // ========== PROFILE PHOTO FEATURE (Only Main Center Avatar) ==========
        const mainProfileContainer = document.getElementById('mainProfileContainer');
        const mainAvatarPhoto = document.getElementById('mainAvatarPhoto');
        const mainProfileInput = document.getElementById('mainProfileInput');

        // Function to update main avatar photo
        function updateProfilePhoto(imageDataUrl) {
            if (imageDataUrl) {
                const img = document.createElement('img');
                img.src = imageDataUrl;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '50%';
                mainAvatarPhoto.innerHTML = '';
                mainAvatarPhoto.appendChild(img);
                localStorage.setItem('nexaMainProfilePhoto', imageDataUrl);
            } else {
                // reset to default icon
                mainAvatarPhoto.innerHTML = '<i class="fa-regular fa-circle-user"></i>';
                localStorage.removeItem('nexaMainProfilePhoto');
            }
        }

        // Load saved photo on startup
        function loadSavedProfilePhoto() {
            const savedPhoto = localStorage.getItem('nexaMainProfilePhoto');
            if (savedPhoto) {
                updateProfilePhoto(savedPhoto);
            }
        }

        // Handle file upload from main avatar click
        mainProfileContainer.addEventListener('click', (e) => {
            e.stopPropagation();
            mainProfileInput.click();
        });

        mainProfileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                // Limit file size to 2MB for performance
                if (file.size > 2 * 1024 * 1024) {
                    showToast('Image too large! Max 2MB', '#ef4444');
                    mainProfileInput.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    updateProfilePhoto(e.target.result);
                    showToast('Profile photo updated ✓', '#3b82f6');
                };
                reader.readAsDataURL(file);
            } else if (file) {
                showToast('Please select a valid image (PNG, JPG)', '#ef4444');
            }
            mainProfileInput.value = '';
        });

        function showToast(msg, color = '#3b82f6') {
            let toast = document.querySelector('.dynamic-toast');
            if(toast) toast.remove();
            toast = document.createElement('div');
            toast.className = 'dynamic-toast photo-toast';
            toast.textContent = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '80px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#1e293b';
            toast.style.color = '#f1f5f9';
            toast.style.padding = '8px 20px';
            toast.style.borderRadius = '50px';
            toast.style.fontSize = '0.75rem';
            toast.style.fontWeight = '500';
            toast.style.zIndex = '1000';
            toast.style.backdropFilter = 'blur(8px)';
            toast.style.border = `1px solid ${color}`;
            toast.style.animation = 'fadeInUp 0.2s ease';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        loadSavedProfilePhoto();

        // === NAME HANDLING ===
        const nameInput = document.getElementById('nameInput');
        const charCounter = document.getElementById('charCounter');
        const continueBtn = document.getElementById('continueBtn');
        const resultArea = document.getElementById('resultArea');
        const resultMessage = document.getElementById('resultMessage');

        function updateCounter() {
            charCounter.textContent = `${nameInput.value.length}/50`;
        }
        nameInput.addEventListener('input', updateCounter);
        updateCounter();

        function capitalizeName(name) {
            if (!name) return '';
            return name.trim().split(/\s+/).map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
        }

        function getUniqueWelcomeMessage(name) {
            const hour = new Date().getHours();
            const messages = [
                `✨ ${name}, your neural signature is registered. I'm NEXA AI, ready to explore with you.`,
                `🌌 Hello ${name}, quantum connection stable. Let's create something extraordinary.`,
                `🤖 ${name}, from code to consciousness — your AI companion is online.`,
                `💫 Great to meet you, ${name}! Your name is now part of the NEXA constellation.`,
                `⚡ Welcome ${name}, the future isn't coming — we're creating it now.`,
                `🔐 ${name}, your unique profile is secured. NEXA AI stands ready.`
            ];
            const index = (name.length + hour) % messages.length;
            return messages[index];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function showNameError() {
            const container = document.querySelector('.input-container');
            container.style.transform = 'translateX(4px)';
            setTimeout(() => { container.style.transform = ''; }, 200);
            const toast = document.createElement('div');
            toast.textContent = '✨ Please share your name to continue ✨';
            toast.style.cssText = 'position:fixed; bottom:25px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:8px 20px; border-radius:50px; font-size:0.75rem; z-index:1000; backdrop-filter:blur(8px);';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        continueBtn.addEventListener('click', () => {
            let rawName = nameInput.value.trim();
            if (rawName === '') {
                showNameError();
                return;
            }
            const formattedName = capitalizeName(rawName);
            const welcomeMsg = getUniqueWelcomeMessage(formattedName);
            const timestamp = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            const hasPhoto = localStorage.getItem('nexaMainProfilePhoto') ? true : false;
            const photoIndicator = hasPhoto ? '<i class="fa-solid fa-image"></i> Profile photo set · ' : '';
            resultMessage.innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <div><i class="fa-regular fa-id-card"></i> <strong>Hello, ${escapeHtml(formattedName)}</strong> — identity confirmed. ${photoIndicator}</div>
                    <div><i class="fa-regular fa-comment-dots"></i> ${escapeHtml(welcomeMsg)}</div>
                    <div style="font-size: 0.65rem; color: #6b7280; margin-top: 6px;"><i class="fa-regular fa-clock"></i> ${timestamp} · NEXA handshake complete</div>
                </div>
            `;
            resultArea.style.display = 'block';
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            const profile = { name: formattedName, timestamp: new Date().toISOString() };
            sessionStorage.setItem('nexaUserName', JSON.stringify(profile));
            continueBtn.style.transform = 'scale(0.97)';
            setTimeout(() => { continueBtn.style.transform = ''; }, 150);
            const originalSpan = continueBtn.querySelector('span');
            const originalText = originalSpan.textContent;
            originalSpan.textContent = '✓ Connected';
            setTimeout(() => { originalSpan.textContent = originalText; }, 1500);
        });

        nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') continueBtn.click(); });
        
        const savedName = sessionStorage.getItem('nexaUserName');
        if (savedName) {
            try {
                const parsed = JSON.parse(savedName);
                if (parsed.name) { nameInput.value = parsed.name; updateCounter(); }
            } catch(e) {}
        }

        // ripple effect on main avatar click for delight
        const mainAvatarDiv = document.querySelector('.main-avatar-photo');
        if (mainAvatarDiv) {
            mainAvatarDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                const ripple = document.createElement('div');
                ripple.style.position = 'fixed';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = '#3b82f6';
                ripple.style.opacity = '0.5';
                ripple.style.pointerEvents = 'none';
                const rect = mainAvatarDiv.getBoundingClientRect();
                ripple.style.left = (rect.left + rect.width/2) + 'px';
                ripple.style.top = (rect.top + rect.height/2) + 'px';
                ripple.style.animation = 'rippleAnim 0.5s ease-out forwards';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 500);
            });

    // ONLY ADDITION: redirect to next page after continue
    document.getElementById('continueBtn').addEventListener('click', function () {

            window.location.href = 'country_language.html';

    });

        }
        if (!document.querySelector('#rippleStyle')) {
            const style = document.createElement('style');
            style.id = 'rippleStyle';
            style.textContent = `@keyframes rippleAnim { 0% { width: 0px; height: 0px; opacity: 0.6; } 100% { width: 100px; height: 100px; opacity: 0; } }`;
            document.head.appendChild(style);
        }
    </script>
