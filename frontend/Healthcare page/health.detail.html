<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXA HUB AI · health form</title>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ----- base (light mode by default) ----- */
        :root {
            /* light mode */
            --bg-body: radial-gradient(circle at 0% 0%, #fff5e6, #ffe8d0 30%, #fddbb5 60%, #f5cba0 90%);
            --bg-card: rgba(255, 248, 240, 0.92);
            --card-border: rgba(255, 200, 150, 0.2);
            --card-shadow: 0 30px 50px -10px rgba(180, 120, 80, 0.25), 0 0 0 1px rgba(255, 200, 150, 0.1);
            --text-primary: #2a1a0e;
            --text-secondary: #4a3520;
            --text-muted: #8a705a;
            --input-bg: rgba(255, 248, 240, 0.8);
            --input-border: rgba(200, 160, 120, 0.2);
            --input-focus: #d48c5a;
            --select-bg: rgba(255, 248, 240, 0.7);
            --section-badge: linear-gradient(145deg, #c47a3a, #e8a05a);
            --badge-text: #fff8f0;
            --goal-activity-bg: rgba(255, 240, 220, 0.3);
            --goal-activity-border: rgba(255, 200, 150, 0.15);
            --btn-bg: linear-gradient(145deg, #b86a2a, #d48a4a);
            --btn-hover: linear-gradient(145deg, #a05a20, #c47a3a);
            --btn-shadow: 0 8px 20px rgba(180, 120, 80, 0.3);
            --toast-bg: rgba(200, 140, 80, 0.12);
            --toast-border: #d48c5a;
            --toast-text: #4a3520;
            --brand-nexa: #2a1a0e;
            --brand-hub: #c47a3a;
            --brand-tag-bg: rgba(200, 140, 80, 0.15);
            --brand-tag-text: #8a5a3a;
            --brand-tag-border: rgba(200, 140, 80, 0.2);
            --divider: rgba(180, 140, 100, 0.12);
            --headline-shadow: 0 0 30px rgba(200, 140, 80, 0.05);
            --toggle-bg: #e0d6cc;
            --toggle-dot: #f5ede4;
            --toggle-active: #d48c5a;
        }

        /* ----- dark mode variables ----- */
        body.dark-mode {
            --bg-body: radial-gradient(circle at 0% 0%, #1a1a1a, #2a241e 40%, #1f1a16 70%, #12100e 100%);
            --bg-card: rgba(30, 26, 22, 0.94);
            --card-border: rgba(200, 160, 120, 0.15);
            --card-shadow: 0 30px 50px -10px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(200, 160, 120, 0.08);
            --text-primary: #f0e4d8;
            --text-secondary: #d4c4b4;
            --text-muted: #a8907a;
            --input-bg: rgba(40, 34, 28, 0.8);
            --input-border: rgba(200, 160, 120, 0.15);
            --input-focus: #d48c5a;
            --select-bg: rgba(40, 34, 28, 0.7);
            --section-badge: linear-gradient(145deg, #a05a20, #c47a3a);
            --badge-text: #f5ede4;
            --goal-activity-bg: rgba(60, 50, 40, 0.25);
            --goal-activity-border: rgba(200, 160, 120, 0.1);
            --btn-bg: linear-gradient(145deg, #a05a20, #c47a3a);
            --btn-hover: linear-gradient(145deg, #8a4a18, #b06a2a);
            --btn-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            --toast-bg: rgba(200, 140, 80, 0.08);
            --toast-border: #b06a2a;
            --toast-text: #d4c4b4;
            --brand-nexa: #f0e4d8;
            --brand-hub: #d48a4a;
            --brand-tag-bg: rgba(200, 140, 80, 0.12);
            --brand-tag-text: #d4b49a;
            --brand-tag-border: rgba(200, 140, 80, 0.15);
            --divider: rgba(200, 160, 120, 0.08);
            --headline-shadow: 0 0 30px rgba(200, 140, 80, 0.03);
            --toggle-bg: #3a322c;
            --toggle-dot: #5a4a3a;
            --toggle-active: #d48c5a;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            background: var(--bg-body);
            background-attachment: fixed;
            position: relative;
            transition: background 0.4s ease, color 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(255, 200, 150, 0.12), transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(255, 180, 100, 0.06), transparent 50%);
            pointer-events: none;
            z-index: 0;
            transition: opacity 0.4s ease;
        }
        body.dark-mode::before {
            opacity: 0.15;
        }

        .card {
            position: relative;
            z-index: 2;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-width: 680px;
            width: 100%;
            border-radius: 40px;
            padding: 1.8rem 2rem 2.2rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--card-border);
            transition: background 0.4s ease, box-shadow 0.4s ease, border 0.4s ease;
        }

        /* ----- header : NEXA dark · HUB AI amber ----- */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.4rem;
            border-bottom: 2px solid var(--divider);
            padding-bottom: 0.6rem;
            flex-wrap: wrap;
            transition: border 0.3s ease;
        }

        .brand-icon {
            font-size: 1.6rem;
            line-height: 1;
            filter: drop-shadow(0 0 12px rgba(200, 140, 80, 0.15));
            transition: filter 0.3s;
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.1rem;
        }

        .brand-name .nexa {
            color: var(--brand-nexa);
            text-shadow: 0 0 20px rgba(42, 26, 14, 0.08);
            transition: color 0.3s, text-shadow 0.3s;
        }
        .brand-name .hub-ai {
            color: var(--brand-hub);
            text-shadow: 0 0 20px rgba(196, 122, 58, 0.15);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .brand-tag {
            font-weight: 500;
            font-size: 0.65rem;
            letter-spacing: 0.3px;
            background: var(--brand-tag-bg);
            padding: 0.15rem 0.7rem;
            border-radius: 40px;
            color: var(--brand-tag-text);
            border: 1px solid var(--brand-tag-border);
            margin-left: auto;
            text-transform: uppercase;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }

        /* toggle */
        .theme-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-left: 0.5rem;
        }
        .theme-toggle {
            width: 42px;
            height: 24px;
            background: var(--toggle-bg);
            border-radius: 40px;
            border: 1px solid var(--input-border);
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease, border 0.3s ease;
            flex-shrink: 0;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.08);
        }
        .theme-toggle .dot {
            width: 18px;
            height: 18px;
            background: var(--toggle-dot);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        body.dark-mode .theme-toggle .dot {
            transform: translateX(18px);
            background: #f5ede4;
        }
        .theme-toggle.active {
            background: var(--toggle-active);
            border-color: var(--toggle-active);
        }
        .theme-icon {
            font-size: 1rem;
            line-height: 1;
            color: var(--text-muted);
            transition: color 0.3s;
            opacity: 0.6;
        }
        body.dark-mode .theme-icon {
            opacity: 0.9;
        }

        /* section */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            margin-bottom: 1.1rem;
            border-bottom: 2px solid var(--divider);
            padding-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s, border 0.3s;
            text-shadow: var(--headline-shadow);
        }

        .section-title span {
            background: var(--section-badge);
            color: var(--badge-text);
            font-size: 0.6rem;
            padding: 0.1rem 0.7rem;
            border-radius: 40px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: background 0.3s, color 0.3s;
            text-shadow: none;
        }

        .field-grid {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin-bottom: 1.6rem;
        }

        .field-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.4rem 0.8rem;
        }

        .field-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-width: 130px;
            letter-spacing: -0.01em;
            transition: color 0.3s;
        }

        .field-label .hint {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-left: 0.2rem;
            transition: color 0.3s;
        }

        .field-control {
            flex: 1;
            min-width: 140px;
        }

        input,
        select {
            width: 100%;
            padding: 0.5rem 0.9rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            border: 1px solid var(--input-border);
            border-radius: 40px;
            background: var(--input-bg);
            backdrop-filter: blur(2px);
            transition: 0.2s ease;
            color: var(--text-primary);
            font-weight: 450;
            outline: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        input:focus,
        select:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(200, 140, 80, 0.12), 0 4px 12px rgba(0, 0, 0, 0.03);
            background: var(--input-bg);
        }

        input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%238a705a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 0.9rem;
            cursor: pointer;
        }
        body.dark-mode select {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23a8907a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
        }

        .goal-activity-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            background: var(--goal-activity-bg);
            backdrop-filter: blur(2px);
            padding: 0.8rem 1.2rem 1.1rem;
            border-radius: 40px;
            margin-top: 0.2rem;
            border: 1px solid var(--goal-activity-border);
            transition: background 0.3s, border 0.3s;
        }

        .goal-activity-item {
            flex: 1 1 160px;
        }

        .goal-activity-item label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.2rem;
            letter-spacing: -0.01em;
            transition: color 0.3s;
        }

        .goal-activity-item select {
            width: 100%;
            background-color: var(--select-bg);
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.3rem;
            padding-top: 0.6rem;
            border-top: 1px solid var(--divider);
            transition: border 0.3s;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .btn-continue {
            background: var(--btn-bg);
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0.6rem 2.6rem;
            border: none;
            border-radius: 60px;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: var(--btn-shadow);
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn-continue:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(180, 120, 80, 0.25);
        }
        body.dark-mode .btn-continue:hover {
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.5);
        }

        .btn-continue:active {
            transform: scale(0.96);
        }

        .toast-message {
            display: none;
            margin-top: 1rem;
            padding: 0.5rem 1.2rem;
            background: var(--toast-bg);
            border-left: 4px solid var(--toast-border);
            border-radius: 40px;
            color: var(--toast-text);
            font-weight: 500;
            font-size: 0.8rem;
            backdrop-filter: blur(4px);
            border: 1px solid var(--toast-border);
            text-align: center;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }

        .toast-message.show {
            display: block;
            animation: fadeSlide 0.4s ease;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 42px;
            background: linear-gradient(135deg, rgba(200, 140, 80, 0.06), rgba(255, 200, 150, 0.02));
            z-index: -1;
            filter: blur(24px);
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        body.dark-mode .card::after {
            opacity: 0.15;
        }

        /* responsive */
        @media (max-width: 600px) {
            .card {
                padding: 1.2rem 1rem 1.6rem;
                border-radius: 28px;
                max-width: 100%;
            }
            .field-row {
                flex-direction: column;
                align-items: stretch;
                gap: 0.2rem;
            }
            .field-label {
                min-width: auto;
            }
            .goal-activity-wrap {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .goal-activity-item {
                flex: 1 1 auto;
            }
            .btn-continue {
                width: 100%;
                justify-content: center;
                text-align: center;
            }
            .brand-header {
                flex-wrap: wrap;
            }
            .brand-tag {
                margin-left: 0;
                width: auto;
            }
            .brand-name {
                font-size: 1.3rem;
            }
            .theme-toggle-wrap {
                margin-left: auto;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- header: NEXA dark · HUB AI amber + toggle -->
        <div class="brand-header">
            <span class="brand-icon">⚡</span>
            <span class="brand-name">
                <span class="nexa">NEXA</span>
                <span class="hub-ai">HUB AI</span>
            </span>
            <span class="brand-tag">v2.0 · health</span>
            <div class="theme-toggle-wrap">
                <span class="theme-icon" id="themeIcon">☀️</span>
                <div class="theme-toggle" id="themeToggle" role="button" tabindex="0" aria-label="Toggle dark mode">
                    <div class="dot"></div>
                </div>
                <span class="theme-icon" id="themeIconDark">🌙</span>
            </div>
        </div>

        <!-- ===== first block ===== -->
        <div class="section-title">
            Health Information
            <span>profile</span>
        </div>

        <div class="field-grid">
            <div class="field-row">
                <span class="field-label">Age <span class="hint">·</span></span>
                <div class="field-control">
                    <input type="number" id="ageInput" placeholder="Enter your age" min="1" max="120" />
                </div>
            </div>
            <div class="field-row">
                <span class="field-label">Current Weight (kg)</span>
                <div class="field-control">
                    <input type="number" id="weightInput" placeholder="e.g. 72" step="0.1" min="1" />
                </div>
            </div>
            <div class="field-row">
                <span class="field-label">Target Weight (kg)</span>
                <div class="field-control">
                    <input type="number" id="targetWeightInput" placeholder="e.g. 65" step="0.1" min="1" />
                </div>
            </div>
            <div class="field-row">
                <span class="field-label">Height (cm)</span>
                <div class="field-control">
                    <input type="number" id="heightInput" placeholder="e.g. 175" step="0.1" min="1" />
                </div>
            </div>
        </div>

        <!-- ===== second block ===== -->
        <div class="section-title" style="margin-top: 0.3rem;">
            Health Information
            <span>goals</span>
        </div>

        <div class="goal-activity-wrap">
            <div class="goal-activity-item">
                <label for="goalSelect">Goal</label>
                <select id="goalSelect">
                    <option value="" disabled selected>Select Goal</option>
                    <option value="Weight Loss">Weight Loss</option>
                    <option value="Weight Gain">Weight Gain</option>
                    <option value="Muscle Gain">Muscle Gain</option>
                    <option value="Maintain Weight">Maintain Weight</option>
                </select>
            </div>
            <div class="goal-activity-item">
                <label for="activitySelect">Activity Level</label>
                <select id="activitySelect">
                    <option value="" disabled selected>Select Activity Level</option>
                    <option value="Sedentary">Sedentary</option>
                    <option value="Light Active">Light Active</option>
                    <option value="Moderately Active">Moderately Active</option>
                    <option value="Very Active">Very Active</option>
                </select>
            </div>
        </div>

        <!-- continue + toast -->
        <div class="action-row">
            <button class="btn-continue" id="continueBtn">Continue</button>
        </div>
        <div id="toast" class="toast-message">✅ Health data saved!</div>

    </div>

    <script>
        (function() {
            // DOM refs
            const ageInput = document.getElementById('ageInput');
            const weightInput = document.getElementById('weightInput');
            const targetWeightInput = document.getElementById('targetWeightInput');
            const heightInput = document.getElementById('heightInput');
            const goalSelect = document.getElementById('goalSelect');
            const activitySelect = document.getElementById('activitySelect');
            const continueBtn = document.getElementById('continueBtn');
            const toast = document.getElementById('toast');

            // theme toggle
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            const themeIconDark = document.getElementById('themeIconDark');

            // load saved preference
            if (localStorage.getItem('nexa-theme') === 'dark') {
                body.classList.add('dark-mode');
                themeToggle.classList.add('active');
            }

            function toggleTheme() {
                body.classList.toggle('dark-mode');
                themeToggle.classList.toggle('active');
                const isDark = body.classList.contains('dark-mode');
                localStorage.setItem('nexa-theme', isDark ? 'dark' : 'light');
            }

            themeToggle.addEventListener('click', toggleTheme);
            themeToggle.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleTheme();
                }
            });

            // ---- toast ----
            function showToast(msg) {
                toast.textContent = msg || '✅ Health data saved!';
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3200);
            }

            // ---- continue ----
            function handleContinue() {
                const age = ageInput.value.trim();
                const weight = weightInput.value.trim();
                const targetWeight = targetWeightInput.value.trim();
                const height = heightInput.value.trim();
                const goal = goalSelect.value;
                const activity = activitySelect.value;

                if (!age || !weight || !targetWeight || !height) {
                    showToast('⚠️ Please fill in all fields (Age, Weight, Target, Height)');
                    return;
                }
                if (parseFloat(age) <= 0 || parseFloat(weight) <= 0 || parseFloat(targetWeight) <= 0 || parseFloat(height) <=
                    0) {
                    showToast('⚠️ Values must be greater than zero');
                    return;
                }
                if (!goal || !activity) {
                    showToast('⚠️ Please select both Goal and Activity Level');
                    return;
                }

                const summary =
                    `✅ Age: ${age} · Weight: ${weight}kg → ${targetWeight}kg · Height: ${height}cm · Goal: ${goal} · Activity: ${activity}`;
                showToast(summary);
            }

            continueBtn.addEventListener('click', handleContinue);

            const inputs = [ageInput, weightInput, targetWeightInput, heightInput, goalSelect, activitySelect];
            inputs.forEach(el => {
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        handleContinue();
                    }
                });
            });

            console.log('NEXA HUB AI · fresh vibrant light/dark theme');
        })();
    </script>
</body>
</html>
