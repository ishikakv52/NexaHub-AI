<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — AI English Coach</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#6c63ff;--secondary:#ff6584;--accent:#43e97b;
  --bg:#0a0a16;--surface:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.12);
  --text:#f0f0ff;--muted:#8888aa;
}
body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px;}
.bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.22;animation:bf 10s ease-in-out infinite;}
.b1{width:560px;height:560px;background:var(--primary);top:-180px;left:-180px;}
.b2{width:420px;height:420px;background:var(--secondary);bottom:-100px;right:-100px;animation-delay:3.5s;}
.b3{width:300px;height:300px;background:var(--accent);top:50%;left:55%;animation-delay:1.8s;opacity:0.13;}
@keyframes bf{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-28px) scale(1.05);}}
.card{
  position:relative;z-index:1;
  background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:24px;
  padding:48px 40px;width:100%;max-width:420px;
  box-shadow:0 28px 60px rgba(0,0,0,0.45);animation:slideUp 0.6s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(36px);}to{opacity:1;transform:translateY(0);}}
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{font-size:54px;display:block;margin-bottom:10px;animation:bounce 2s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
.logo h1{
  font-size:1.55rem;font-weight:900;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo p{color:var(--muted);font-size:0.84rem;margin-top:5px;}
.field{margin-bottom:17px;}
.field label{display:block;font-size:0.75rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.field input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:11px;color:var(--text);font-size:0.95rem;outline:none;
  transition:border-color .2s,box-shadow .2s;font-family:inherit;
}
.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,99,255,0.2);}
.field input::placeholder{color:#555;}
.btn-submit{
  width:100%;padding:14px;margin-top:8px;
  background:linear-gradient(135deg,var(--primary),#8b5cf6);
  border:none;border-radius:12px;color:#fff;font-size:1rem;
  font-weight:800;cursor:pointer;transition:all .2s;letter-spacing:.02em;
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,99,255,0.42);}
.error-msg{
  background:rgba(255,80,80,0.13);border:1px solid rgba(255,80,80,0.35);
  color:#ff8888;border-radius:10px;padding:12px 15px;
  font-size:0.86rem;margin-bottom:18px;display:flex;align-items:center;gap:8px;
}
.footer-link{text-align:center;margin-top:22px;font-size:0.86rem;color:var(--muted);}
.footer-link a{color:var(--primary);text-decoration:none;font-weight:700;}
.footer-link a:hover{text-decoration:underline;}
.perks{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:26px;}
.perk{
  background:rgba(108,99,255,0.12);border:1px solid rgba(108,99,255,0.25);
  border-radius:20px;padding:4px 12px;font-size:0.74rem;color:#a89cff;
}
</style>
</head>
<body>
<div class="bg-blobs">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
</div>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🎓</span>
    <h1>AI English Coach</h1>
    <p>Your personal English teacher — powered by AI · No API key needed</p>
  </div>
  {% if error %}<div class="error-msg">⚠️ {{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter your username" required autofocus/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required/>
    </div>
    <button type="submit" class="btn-submit">🚀 Start Learning</button>
  </form>
  <div class="perks">
    <span class="perk">🎤 Voice Practice</span>
    <span class="perk">📖 Grammar Coach</span>
    <span class="perk">💼 Interview Prep</span>
    <span class="perk">🏆 Daily Challenges</span>
    <span class="perk">📚 Vocabulary</span>
    <span class="perk">🔄 Translation</span>
  </div>
  <div class="footer-link">
    New here? <a href="{% url 'register' %}">Create a free account →</a>
  </div>
</div>
</body>
</html>
