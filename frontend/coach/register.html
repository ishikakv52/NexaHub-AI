<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — AI English Coach</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--primary:#6c63ff;--secondary:#ff6584;--accent:#43e97b;--bg:#0a0a16;--surface:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.12);--text:#f0f0ff;--muted:#8888aa;}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px;}
.bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.2;animation:bf 10s ease-in-out infinite;}
.b1{width:550px;height:550px;background:var(--accent);top:-150px;left:-150px;}
.b2{width:420px;height:420px;background:var(--primary);bottom:-100px;right:-100px;animation-delay:3s;}
@keyframes bf{0%,100%{transform:translateY(0);}50%{transform:translateY(-25px);}}
.card{position:relative;z-index:1;background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:24px;padding:44px 38px;width:100%;max-width:460px;box-shadow:0 28px 60px rgba(0,0,0,0.45);animation:slideUp .6s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(36px);}to{opacity:1;transform:translateY(0);}}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{font-size:48px;display:block;margin-bottom:8px;animation:bounce 2s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.logo h1{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo p{color:var(--muted);font-size:0.83rem;margin-top:4px;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.field{margin-bottom:15px;}
.field label{display:block;font-size:0.74rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.field input{width:100%;padding:12px 15px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:0.93rem;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,233,123,0.18);}
.field input::placeholder{color:#555;}
.btn-submit{width:100%;padding:14px;margin-top:6px;background:linear-gradient(135deg,var(--accent),#06b6d4);border:none;border-radius:12px;color:#0a0a16;font-size:1rem;font-weight:900;cursor:pointer;transition:all .2s;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(67,233,123,0.38);}
.error-msg{background:rgba(255,80,80,0.13);border:1px solid rgba(255,80,80,0.35);color:#ff8888;border-radius:10px;padding:12px 15px;font-size:0.86rem;margin-bottom:16px;}
.footer-link{text-align:center;margin-top:20px;font-size:0.86rem;color:var(--muted);}
.footer-link a{color:var(--primary);text-decoration:none;font-weight:700;}
.hint{font-size:0.73rem;color:var(--muted);margin-top:5px;}
</style>
</head>
<body>
<div class="bg-blobs"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🚀</span>
    <h1>Create Your Account</h1>
    <p>Start your English learning journey — free, no API key needed!</p>
  </div>
  {% if error %}<div class="error-msg">⚠️ {{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="row-2">
      <div class="field"><label>First Name</label><input type="text" name="first_name" placeholder="Rahul" required/></div>
      <div class="field"><label>Username</label><input type="text" name="username" placeholder="rahul123" required/></div>
    </div>
    <div class="field"><label>Email Address</label><input type="email" name="email" placeholder="rahul@example.com"/></div>
    <div class="row-2">
      <div class="field"><label>Password</label><input type="password" name="password" placeholder="Min 6 chars" required/></div>
      <div class="field"><label>Confirm</label><input type="password" name="password2" placeholder="Repeat" required/></div>
    </div>
    <p class="hint">💡 Password must be at least 6 characters long.</p>
    <button type="submit" class="btn-submit">🎓 Join AI English Coach — Free!</button>
  </form>
  <div class="footer-link">Already have an account? <a href="{% url 'login' %}">Sign in →</a></div>
</div>
</body>
</html>
