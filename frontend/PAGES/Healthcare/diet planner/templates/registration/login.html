{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page pt-navbar">
    <div class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-75">
            <div class="col-md-5">
                <div class="text-center mb-4 fade-in-up">
                    <h1 class="page-title">Welcome <span class="gradient-text">Back</span></h1>
                    <p class="text-muted">Sign in to continue your health journey.</p>
                </div>
                <div class="glass-card p-4 p-md-5 scroll-animate">
                    <form method="post">
                        {% csrf_token %}
                        {% if form.errors %}
                        <div class="alert alert-danger rounded-3">
                            Invalid username or password. Please try again.
                        </div>
                        {% endif %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 btn-glow rounded-pill">Sign In</button>
                    </form>
                    <p class="text-center mt-4 mb-0 text-muted">
                        Don't have an account? <a href="{% url 'signup' %}" class="text-primary fw-semibold">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
