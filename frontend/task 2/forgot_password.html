<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NEXA HUB AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f4ff',
                            100: '#e1e9ff',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        .animated-bg-dark {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
    <script>
        // Setup light/dark mode instantly
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(pre-preference-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>

</head>
<body class="animated-bg dark:animated-bg-dark min-h-screen flex items-center justify-center p-4 relative transition-colors duration-300">
    <div class="absolute top-4 left-4 flex items-center gap-2 bg-white/20 dark:bg-slate-900/40 backdrop-blur-md py-2 px-4 rounded-xl border border-white/20">
        <i class="fa-solid fa-cube text-white text-xl animate-pulse"></i>
        <span class="font-black text-lg tracking-wider text-white">NEXA HUB AI</span>
    </div>

    
<button onclick="toggleTheme()" class="fixed top-4 right-4 z-50 p-3 rounded-full bg-white/80 dark:bg-slate-800/80 shadow-lg backdrop-blur border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:scale-110 transition-transform">
    <i class="fa-solid fa-sun dark:hidden text-amber-500 text-lg"></i>
    <i class="fa-solid fa-moon hidden dark:block text-indigo-400 text-lg"></i>
</button>


    <div class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/20 dark:border-slate-800">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white">Recover Password</h1>
            <p class="text-slate-600 dark:text-slate-400 text-sm mt-2">Enter email to get verification credentials</p>
        </div>

        <form action="login.html" method="GET" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300 mb-1.5">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 dark:text-slate-500"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" required class="w-full pl-10 pr-4 py-2.5 bg-slate-50/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm" placeholder="name@domain.com">
                </div>
            </div>
            <button type="submit" class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl shadow-lg text-sm">Send Reset Instructions</button>
        </form>
        <div class="mt-6 text-center"><a href="login.html" class="text-xs text-brand-500 font-bold hover:underline"><i class="fa-solid fa-arrow-left mr-1"></i> Back to login</a></div>
    </div>
</body>
</html>
