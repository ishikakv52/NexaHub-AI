{% extends 'tasks/base.html' %}
{% block title %}Edit Category - NEXA HUB AI{% endblock %}
{% block page_heading %}Edit Category{% endblock %}

{% block content %}
<div class="panel" style="max-width: 500px; margin:0 auto;">
    <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Category Name</label>
            {{ form.name }}
            {% for error in form.name.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-tm-primary"><i class="bi bi-check-lg me-1"></i>Save Changes</button>
            <a href="{% url 'tasks:categories' %}" class="btn btn-light">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
