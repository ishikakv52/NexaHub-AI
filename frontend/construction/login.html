<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {{ company_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --navy-950: #0f1729; --navy-900: #141d33;
            --orange-500: #f4762a; --orange-600: #dd611a;
            --slate-50: #f6f7fb; --slate-500: #6b7280; --slate-700: #374151;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--navy-950), var(--navy-900));
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            margin: 0; padding: 20px;
        }
        .auth-card {
            background: #fff; border-radius: 16px; padding: 40px 36px;
            width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .brand { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 8px; }
        .brand .icon-box {
            width: 42px; height: 42px; background: var(--orange-500); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px;
        }
        .brand span { color: var(--navy-900); font-weight: 700; font-size: 20px; }
        .auth-card h5 { text-align: center; color: var(--slate-500); font-weight: 500; margin-bottom: 28px; font-size: 14px; }
        .form-label { font-weight: 600; font-size: 13.5px; color: var(--slate-700); }
        .form-control { padding: 10px 14px; border-radius: 8px; border: 1px solid #e2e5ec; margin-bottom: 16px; }
        .form-control:focus { border-color: var(--orange-500); box-shadow: 0 0 0 3px rgba(244,118,42,0.15); }
        .btn-erp { background: var(--orange-500); color: #fff; font-weight: 600; padding: 10px; border-radius: 8px; border: none; width: 100%; }
        .btn-erp:hover { background: var(--orange-600); color: #fff; }
        .switch-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--slate-500); }
        .btn-signup {
            display: block; width: 100%; text-align: center; background: #fff;
            border: 2px solid var(--orange-500); color: var(--orange-500); font-weight: 700;
            padding: 10px; border-radius: 8px; text-decoration: none; font-size: 14.5px;
        }
        .btn-signup:hover { background: var(--orange-500); color: #fff; }
        .role-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: var(--slate-50); padding: 4px; border-radius: 10px; }
        .role-tab { flex: 1; text-align: center; padding: 9px 0; border-radius: 8px; font-size: 13.5px; font-weight: 600;
            color: var(--slate-500); cursor: pointer; border: none; background: transparent; transition: all .15s; }
        .role-tab.active { background: #fff; color: var(--navy-900); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <div class="icon-box"><i class="fa-solid fa-building"></i></div>
            <span>{{ company_name }}</span>
        </div>
        <h5>Login to your account</h5>

        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <input type="hidden" name="role" id="roleInput" value="{{ role|default:'owner' }}">

            <div class="role-tabs">
                <button type="button" class="role-tab {% if role != 'staff' %}active{% endif %}" onclick="setRole('owner')" id="ownerTab">
                    <i class="fa-solid fa-crown me-1"></i> Login as Owner
                </button>
                <button type="button" class="role-tab {% if role == 'staff' %}active{% endif %}" onclick="setRole('staff')" id="staffTab">
                    <i class="fa-solid fa-user-hard-hat me-1"></i> Login as Employee/Worker
                </button>
            </div>

            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
            <button type="submit" class="btn-erp">Login</button>
        </form>

        <div class="switch-link">
            <a href="/signup/" class="btn-signup"><i class="fa-solid fa-crown me-1"></i> Signup as Owner</a>
            <p class="mt-2 mb-0">New here? Create a business account in seconds.</p>
        </div>
    </div>

    <script>
        function setRole(role) {
            document.getElementById('roleInput').value = role;
            document.getElementById('ownerTab').classList.toggle('active', role === 'owner');
            document.getElementById('staffTab').classList.toggle('active', role === 'staff');
        }
    </script>
</body>
</html>
