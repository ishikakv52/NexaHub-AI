<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — NEXA HUB ENGLISH COACH</title>
    <style>
        /* =============================================
           LUXURY / PREMIUM THEME – Deep Navy, Gold, Elegant
           Applied to Login Page (100% function-preserved)
           ============================================= */

        /* ─── RESET & VNexaBLES ─── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Deep navy base */
            --bg: #0a0c1a;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(212, 175, 55, 0.06);
            --border: rgba(212, 175, 55, 0.15);
            --border-glow: rgba(212, 175, 55, 0.3);

            /* Gold palette */
            --gold: #d4af37;
            --gold-light: #f5d76e;
            --gold-dark: #b8962e;
            --gold-gradient: linear-gradient(135deg, #f5d76e, #d4af37, #b8962e);

            /* Text */
            --text: #f0ece4;
            --text-secondary: #d6cfb5;
            --muted: #8a867a;

            /* Accents (kept for compatibility) */
            --primary: #d4af37;
            --secondary: #b8962e;
            --accent: #f5d76e;
            --purple: #d4af37;

            /* Typography */
            --font-heading: 'Playfair Display', 'Georgia', serif;
            --font-body: 'Lora', 'Segoe UI', serif;

            --radius: 20px;
            --shadow: 0 28px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(212, 175, 55, 0.05);
            --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            overflow: hidden;
            line-height: 1.7;
            min-height: 100vh;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ─── BACKGROUND BLOBS ─── */
        .bg-blobs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.10;
            animation: floatBlob 20s ease-in-out infinite alternate;
        }
        .b1 {
            width: 800px;
            height: 800px;
            background: #d4af37;
            top: -300px;
            left: -250px;
            opacity: 0.06;
        }
        .b2 {
            width: 600px;
            height: 600px;
            background: #b8962e;
            bottom: -200px;
            right: -200px;
            animation-delay: 7s;
            opacity: 0.05;
        }
        .b3 {
            width: 450px;
            height: 450px;
            background: #f5d76e;
            top: 45%;
            left: 55%;
            animation-delay: 4s;
            opacity: 0.04;
        }
        @keyframes floatBlob {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(50px, -50px) scale(1.1);
            }
        }

        /* ─── PARTICLES CANVAS ─── */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── LOGIN CARD ─── */
        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            transition: var(--transition);
        }
        .card:hover {
            border-color: var(--border-glow);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(36px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── LOGO ─── */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 54px;
            display: block;
            margin-bottom: 10px;
            animation: bounceIcon 2.8s ease infinite;
        }
        @keyframes bounceIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .logo h1 {
            font-size: 1.6rem;
            font-weight: 900;
            font-family: var(--font-heading);
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.04em;
        }
        .logo p {
            color: var(--muted);
            font-size: 0.84rem;
            margin-top: 5px;
            font-family: var(--font-body);
        }

        /* ─── FORM FIELDS ─── */
        .field {
            margin-bottom: 17px;
        }
        .field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--gold-light);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
            font-family: var(--font-heading);
        }
        .field input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            font-family: var(--font-body);
        }
        .field input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.08);
        }
        .field input::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        /* ─── BUTTON ─── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 12px;
            color: #0a0c1a;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.04em;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
            font-family: var(--font-body);
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.35);
        }

        /* ─── ERROR MESSAGE ─── */
        .error-msg {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.86rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-body);
        }

        /* ─── PERKS ─── */
        .perks {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
            margin-top: 26px;
        }
        .perk {
            background: rgba(212, 175, 55, 0.06);
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.74rem;
            color: var(--gold-light);
            font-family: var(--font-body);
            letter-spacing: 0.04em;
            transition: var(--transition);
        }
        .perk:hover {
            background: rgba(212, 175, 55, 0.12);
            border-color: var(--gold);
        }

        /* ─── FOOTER LINK ─── */
        .footer-link {
            text-align: center;
            margin-top: 22px;
            font-size: 0.86rem;
            color: var(--muted);
            font-family: var(--font-body);
        }
        .footer-link a {
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
        }
        .footer-link a:hover {
            color: var(--gold);
            text-decoration: underline;
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            .card {
                padding: 32px 20px;
            }
            .logo h1 {
                font-size: 1.3rem;
            }
            .logo-icon {
                font-size: 44px;
            }
            .field input {
                font-size: 0.9rem;
                padding: 11px 14px;
            }
            .btn-submit {
                font-size: 0.9rem;
                padding: 12px;
            }
            .perks {
                gap: 5px;
            }
            .perk {
                font-size: 0.7rem;
                padding: 3px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── PARTICLES CANVAS ─── -->
    <canvas id="particles-canvas"></canvas>

    <!-- ─── BG BLOBS ─── -->
    <div class="bg-blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <!-- ─── LOGIN CARD ─── -->
    <div class="card">
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <h1>NEXA HUB ENGLISH COACH</h1>
            <p>Your personal English teacher — powered by AI · No API key needed</p>
        </div>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required />
            </div>
            <button type="submit" class="btn-submit">🚀 Start Learning</button>
        </form>

        <div class="perks">
            <span class="perk">🎤 Voice Practice</span>
            <span class="perk">📖 Grammar Coach</span>
            <span class="perk">💼 Interview Prep</span>
            <span class="perk">🏆 Daily Challenges</span>
            <span class="perk">📚 Vocabulary</span>
            <span class="perk">🔄 Translation</span>
        </div>

        <div class="footer-link">
            New here? <a href="{% url 'register' %}">Create a free account →</a>
        </div>
    </div>

    <!-- ─── PARTICLE SCRIPT ──────────────────────────────────────────── -->
    <script>
        (function() {
            const c = document.getElementById('particles-canvas'),
                ctx = c.getContext('2d');
            let W, H, pts = [];

            function resize() {
                W = c.width = window.innerWidth;
                H = c.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            function rand(a, b) { return Math.random() * (b - a) + a; }
            const COLORS = ['212,175,55', '245,215,110', '184,150,46', '212,175,55'];
            for (let i = 0; i < 110; i++) {
                pts.push({
                    x: rand(0, W),
                    y: rand(0, H),
                    r: rand(0.5, 2.2),
                    vx: rand(-0.25, 0.25),
                    vy: rand(-0.25, 0.25),
                    a: rand(0.1, 0.45),
                    c: COLORS[Math.floor(Math.random() * COLORS.length)]
                });
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                pts.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > W) p.vx *= -1;
                    if (p.y < 0 || p.y > H) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.c},${p.a})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>

</body>
</html>
